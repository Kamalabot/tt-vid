<template id="language-deep-dive-template">
  <div
    data-composition-id="language-deep-dive"
    data-width="1080"
    data-height="1920"
    data-duration="65"
    data-start="0"
  >
    <style>
      :root {
        --color-python: #3776ab;
        --color-java: #f89820;
        --color-rust: #dea584;
        --color-js: #f7df1e;
        --accent: #00e5ff;
        --bg: #050508;
      }

      [data-composition-id="language-deep-dive"] {
        background: var(--bg);
        font-family: 'Inter', sans-serif;
        color: white;
        overflow: hidden;
      }

      .clip {
        position: absolute;
        opacity: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center; /* Center to keep in frame */
        align-items: center;
        padding: 100px 60px;
      }

      .title-large {
        font-size: 140px;
        font-weight: 900;
        letter-spacing: -6px;
        margin: 0;
        text-align: center;
      }

      .lang-subtitle {
        font-size: 64px;
        font-family: 'Fira Code', monospace;
        color: var(--accent);
        margin-top: 20px;
        text-align: center;
      }

      .lang-description {
        font-size: 44px; /* Slightly smaller for fit */
        max-width: 960px;
        text-align: center;
        margin-top: 60px;
        line-height: 1.4;
        color: rgba(255, 255, 255, 0.9);
        min-height: 250px;
      }

      .feature-list {
        margin-top: 80px;
        font-size: 32px; /* Slightly smaller for fit */
        display: flex;
        flex-direction: column;
        gap: 30px;
        width: 100%;
        align-items: center;
      }

      .feature-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 30px 60px;
        border-radius: 60px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        width: fit-content;
      }

      .background-grid {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: 
          radial-gradient(circle at 4px 4px, rgba(255,255,255,0.05) 2px, transparent 0);
        background-size: 80px 80px;
        z-index: -1;
      }

      .language-logo {
        font-size: 300px;
        margin-bottom: 50px;
        filter: drop-shadow(0 0 50px currentColor);
      }
    </style>

    <div class="background-grid"></div>

    <!-- Scene 1: Intro -->
    <div id="intro-scene" 
      class="clip" 
      data-start="0" 
      data-duration="5" 
      data-track-index="1">
      <h1 class="title-large">The Coding Core</h1>
      <p class="lang-subtitle">Powering AI</p>
    </div>

    <!-- Scene 2: Python -->
    <div id="python-scene" class="clip" data-start="5" data-duration="15" data-track-index="1">
      <div class="language-logo" style="color: var(--color-python)">PY</div>
      <h1 class="title-large" style="color: var(--color-python)">Python</h1>
      <p class="lang-subtitle">AI Multitool</p>
      <p class="lang-description" id="python-desc"></p>
      <div class="feature-list">
        <div class="feature-item">PyTorch</div>
        <div class="feature-item">Pandas</div>
        <div class="feature-item">SciKit-Learn</div>
      </div>
    </div>

    <!-- Scene 3: Java -->
    <div id="java-scene" class="clip" data-start="20" data-duration="15" data-track-index="1">
      <div class="language-logo" style="color: var(--color-java)">☕</div>
      <h1 class="title-large" style="color: var(--color-java)">Java</h1>
      <p class="lang-subtitle">Enterprise</p>
      <p class="lang-description" id="java-desc"></p>
      <div class="feature-list">
        <div class="feature-item">Spring Boot</div>
        <div class="feature-item">Kafka</div>
        <div class="feature-item">JVM</div>
      </div>
    </div>

    <!-- Scene 4: Rust -->
    <div id="rust-scene" class="clip" data-start="35" data-duration="15" data-track-index="1">
      <div class="language-logo" style="color: var(--color-rust)">⚙️</div>
      <h1 class="title-large" style="color: var(--color-rust)">Rust</h1>
      <p class="lang-subtitle">Safe & Swift</p>
      <p class="lang-description" id="rust-desc"></p>
      <div class="feature-list">
        <div class="feature-item">Actix</div>
        <div class="feature-item">Polars</div>
        <div class="feature-item">Wasm</div>
      </div>
    </div>

    <!-- Scene 5: JavaScript -->
    <div id="js-scene" class="clip" data-start="50" data-duration="15" data-track-index="1">
      <div class="language-logo" style="color: var(--color-js)">JS</div>
      <h1 class="title-large" style="color: var(--color-js)">JavaScript</h1>
      <p class="lang-subtitle">Control</p>
      <p class="lang-description" id="js-desc"></p>
      <div class="feature-list">
        <div class="feature-item">Node.js</div>
        <div class="feature-item">React</div>
        <div class="feature-item">TypeScript</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        const tl = gsap.timeline({ paused: true });

        const descriptions = {
            "python": "From machine learning to complex neural network orchestration, Python provides the syntax that speaks the language of AI.",
            "java": "Building high-throughput, stable automation pipelines that power the largest financial and corporate systems globally.",
            "rust": "Redefining performance with memory safety. Rust enables critical automation where zero-downtime and high-speed logic are required.",
            "js": "The universal bridge between the cloud and the browser. Transforming automation into interactive, real-time user experiences."
        };

        // Helper for kinetic effects
        const createKineticIn = (target, langKey, startAt) => {
            tl.from(target + " .language-logo", {
                scale: 0.5, y: -200, opacity: 0, duration: 1.2, ease: "back.out(2)"
            }, startAt);
            tl.from(target + " .title-large", {
                y: 100, opacity: 0, duration: 1, ease: "expo.out"
            }, startAt + 0.3);
            tl.from(target + " .lang-subtitle", {
                x: -50, opacity: 0, duration: 0.8, ease: "power2.out"
            }, startAt + 0.5);

            // Typewriter effect
            const descEl = document.getElementById(langKey + "-desc");
            const typingObj = { text: "" };
            tl.to(typingObj, {
                duration: 4,
                text: descriptions[langKey],
                onUpdate: () => {
                    descEl.innerText = typingObj.text;
                },
                ease: "none"
            }, startAt + 1);

            tl.from(target + " .feature-item", {
                x: -50, opacity: 0, stagger: 0.2, duration: 0.8, ease: "back.out(1.7)"
            }, startAt + 5);

            // Add glow pulses to features
            tl.to(target + " .feature-item", {
                borderColor: "rgba(255,255,255,0.6)",
                boxShadow: "0 0 30px rgba(0,229,255,0.5)",
                repeat: 3, 
                yoyo: true, 
                duration: 1,
                stagger: 0.2
            }, startAt + 7);
        };

        const createKineticOut = (target, startAt) => {
            tl.to(target, { opacity: 0, y: -200, duration: 0.8, ease: "power4.in" }, startAt);
        };

        // Intro
        tl.to("#intro-scene", { opacity: 1, duration: 0.1 }, 0);
        tl.from("#intro-scene .title-large", { scale: 2, opacity: 0, duration: 1.5, ease: "expo.out" }, 0.2);
        createKineticOut("#intro-scene", 4.2);

        // Python (5-20)
        tl.to("#python-scene", { opacity: 1, duration: 0.1 }, 5);
        createKineticIn("#python-scene", "python", 5.2);
        createKineticOut("#python-scene", 19.2);

        // Java (20-35)
        tl.to("#java-scene", { opacity: 1, duration: 0.1 }, 20);
        createKineticIn("#java-scene", "java", 20.2);
        createKineticOut("#java-scene", 34.2);

        // Rust (35-50)
        tl.to("#rust-scene", { opacity: 1, duration: 0.1 }, 35);
        createKineticIn("#rust-scene", "rust", 35.2);
        createKineticOut("#rust-scene", 49.2);

        // JavaScript (50-65)
        tl.to("#js-scene", { opacity: 1, duration: 0.1 }, 50);
        createKineticIn("#js-scene", "js", 50.2);
        tl.to("#js-scene", { opacity: 0, duration: 1 }, 64);

        window.__timelines = window.__timelines || {};
        window.__timelines["language-deep-dive"] = tl;
      })();
    </script>
  </div>
</template>
