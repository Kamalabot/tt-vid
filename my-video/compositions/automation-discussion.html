<template id="automation-discussion-template">
  <div
    data-composition-id="automation-discussion"
    data-width="1920"
    data-height="1080"
    data-duration="14.72"
    data-start="0"
  >
    <style>
      [data-composition-id="automation-discussion"] {
        background: #050508;
        font-family: 'Inter', sans-serif;
        color: #ffffff;
        overflow: hidden;
      }

      .clip {
        position: absolute;
        opacity: 0;
      }

      /* Scene 1: AI Prompt - Shifted Left & Narrower for PIP Safety */
      #ai-prompt-container {
        width: 800px;
        top: 50%;
        left: 80px; /* Shifted Left */
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 30px;
        backdrop-filter: blur(10px);
      }

      .prompt-header {
        font-size: 14px;
        color: #888;
        margin-bottom: 20px;
        font-family: 'Fira Code', monospace;
      }

      .prompt-text {
        font-size: 32px;
        font-weight: 500;
        line-height: 1.4;
      }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 32px;
        background: #00e5ff;
        margin-left: 5px;
        vertical-align: middle;
      }

      /* Scene 2: Code Skeleton - Shifted Left */
      #code-container {
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: flex-start; /* Shifted Left */
        padding-left: 100px;
        align-items: center;
        background: radial-gradient(circle at 20% 50%, #1a1a2e 0%, #050508 100%);
      }

      .code-block {
        font-family: 'Fira Code', monospace;
        font-size: 24px;
        color: #00e5ff;
        opacity: 0.8;
      }

      /* Scene 3: Synergy - Shifted Left */
      #synergy-container {
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start; /* Shifted Left */
        padding-left: 100px;
      }

      .glowing-orb {
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, #00e5ff 0%, rgba(0, 229, 255, 0) 70%);
        border-radius: 50%;
        filter: blur(20px);
        margin-bottom: 40px;
      }

      .main-title {
        font-size: 110px; /* Slightly larger for kinetic impact */
        font-weight: 900;
        letter-spacing: -6px;
        text-align: left;
        background: linear-gradient(135deg, #fff 0%, #888 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-top: 0;
        display: flex;
        gap: 2px;
      }

      .char {
        display: inline-block;
        transform-origin: bottom center;
      }

      .subtitle {
        font-size: 24px;
        color: #00e5ff;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-top: 10px;
      }
    </style>

    <!-- Scene 1: AI Prompt -->
    <div id="ai-prompt-container" class="clip" data-start="0" data-duration="4" data-track-index="1">
      <div class="prompt-header">HYPERFRAMES_AI_INTENT_v1.0</div>
      <div class="prompt-text">
        <span id="typing-text"></span><span class="cursor"></span>
      </div>
    </div>

    <!-- Scene 2: Code Precision -->
    <div id="code-container" class="clip" data-start="4" data-duration="4" data-track-index="1">
      <div class="code-block">
        <div class="code-line">gsap.to(".elements", {</div>
        <div class="code-line">&nbsp;&nbsp;duration: 1.2,</div>
        <div class="code-line">&nbsp;&nbsp;stagger: 0.1,</div>
        <div class="code-line">&nbsp;&nbsp;ease: "expo.out",</div>
        <div class="code-line">&nbsp;&nbsp;y: 0</div>
        <div class="code-line">});</div>
      </div>
    </div>

    <!-- Scene 3: Automated Excellence -->
    <div id="synergy-container" class="clip" data-start="8" data-duration="6.72" data-track-index="1">
      <div class="glowing-orb"></div>
      <h1 class="main-title" id="kinetic-title"></h1>
      <div class="subtitle">Efficiency at Scale</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        const tl = gsap.timeline({ paused: true });
        
        // --- Kinetic Text Preparation ---
        const titleStr = "AUTOMATION";
        const titleContainer = document.getElementById("kinetic-title");
        titleStr.split("").forEach(char => {
            const span = document.createElement("span");
            span.innerText = char;
            span.className = "char";
            titleContainer.appendChild(span);
        });

        // --- Scene 1 Animations ---
        const promptText = "Discuss the synergy between AI creative intent and coding-based automation...";
        const typingObj = { text: "" };
        
        tl.to("#ai-prompt-container", { opacity: 1, duration: 0.5 }, 0);
        tl.to(typingObj, {
          duration: 3,
          text: promptText,
          onUpdate: () => {
            document.getElementById("typing-text").innerText = typingObj.text;
          },
          ease: "none"
        }, 0.5);
        tl.to(".cursor", { opacity: 0, repeat: 7, duration: 0.5, yoyo: true }, 0);
        tl.to("#ai-prompt-container", { scale: 1.1, opacity: 0, duration: 0.5, ease: "power2.in" }, 3.5);

        // --- Scene 2 Animations ---
        tl.to("#code-container", { opacity: 1, duration: 0.5 }, 4);
        tl.from(".code-line", {
          opacity: 0,
          x: -50,
          stagger: 0.15,
          duration: 1,
          ease: "expo.out"
        }, 4.2);
        tl.to("#code-container", { 
            clipPath: "inset(0 0 100% 0)", 
            duration: 0.8, 
            ease: "expo.inOut" 
        }, 7.5);

        // --- Scene 3 Animations (Kinetic) ---
        tl.to("#synergy-container", { opacity: 1, duration: 0.5 }, 8);
        tl.from(".glowing-orb", { 
            scale: 0, 
            opacity: 0, 
            x: -100,
            duration: 1.5, 
            ease: "expo.out" 
        }, 8.2);
        
        // Kinetic Title Animation
        tl.from(".char", {
            y: 100,
            rotationX: -90,
            opacity: 0,
            stagger: 0.05,
            duration: 1,
            ease: "back.out(2)"
        }, 8.5);

        tl.from(".subtitle", { 
            opacity: 0, 
            y: 20,
            letterSpacing: "30px", 
            duration: 1.5, 
            ease: "power3.out" 
        }, 9);

        // Pulse
        tl.to(".glowing-orb", { 
          scale: 1.1, 
          opacity: 0.8,
          duration: 1.5, 
          repeat: 3, 
          yoyo: true, 
          ease: "sine.inOut" 
        }, 10);
        
        // Random drift for kinetic feel
        tl.to(".char", {
            y: "random(-5, 5)",
            repeat: 2,
            yoyo: true,
            duration: 2,
            stagger: 0.1,
            ease: "sine.inOut"
        }, 9.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["automation-discussion"] = tl;
      })();
    </script>
  </div>
</template>
