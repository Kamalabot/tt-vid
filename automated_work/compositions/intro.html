<template id="intro-root-template">
  <div
    data-composition-id="intro-root"
    data-start="0"
    data-duration="5"
    data-width="1080"
    data-height="1920">
    
    <style>
      #intro-root {
        position: relative;
        width: 1080px;
        height: 1920px;
      }
      #intro-title {
        position: absolute;
        top: 50%;
        left: 50%;
        text-align: center;
        width: 900px;
      }
      .word-line {
        display: block;
        overflow: hidden;
      }
    </style>
    
    <div id="intro-title"
         class="clip"
         data-start="0.5"
         data-duration="4.5"
         data-track-index="1">
      <div class="word-line">TOP 5</div>
      <div class="word-line" style="color: var(--primary)">OFFLINE</div>
      <div class="word-line" style="color: var(--secondary)">AI</div>
      <div class="word-line">POWER TOOLS</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        // Hyperframes expects timelines to be paused initially
        const tl = gsap.timeline({ paused: true });

        // Use xPercent/yPercent for centering instead of CSS transform
        gsap.set("#intro-title", { xPercent: -50, yPercent: -50 });

        tl.from("#intro-title .word-line", {
          y: 200,
          opacity: 0,
          duration: 0.8,
          stagger: 0.2,
          ease: "back.out(1.7)"
        }, 0.5);

        tl.to("#intro-title .word-line", {
          scale: 1.1,
          duration: 4,
          ease: "none"
        }, 0.5);

        tl.to("#intro-title", {
          opacity: 0,
          duration: 0.5,
          ease: "power2.in"
        }, 4.5);
        
        window.__timelines = window.__timelines || {};
        window.__timelines["intro-root"] = tl;
      })();
    </script>
  </div>
</template>
