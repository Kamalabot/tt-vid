<div id="sector-media" data-composition-id="sector-media" class="clip" data-start="0" data-duration="60" data-track-index="2" data-width="5000" data-height="500" style="position: absolute; width: 100%; height: 100%;">
  <style>
    .node {
      position: absolute;
      border: 2px solid rgba(34, 211, 238, 0.5);
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      border-radius: 20px;
      padding: 10px 20px;
      font-family: 'Fira Code', monospace;
      font-size: 24px;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .file-node-media {
      border-color: rgba(244, 63, 94, 0.6); /* Rose */
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.2);
      width: 140px;
      height: 60px;
    }

    .func-node-media {
      border-radius: 8px;
      border-color: rgba(167, 139, 250, 0.6); /* Purple */
      width: 220px;
      height: 60px;
      font-weight: 600;
    }

    .memory-node-media {
      width: 350px;
      height: 200px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .output-node-media {
      width: 300px;
      height: 200px;
      border: 2px solid rgba(56, 189, 248, 0.5); /* Blue */
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      padding: 15px;
      position: relative;
    }

    /* Vision matrix visualization */
    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
      margin-top: 10px;
      width: 100%;
    }
    .matrix-cell {
      background: rgba(244, 63, 94, 0.2);
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 2px 0;
      border-radius: 2px;
    }

    /* CV Output */
    .cv-box {
      width: 100px;
      height: 100px;
      border: 2px dashed #f43f5e;
      position: absolute;
      top: 50px;
      left: 100px;
      opacity: 0;
    }
    .cv-label {
      background: #f43f5e;
      color: white;
      font-size: 12px;
      padding: 2px 5px;
      position: absolute;
      top: -20px;
      left: -2px;
    }

    /* Audio waveform */
    .waveform-bar {
      width: 5px;
      background: #a78bfa;
      border-radius: 2px;
      margin: 0 2px;
      display: inline-block;
      vertical-align: middle;
    }
  </style>

  <!-- VISION FLOW (Top) -->
  <!-- Left: Files -->
  <div id="med-file-jpg" class="node file-node-media" style="top: 50px; left: 0;">.jpg</div>
  <div id="med-file-mp4" class="node file-node-media" style="top: 130px; left: 0;">.mp4</div>

  <!-- Center-Left: Parser -->
  <div id="med-func-cv2" class="node func-node-media" style="top: 90px; left: 350px;">
    cv2.imread()
  </div>

  <!-- Center: Memory Object -->
  <div id="med-memory-nd" class="node memory-node-media" style="top: 40px; left: 800px;">
    <div style="color: #f43f5e; font-size: 20px;">&lt;class 'numpy.ndarray'&gt;</div>
    <div class="matrix-grid">
      <div class="matrix-cell">255</div><div class="matrix-cell">128</div><div class="matrix-cell">64</div><div class="matrix-cell">32</div><div class="matrix-cell">16</div>
      <div class="matrix-cell">12</div><div class="matrix-cell">24</div><div class="matrix-cell">48</div><div class="matrix-cell">96</div><div class="matrix-cell">192</div>
      <div class="matrix-cell">200</div><div class="matrix-cell">150</div><div class="matrix-cell">100</div><div class="matrix-cell">50</div><div class="matrix-cell">25</div>
      <div class="matrix-cell">10</div><div class="matrix-cell">20</div><div class="matrix-cell">30</div><div class="matrix-cell">40</div><div class="matrix-cell">50</div>
    </div>
  </div>

  <!-- Right: Output -->
  <div id="med-output-cv" class="node output-node-media" style="top: 40px; left: 1600px;">
    <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: #f43f5e; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">Computer Vision</div>
    <!-- Simple shape to represent object -->
    <div style="width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; position: absolute; top: 60px; left: 110px;"></div>
    <div id="med-cv-box" class="cv-box"><div class="cv-label">person 98%</div></div>
  </div>


  <!-- AUDIO FLOW (Bottom) -->
  <!-- Left: Files -->
  <div id="med-file-wav" class="node file-node-media" style="top: 300px; left: 0;">.wav</div>

  <!-- Center-Left: Parser -->
  <div id="med-func-librosa" class="node func-node-media" style="top: 300px; left: 350px;">
    librosa.load()
  </div>

  <!-- Center: Memory Object -->
  <div id="med-memory-tensor" class="node memory-node-media" style="top: 260px; left: 800px;">
    <div style="color: #a78bfa; font-size: 20px;">&lt;class 'torch.Tensor'&gt;</div>
    <div style="margin-top: 40px; height: 60px; display: flex; align-items: center;">
      <div class="waveform-bar" style="height: 10px;"></div><div class="waveform-bar" style="height: 30px;"></div><div class="waveform-bar" style="height: 50px;"></div>
      <div class="waveform-bar" style="height: 20px;"></div><div class="waveform-bar" style="height: 60px;"></div><div class="waveform-bar" style="height: 40px;"></div>
      <div class="waveform-bar" style="height: 15px;"></div><div class="waveform-bar" style="height: 45px;"></div><div class="waveform-bar" style="height: 25px;"></div>
      <div class="waveform-bar" style="height: 10px;"></div><div class="waveform-bar" style="height: 35px;"></div><div class="waveform-bar" style="height: 55px;"></div>
    </div>
  </div>

  <!-- Right: Output -->
  <div id="med-output-stt" class="node output-node-media" style="top: 260px; left: 1600px;">
    <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: #a78bfa; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">Speech Recognition</div>
    <div id="stt-text" style="font-family: monospace; font-size: 16px; color: #e2e8f0; margin-top: 30px;"></div>
  </div>

</div>

<script>
  {
    const tl = gsap.timeline({ paused: true });

    // Initial states
    tl.set("#sector-media .node", { opacity: 0 });
    
    // Scene 4 timeframe is 24s - 36s. We animate entering around 24.5s.
    const startTime = 24.5;
    
    // Vision Flow Anim
    tl.to(["#med-file-jpg", "#med-file-mp4"], { opacity: 1, x: 20, stagger: 0.2, duration: 0.8, ease: "power2.out" }, startTime);
    tl.to("#med-func-cv2", { opacity: 1, scale: 1, duration: 0.6 }, startTime + 1);
    tl.to("#med-memory-nd", { opacity: 1, y: -20, duration: 1, ease: "back.out(1.7)" }, startTime + 2);
    tl.fromTo("#sector-media .matrix-cell", { opacity: 0.2 }, { opacity: 1, stagger: { each: 0.02, from: "random" }, duration: 0.5 }, startTime + 3);
    tl.to("#med-output-cv", { opacity: 1, duration: 0.5 }, startTime + 4);
    tl.to("#med-cv-box", { opacity: 1, scale: 1.1, duration: 0.3, yoyo: true, repeat: 1 }, startTime + 5);
    tl.to("#med-cv-box", { opacity: 1, duration: 0.1, overwrite: "auto" }, startTime + 5.6); // Lock in

    // Audio Flow Anim (starts slightly after Vision)
    const audioStart = startTime + 1.5;
    tl.to("#med-file-wav", { opacity: 1, x: 20, duration: 0.8, ease: "power2.out" }, audioStart);
    tl.to("#med-func-librosa", { opacity: 1, scale: 1, duration: 0.6 }, audioStart + 1);
    tl.to("#med-memory-tensor", { opacity: 1, y: -20, duration: 1, ease: "back.out(1.7)" }, audioStart + 2);
    
    // Pulse waveform
    tl.to("#sector-media .waveform-bar", { scaleY: 1.5, duration: 0.2, yoyo: true, repeat: 5, stagger: 0.05, ease: "power1.inOut" }, audioStart + 3);
    
    tl.to("#med-output-stt", { opacity: 1, duration: 0.5 }, audioStart + 4);
    tl.to("#stt-text", { text: "> Hello World. Recording active.", duration: 1.5, ease: "none" }, audioStart + 4.5);

    // Final convergence pulse (at 45s)
    tl.to("#sector-media .node", { boxShadow: "0 0 30px rgba(255,255,255,0.8)", duration: 0.5, yoyo: true, repeat: 1 }, 45);

    window.__timelines = window.__timelines || {};
    window.__timelines["sector-media"] = tl;
  }
</script>
