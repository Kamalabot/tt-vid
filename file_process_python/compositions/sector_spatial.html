<div id="sector-spatial" data-composition-id="sector-spatial" class="clip" data-start="0" data-duration="60" data-track-index="2" data-width="5000" data-height="500" style="position: absolute; width: 100%; height: 100%;">
  <style>
    .node {
      position: absolute;
      border: 2px solid rgba(34, 211, 238, 0.5);
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      border-radius: 20px;
      padding: 10px 20px;
      font-family: 'Fira Code', monospace;
      font-size: 24px;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .file-node-sp {
      border-color: rgba(20, 184, 166, 0.6); /* Teal */
      box-shadow: 0 0 15px rgba(20, 184, 166, 0.2);
      width: 160px;
      height: 60px;
    }

    .func-node-sp {
      border-radius: 8px;
      border-color: rgba(132, 204, 22, 0.6); /* Lime */
      width: 250px;
      height: 60px;
      font-weight: 600;
    }

    .memory-node-sp {
      width: 400px;
      height: 200px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .map-node {
      width: 300px;
      height: 250px;
      border: 2px solid rgba(20, 184, 166, 0.5); /* Teal */
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      padding: 15px;
      position: relative;
    }

    /* Abstract polygon drawing */
    .polygon-container {
      position: relative;
      width: 120px;
      height: 80px;
      margin-top: 20px;
    }
    
    .poly-line {
      position: absolute;
      background: rgba(132, 204, 22, 0.8);
      transform-origin: left center;
      opacity: 0;
    }
  </style>

  <!-- Left: Files -->
  <div id="sp-file-json" class="node file-node-sp" style="top: 80px; left: 0;">.geojson</div>
  <div id="sp-file-shp" class="node file-node-sp" style="top: 200px; left: 0;">.shp</div>

  <!-- Center-Left: Parser -->
  <div id="sp-func-gpd" class="node func-node-sp" style="top: 140px; left: 350px;">
    gpd.read_file()
  </div>

  <!-- Center: Memory Object -->
  <div id="sp-memory-gdf" class="node memory-node-sp" style="top: 100px; left: 800px;">
    <div style="color: #84cc16; font-size: 20px;">&lt;class 'geopandas.GeoDataFrame'&gt;</div>
    <div class="polygon-container">
      <!-- Lines that will animate to form a shape -->
      <div id="sp-line-1" class="poly-line" style="width: 50px; height: 2px; top: 10px; left: 10px; transform: rotate(20deg);"></div>
      <div id="sp-line-2" class="poly-line" style="width: 60px; height: 2px; top: 27px; left: 57px; transform: rotate(80deg);"></div>
      <div id="sp-line-3" class="poly-line" style="width: 70px; height: 2px; top: 86px; left: 67px; transform: rotate(190deg);"></div>
      <div id="sp-line-4" class="poly-line" style="width: 60px; height: 2px; top: 74px; left: -1px; transform: rotate(280deg);"></div>
    </div>
  </div>

  <!-- Right: Output -->
  <div id="sp-output-map" class="node map-node" style="top: 80px; left: 1600px;">
    <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: #14b8a6; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 20px;">GIS Mapping</div>
    <!-- Simple map visualization -->
    <svg width="250" height="150" viewBox="0 0 250 150">
      <path id="sp-map-path" d="M20 100 Q 50 20, 100 50 T 180 30 T 230 120" stroke="#14b8a6" stroke-width="3" fill="rgba(20,184,166,0.1)" stroke-dasharray="500" stroke-dashoffset="500" />
      <circle id="sp-map-pin" cx="100" cy="50" r="5" fill="#f43f5e" opacity="0" />
    </svg>
  </div>

</div>

<script>
  {
    const tl = gsap.timeline({ paused: true });

    // Initial states
    tl.set("#sector-spatial .node", { opacity: 0 });
    
    // Scene 5 timeframe is 36s - 45s. We animate entering around 36.5s.
    const startTime = 36.5;
    
    // Files appear
    tl.to(["#sp-file-json", "#sp-file-shp"], { opacity: 1, x: 20, stagger: 0.2, duration: 0.8, ease: "power2.out" }, startTime);

    // Function appears
    tl.to("#sp-func-gpd", { opacity: 1, scale: 1, duration: 0.6 }, startTime + 1);
    
    // Memory object appears
    tl.to("#sp-memory-gdf", { opacity: 1, y: -20, duration: 1, ease: "back.out(1.7)" }, startTime + 2);
    
    // Animate polygon lines drawing
    tl.to("#sp-line-1", { opacity: 1, scaleX: 1, duration: 0.2, ease: "none" }, startTime + 3);
    tl.to("#sp-line-2", { opacity: 1, scaleX: 1, duration: 0.2, ease: "none" }, startTime + 3.2);
    tl.to("#sp-line-3", { opacity: 1, scaleX: 1, duration: 0.2, ease: "none" }, startTime + 3.4);
    tl.to("#sp-line-4", { opacity: 1, scaleX: 1, duration: 0.2, ease: "none" }, startTime + 3.6);

    // Output Map appears
    tl.to("#sp-output-map", { opacity: 1, duration: 0.5 }, startTime + 4);
    
    // Map draws itself
    tl.to("#sp-map-path", { strokeDashoffset: 0, duration: 1.5, ease: "power1.inOut" }, startTime + 4.5);
    tl.to("#sp-map-pin", { opacity: 1, scale: 1.5, duration: 0.3, yoyo: true, repeat: 3 }, startTime + 6);
    tl.to("#sp-map-pin", { opacity: 1, scale: 1 }, startTime + 6.6); // Lock in

    // Final convergence pulse (at 45s)
    tl.to("#sector-spatial .node", { boxShadow: "0 0 30px rgba(255,255,255,0.8)", duration: 0.5, yoyo: true, repeat: 1 }, 45);

    window.__timelines = window.__timelines || {};
    window.__timelines["sector-spatial"] = tl;
  }
</script>
