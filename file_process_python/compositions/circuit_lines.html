<div id="circuit-lines" data-composition-id="circuit-lines" class="clip" data-start="0" data-duration="60" data-track-index="0" data-width="6000" data-height="3000" style="position: absolute; width: 100%; height: 100%; pointer-events: none;">
  <svg width="6000" height="3000" viewBox="0 0 6000 3000" xmlns="http://www.w3.org/2000/svg">
    <!-- Main Vertical Bus (Center) -->
    <path class="bus-line" d="M 3000 0 L 3000 3000" stroke="#38bdf8" stroke-width="4" stroke-dasharray="20 10" opacity="0.1" />
    <path class="bus-line" d="M 3050 0 L 3050 3000" stroke="#a78bfa" stroke-width="2" stroke-dasharray="10 5" opacity="0.1" />
    <path class="bus-line" d="M 2950 0 L 2950 3000" stroke="#4ade80" stroke-width="2" stroke-dasharray="10 5" opacity="0.1" />

    <!-- Horizontal Connections to Sectors -->
    <!-- Tabular (y=450) -->
    <path class="branch-line" d="M 3000 450 L 2500 450" stroke="#4ade80" stroke-width="2" opacity="0.1" />
    <!-- Text (y=1050) -->
    <path class="branch-line" d="M 3000 1050 L 2500 1050" stroke="#f472b6" stroke-width="2" opacity="0.1" />
    <!-- Media (y=1650) -->
    <path class="branch-line" d="M 3000 1650 L 2500 1650" stroke="#f43f5e" stroke-width="2" opacity="0.1" />
    <!-- Spatial (y=2250) -->
    <path class="branch-line" d="M 3000 2250 L 2500 2250" stroke="#14b8a6" stroke-width="2" opacity="0.1" />
    <!-- Binary (y=2850) -->
    <path class="branch-line" d="M 3000 2850 L 2500 2850" stroke="#cbd5e1" stroke-width="2" opacity="0.1" />
  </svg>
</div>

<script>
  {
    const tl = gsap.timeline({ paused: true });

    // During the "Convergence" (Scene 6) starting at 45s, the whole board lights up.
    tl.to(".bus-line, .branch-line", {
      opacity: 0.8,
      strokeWidth: "+=2",
      duration: 1,
      ease: "power2.inOut"
    }, 45);

    // Add a glowing pulse effect
    tl.to(".bus-line", {
      opacity: 1,
      filter: "drop-shadow(0 0 20px #38bdf8)",
      duration: 0.5,
      yoyo: true,
      repeat: 10
    }, 46);

    window.__timelines = window.__timelines || {};
    window.__timelines["circuit-lines"] = tl;
  }
</script>
