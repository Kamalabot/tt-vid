<div id="sector-binary" data-composition-id="sector-binary" class="clip" data-start="0" data-duration="60" data-track-index="2" data-width="5000" data-height="500" style="position: absolute; width: 100%; height: 100%;">
  <style>
    .node {
      position: absolute;
      border: 2px solid rgba(34, 211, 238, 0.5);
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      border-radius: 20px;
      padding: 10px 20px;
      font-family: 'Fira Code', monospace;
      font-size: 24px;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .file-node-bin {
      border-color: rgba(148, 163, 184, 0.6); /* Slate/Silver */
      box-shadow: 0 0 15px rgba(148, 163, 184, 0.2);
      width: 140px;
      height: 60px;
    }

    .func-node-bin {
      border-radius: 8px;
      border-color: rgba(203, 213, 225, 0.6); /* Lighter Silver */
      width: 250px;
      height: 60px;
      font-weight: 600;
    }

    .memory-node-bin {
      width: 350px;
      height: 200px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .output-node-bin {
      width: 300px;
      height: 200px;
      border: 2px solid rgba(148, 163, 184, 0.5);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      padding: 15px;
      position: relative;
    }

    /* Abstract code tree */
    .tree-line {
      width: 2px;
      background: rgba(148, 163, 184, 0.5);
      position: absolute;
    }
    .tree-node {
      width: 10px;
      height: 10px;
      background: #cbd5e1;
      border-radius: 50%;
      position: absolute;
      transform: translate(-4px, -4px);
    }

  </style>

  <!-- Left: Files -->
  <div id="bin-file-pkl" class="node file-node-bin" style="top: 80px; left: 0;">.pkl</div>
  <div id="bin-file-whl" class="node file-node-bin" style="top: 200px; left: 0;">.whl</div>

  <!-- Center-Left: Parser -->
  <div id="bin-func-load" class="node func-node-bin" style="top: 140px; left: 350px;">
    pickle.load()
  </div>

  <!-- Center: Memory Object -->
  <div id="bin-memory-ast" class="node memory-node-bin" style="top: 100px; left: 800px;">
    <div style="color: #cbd5e1; font-size: 20px;">&lt;class 'CustomObject'&gt;</div>
    <div style="position: relative; width: 100%; height: 120px; margin-top: 20px;">
      <!-- Tree structure -->
      <div id="tree-1" class="tree-line" style="height: 0px; left: 150px; top: 0;"></div>
      <div id="tree-node-1" class="tree-node" style="left: 150px; top: 0; opacity: 0;"></div>
      
      <div id="tree-2" class="tree-line" style="width: 0px; height: 2px; left: 100px; top: 40px;"></div>
      
      <div id="tree-3" class="tree-line" style="height: 0px; left: 100px; top: 40px;"></div>
      <div id="tree-node-2" class="tree-node" style="left: 100px; top: 40px; opacity: 0;"></div>
      <div id="tree-node-3" class="tree-node" style="left: 100px; top: 80px; opacity: 0;"></div>
      
      <div id="tree-4" class="tree-line" style="height: 0px; left: 200px; top: 40px;"></div>
      <div id="tree-node-4" class="tree-node" style="left: 200px; top: 40px; opacity: 0;"></div>
      <div id="tree-node-5" class="tree-node" style="left: 200px; top: 80px; opacity: 0;"></div>
    </div>
  </div>

  <!-- Right: Output -->
  <div id="bin-output-deploy" class="node output-node-bin" style="top: 100px; left: 1600px;">
    <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">Model Deployment</div>
    <div id="deploy-server" style="width: 100px; height: 100px; border: 2px solid #cbd5e1; border-radius: 8px; position: absolute; top: 60px; left: 100px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; opacity: 0;">
      <div style="width: 80%; height: 10px; background: rgba(255,255,255,0.2);"></div>
      <div style="width: 80%; height: 10px; background: rgba(255,255,255,0.2);"></div>
      <div style="width: 80%; height: 10px; background: rgba(255,255,255,0.2);"></div>
      <div id="server-light" style="width: 10px; height: 10px; background: #4ade80; border-radius: 50%;"></div>
    </div>
  </div>

</div>

<script>
  {
    const tl = gsap.timeline({ paused: true });

    // Initial states
    tl.set("#sector-binary .node", { opacity: 0 });
    
    // Scene 5.5 timeframe is 41s - 45s. We animate entering around 41.5s.
    const startTime = 41.5;
    
    // Files appear
    tl.to(["#bin-file-pkl", "#bin-file-whl"], { opacity: 1, x: 20, stagger: 0.2, duration: 0.5, ease: "power2.out" }, startTime);

    // Function appears
    tl.to("#bin-func-load", { opacity: 1, scale: 1, duration: 0.4 }, startTime + 0.5);
    
    // Memory object appears
    tl.to("#bin-memory-ast", { opacity: 1, y: -20, duration: 0.8, ease: "back.out(1.7)" }, startTime + 1);
    
    // Animate Tree structure
    tl.to("#tree-node-1", { opacity: 1, duration: 0.1 }, startTime + 1.5);
    tl.to("#tree-1", { height: "40px", duration: 0.2, ease: "none" }, startTime + 1.6);
    
    tl.to("#tree-2", { width: "100px", duration: 0.2, ease: "none" }, startTime + 1.8);
    
    tl.to(["#tree-node-2", "#tree-node-4"], { opacity: 1, duration: 0.1 }, startTime + 2);
    tl.to(["#tree-3", "#tree-4"], { height: "40px", duration: 0.2, ease: "none" }, startTime + 2.1);
    tl.to(["#tree-node-3", "#tree-node-5"], { opacity: 1, duration: 0.1 }, startTime + 2.3);

    // Output Deployment appears
    tl.to("#bin-output-deploy", { opacity: 1, duration: 0.5 }, startTime + 2.5);
    tl.to("#deploy-server", { opacity: 1, y: -10, duration: 0.5 }, startTime + 2.8);
    tl.to("#server-light", { opacity: 0.2, duration: 0.1, yoyo: true, repeat: 10 }, startTime + 3.3); // Blink light

    // Final convergence pulse (at 45s)
    tl.to("#sector-binary .node", { boxShadow: "0 0 30px rgba(255,255,255,0.8)", duration: 0.5, yoyo: true, repeat: 1 }, 45);

    window.__timelines = window.__timelines || {};
    window.__timelines["sector-binary"] = tl;
  }
</script>
