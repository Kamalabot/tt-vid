<div id="sector-text" data-composition-id="sector-text" class="clip" data-start="0" data-duration="60" data-track-index="2" data-width="5000" data-height="500" style="position: absolute; width: 100%; height: 100%;">
  <style>
    .node {
      position: absolute;
      border: 2px solid rgba(34, 211, 238, 0.5);
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      border-radius: 20px;
      padding: 10px 20px;
      font-family: 'Fira Code', monospace;
      font-size: 24px;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .file-node-text {
      border-color: rgba(251, 146, 60, 0.6); /* Orange */
      box-shadow: 0 0 15px rgba(251, 146, 60, 0.2);
      width: 140px;
      height: 60px;
    }

    .func-node-text {
      border-radius: 8px;
      border-color: rgba(56, 189, 248, 0.6); /* Light Blue */
      width: 220px;
      height: 60px;
      font-weight: 600;
    }

    .memory-node-text {
      width: 350px;
      height: 200px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      padding: 20px;
    }

    .llm-node {
      width: 350px;
      height: 250px;
      border: 2px solid rgba(244, 114, 182, 0.5); /* Pink */
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .chat-bubble {
      background: rgba(244, 114, 182, 0.2);
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #fce7f3;
      align-self: flex-start;
      max-width: 80%;
      opacity: 0;
    }

    .typing-indicator {
      width: 40px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-top: 10px;
      align-self: flex-start;
      opacity: 0;
    }
  </style>

  <!-- Left: Files -->
  <div id="txt-file-pdf" class="node file-node-text" style="top: 100px; left: 0;">.pdf</div>
  <div id="txt-file-txt" class="node file-node-text" style="top: 220px; left: 0;">.txt</div>
  <div id="txt-file-md" class="node file-node-text" style="top: 340px; left: 0;">.md</div>

  <!-- Center-Left: Parser -->
  <div id="txt-func-open" class="node func-node-text" style="top: 150px; left: 350px;">
    builtins.open()
  </div>
  <div id="txt-func-pdf" class="node func-node-text" style="top: 250px; left: 350px;">
    PyMuPDF
  </div>

  <!-- Center: Memory Object -->
  <div id="txt-memory-str" class="node memory-node-text" style="top: 125px; left: 800px;">
    <div style="color: #fb923c; font-size: 20px; margin-bottom: 10px;">&lt;class 'str'&gt;</div>
    <div id="txt-typing-text" style="color: #cbd5e1; font-size: 14px; line-height: 1.5; font-family: monospace;"></div>
  </div>

  <!-- Center-Right: NLP Processing -->
  <div id="txt-func-spacy" class="node func-node-text" style="top: 200px; left: 1250px; border-color: #f472b6;">
    spacy.nlp()
  </div>

  <!-- Right: Output -->
  <div id="txt-output-llm" class="node llm-node" style="top: 100px; left: 1600px;">
    <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: #f472b6; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">LLM Interface</div>
    <div id="llm-prompt" class="chat-bubble" style="align-self: flex-end; background: rgba(56, 189, 248, 0.2);">Summarize this document.</div>
    <div id="llm-typing" class="typing-indicator"></div>
    <div id="llm-response" class="chat-bubble">The document outlines the ecosystem...</div>
  </div>
</div>

<script>
  {
    const tl = gsap.timeline({ paused: true });

    // Initial states
    tl.set("#sector-text .node", { opacity: 0 });
    
    // Scene 3 timeframe is 16s - 24s. We animate entering around 16.5s.
    const startTime = 16.5;
    
    // Files appear
    tl.to(["#txt-file-pdf", "#txt-file-txt", "#txt-file-md"], { 
      opacity: 1, 
      x: 20, 
      stagger: 0.2, 
      duration: 0.8, 
      ease: "power2.out" 
    }, startTime);

    // Functions appear
    tl.to(["#txt-func-open", "#txt-func-pdf"], { opacity: 1, scale: 1, stagger: 0.2, duration: 0.6 }, startTime + 1);
    
    // Memory object appears
    tl.to("#txt-memory-str", { opacity: 1, y: -20, duration: 1, ease: "back.out(1.7)" }, startTime + 2);
    
    // Text typing effect inside string block
    tl.to("#txt-typing-text", { 
      text: "The quick brown fox jumps over the lazy dog. Natural language processing involves analyzing large amounts of unstructured data.", 
      duration: 2, 
      ease: "none" 
    }, startTime + 2.5);

    // NLP node appears
    tl.to("#txt-func-spacy", { opacity: 1, duration: 0.5 }, startTime + 4);

    // LLM Interface appears
    tl.to("#txt-output-llm", { opacity: 1, duration: 0.5 }, startTime + 4.5);
    
    // Chat sequence
    tl.to("#llm-prompt", { opacity: 1, y: -10, duration: 0.4 }, startTime + 5);
    tl.to("#llm-typing", { opacity: 1, duration: 0.2 }, startTime + 5.5);
    tl.to("#llm-typing", { opacity: 0, duration: 0.2, overwrite: "auto" }, startTime + 6.5);
    tl.to("#llm-response", { opacity: 1, y: -10, duration: 0.4 }, startTime + 6.6);

    // Final convergence pulse (at 45s)
    tl.to("#sector-text .node", { boxShadow: "0 0 30px rgba(255,255,255,0.8)", duration: 0.5, yoyo: true, repeat: 1 }, 45);

    window.__timelines = window.__timelines || {};
    window.__timelines["sector-text"] = tl;
  }
</script>
