<div id="sector-tabular" data-composition-id="sector-tabular" class="clip" data-start="0" data-duration="60" data-track-index="2" data-width="5000" data-height="500" style="position: absolute; width: 100%; height: 100%;">
  <style>
    .node {
      position: absolute;
      border: 2px solid rgba(34, 211, 238, 0.5); /* Cyan */
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      border-radius: 20px;
      padding: 10px 20px;
      font-family: 'Fira Code', monospace;
      font-size: 24px;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .file-node {
      border-color: rgba(74, 222, 128, 0.6); /* Green for tabular */
      box-shadow: 0 0 15px rgba(74, 222, 128, 0.2);
      width: 160px;
      height: 60px;
    }

    .func-node {
      border-radius: 8px;
      border-color: rgba(250, 204, 21, 0.6); /* Yellow */
      width: 250px;
      height: 80px;
      font-weight: 600;
    }

    .memory-node {
      width: 400px;
      height: 250px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .dashboard-node {
      width: 300px;
      height: 200px;
      border: 2px solid rgba(167, 139, 250, 0.5); /* Purple */
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      padding: 15px;
    }

    /* Grid for dataframe visual */
    .df-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      width: 100%;
      margin-top: 20px;
    }
    .df-cell {
      background: rgba(255,255,255,0.1);
      height: 20px;
      border-radius: 2px;
    }
    .df-cell.header { background: rgba(74, 222, 128, 0.3); }

    /* Dashboard charts visual */
    .chart-bar {
      width: 30px;
      background: #a78bfa;
      border-radius: 4px 4px 0 0;
      position: absolute;
      bottom: 20px;
    }
  </style>

  <!-- Left: Files -->
  <div id="tab-file-csv" class="node file-node" style="top: 100px; left: 0;">.csv</div>
  <div id="tab-file-pqt" class="node file-node" style="top: 220px; left: 0;">.parquet</div>
  <div id="tab-file-sql" class="node file-node" style="top: 340px; left: 0;">.sqlite</div>

  <!-- Center-Left: Parser -->
  <div id="tab-func-read" class="node func-node" style="top: 210px; left: 400px;">
    pandas.read_*()
  </div>

  <!-- Center: Memory Object -->
  <div id="tab-memory-df" class="node memory-node" style="top: 125px; left: 900px;">
    <div style="color: #4ade80; font-size: 20px;">&lt;class 'pandas.DataFrame'&gt;</div>
    <div class="df-grid">
      <div class="df-cell header"></div><div class="df-cell header"></div><div class="df-cell header"></div><div class="df-cell header"></div>
      <div class="df-cell"></div><div class="df-cell"></div><div class="df-cell"></div><div class="df-cell"></div>
      <div class="df-cell"></div><div class="df-cell"></div><div class="df-cell"></div><div class="df-cell"></div>
      <div class="df-cell"></div><div class="df-cell"></div><div class="df-cell"></div><div class="df-cell"></div>
    </div>
  </div>

  <!-- Right: Output -->
  <div id="tab-output-dash" class="node dashboard-node" style="top: 150px; left: 1600px; position: relative;">
    <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: #a78bfa; margin-bottom: 20px;">Financial Dashboard</div>
    <!-- Bars for chart -->
    <div id="tab-bar-1" class="chart-bar" style="height: 10px; left: 30px;"></div>
    <div id="tab-bar-2" class="chart-bar" style="height: 10px; left: 80px;"></div>
    <div id="tab-bar-3" class="chart-bar" style="height: 10px; left: 130px;"></div>
    <div id="tab-bar-4" class="chart-bar" style="height: 10px; left: 180px;"></div>
  </div>
</div>

<script>
  {
    const tl = gsap.timeline({ paused: true });

    // Initial states
    tl.set("#sector-tabular .node", { opacity: 0 });
    tl.set("#tab-output-dash", { opacity: 0 });
    
    // Scene 2 timeframe is 8s - 16s. We animate things entering around 8.5s.
    const startTime = 8.5;
    
    // Files appear
    tl.to(["#tab-file-csv", "#tab-file-pqt", "#tab-file-sql"], { 
      opacity: 1, 
      x: 20, 
      stagger: 0.2, 
      duration: 0.8, 
      ease: "power2.out" 
    }, startTime);

    // Function appears
    tl.to("#tab-func-read", { opacity: 1, scale: 1, duration: 0.6 }, startTime + 1);
    
    // Function pulses
    tl.to("#tab-func-read", { scale: 1.1, duration: 0.2, yoyo: true, repeat: 1, ease: "power1.inOut", overwrite: "auto" }, startTime + 2);

    // Memory object appears
    tl.to("#tab-memory-df", { opacity: 1, y: -20, duration: 1, ease: "back.out(1.7)" }, startTime + 2.5);
    
    // DataFrame cells animation (sorting/processing effect)
    tl.fromTo(".df-cell:not(.header)", { opacity: 0.2 }, { opacity: 1, stagger: { each: 0.05, from: "random" }, duration: 0.5 }, startTime + 3.5);

    // Dashboard appears
    tl.to("#tab-output-dash", { opacity: 1, duration: 0.5 }, startTime + 4.5);
    
    // Chart bars grow
    tl.to("#tab-bar-1", { height: "100px", duration: 1, ease: "power2.out" }, startTime + 5);
    tl.to("#tab-bar-2", { height: "140px", duration: 1, ease: "power2.out" }, startTime + 5.2);
    tl.to("#tab-bar-3", { height: "60px", duration: 1, ease: "power2.out" }, startTime + 5.4);
    tl.to("#tab-bar-4", { height: "120px", duration: 1, ease: "power2.out" }, startTime + 5.6);

    // Final convergence pulse (at 45s)
    tl.to("#sector-tabular .node", { boxShadow: "0 0 30px rgba(255,255,255,0.8)", duration: 0.5, yoyo: true, repeat: 1 }, 45);

    window.__timelines = window.__timelines || {};
    window.__timelines["sector-tabular"] = tl;
  }
</script>
