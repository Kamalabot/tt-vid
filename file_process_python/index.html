<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/TextPlugin.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0f172a; /* Slate 900 */
        font-family: 'Inter', sans-serif;
        color: #f8fafc;
      }
      
      /* Grid Background to sell the Blueprint look */
      #grid-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background-size: 60px 60px;
        background-image: 
          linear-gradient(to right, rgba(30, 41, 59, 0.8) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(30, 41, 59, 0.8) 1px, transparent 1px);
        z-index: 0;
      }

      /* The massive virtual camera container */
      #world-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 6000px;
        height: 3000px;
        transform-origin: 0 0;
        z-index: 1;
        /* Will be controlled purely by GSAP x, y, scale */
      }
      
      .clip {
        /* Required by HyperFrames framework for visibility control */
        visibility: visible; 
      }
      
      .overlay-text {
        position: absolute;
        z-index: 10;
        width: 1920px;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
        font-size: 120px;
        font-weight: 800;
        letter-spacing: 10px;
        color: #38bdf8;
        text-shadow: 0 0 40px rgba(56, 189, 248, 0.5);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="60"
      data-width="1920"
      data-height="1080"
    >
      <div id="grid-bg"></div>

      <!-- The virtual camera container holding everything -->
      <div id="world-container" class="clip" data-start="0" data-duration="60" data-track-index="1">
        
        <!-- Sub-compositions will go here -->
        <div data-composition-src="compositions/circuit_lines.html" data-composition-id="circuit-lines" style="position: absolute; width: 100%; height: 100%;"></div>
        <div data-composition-src="compositions/sector_tabular.html" data-composition-id="sector-tabular" style="position: absolute; top: 200px; left: 400px; width: 5000px; height: 500px;"></div>
        <div data-composition-src="compositions/sector_text.html" data-composition-id="sector-text" style="position: absolute; top: 800px; left: 400px; width: 5000px; height: 500px;"></div>
        <div data-composition-src="compositions/sector_media.html" data-composition-id="sector-media" style="position: absolute; top: 1400px; left: 400px; width: 5000px; height: 500px;"></div>
        <div data-composition-src="compositions/sector_spatial.html" data-composition-id="sector-spatial" style="position: absolute; top: 2000px; left: 400px; width: 5000px; height: 500px;"></div>
        <div data-composition-src="compositions/sector_binary.html" data-composition-id="sector-binary" style="position: absolute; top: 2600px; left: 400px; width: 5000px; height: 500px;"></div>
        
      </div>
      
      <!-- Overlay UI -->
      <div id="intro-text" class="clip overlay-text" data-start="0" data-duration="8" data-track-index="2">
        PYTHON DATA ECOSYSTEM
      </div>
      
      <div id="outro-text" class="clip overlay-text" data-start="48" data-duration="12" data-track-index="2">
        THE UNIVERSAL PROCESSOR
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      // Calculate initial scale to fit the 6000x3000 world into 1920x1080
      // 1920 / 6000 = 0.32, 1080 / 3000 = 0.36. Use 0.3
      const macroScale = 0.3;
      const macroX = 60; // Center it a bit
      const macroY = 90;

      // --- MASTER CAMERA TIMELINE ---
      
      // Initial Setup (Scene 1: Macro View 0s - 8s)
      tl.set("#world-container", { scale: macroScale, x: macroX, y: macroY }, 0);
      tl.from("#intro-text", { opacity: 0, scale: 0.9, duration: 2, ease: "power2.out" }, 1);
      tl.to("#intro-text", { opacity: 0, scale: 1.1, duration: 1.5, ease: "power2.in" }, 6.5);

      // Scene 2: Zoom on Tabular (8s - 16s)
      // Top sector is around y=200. We want to scale up to 1.0.
      tl.to("#world-container", { scale: 1.0, x: -300, y: -100, duration: 2.5, ease: "power3.inOut" }, 8);

      // Scene 3: Pan to Text (16s - 24s)
      // Text sector is around y=800.
      tl.to("#world-container", { x: -300, y: -700, duration: 2.5, ease: "power3.inOut" }, 16);

      // Scene 4: Pan to Media (24s - 36s)
      // Media sector is around y=1400.
      tl.to("#world-container", { x: -300, y: -1300, duration: 2.5, ease: "power3.inOut" }, 24);

      // Scene 5: Pan to Spatial (36s - 41s)
      // Spatial sector is around y=2000.
      tl.to("#world-container", { x: -300, y: -1900, duration: 2.5, ease: "power3.inOut" }, 36);

      // Scene 5.5: Pan to Binary (41s - 45s)
      // Binary sector is around y=2600.
      tl.to("#world-container", { x: -300, y: -2500, duration: 2.5, ease: "power3.inOut" }, 41);

      // Scene 6: Full Circuit Out (45s - 55s)
      tl.to("#world-container", { scale: macroScale, x: macroX, y: macroY, duration: 3, ease: "power4.inOut" }, 45);
      
      // Outro (48s - 60s)
      tl.from("#outro-text", { opacity: 0, scale: 0.9, duration: 2, ease: "power2.out" }, 48);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
