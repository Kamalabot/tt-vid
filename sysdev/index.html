<!doctype html>
<html lang="ta">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920" />
  <title>Hyperframes - Automation Stack</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <style>
    html,
    body {
      width: 1080px;
      height: 1920px;
      margin: 0;
      padding: 0;
      background: #0f1115;
      /* Restoring the tinted background */
      overflow: hidden;
    }

    .stack-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 1080px;
      height: 1920px;
      gap: 30px;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 100; /* Boosted z-index */
    }

    .stack-line {
      font-family: var(--font-tamil);
      font-size: 70px;
      font-weight: 700;
      text-align: center;
      padding: 15px 30px;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); /* Added shadow to prevent "fading" look */
    }

    .highlight {
      color: var(--accent-cyan);
      font-weight: 900;
    }
  </style>
</head>

<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
    <!-- Background Blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <!-- Content Stack -->
    <div class="stack-container">
      <div id="line1" class="clip stack-line" data-start="0" data-duration="5" data-track-index="1">
        சாட் ஜிபிடி இல்லனா க்லாட் கோடு
      </div>
      <div id="line2a" class="clip stack-line" data-start="1" data-duration="4" data-track-index="2">
        வர்க்-அ சொன்னா
      </div>
      <div id="line2b" class="clip stack-line" data-start="2" data-duration="3" data-track-index="3">
        அது <span class="highlight">ஆட்டோமேட்</span> செய்யுது.
      </div>
    </div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // Background Animations
    tl.to(".blob-1", { x: 400, y: 300, duration: 5, ease: "sine.inOut" }, 0);
    tl.to(".blob-2", { x: -300, y: -500, duration: 5, ease: "sine.inOut" }, 0);
    tl.to(".blob-3", { scale: 1.5, opacity: 0.2, duration: 2.5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 0);

    // Ensure clips are visible
    tl.set(".clip", { visibility: "visible" }, 0);

    // Line 1: Enter (0.0s)
    tl.fromTo("#line1",
      { y: 300, autoAlpha: 0, scale: 0.8 },
      { y: 0, autoAlpha: 1, scale: 1, duration: 0.6, ease: "back.out(0.2)" },
      0
    );

    // Line 2a: Enter (1.0s)
    tl.fromTo("#line2a",
      { y: 300, autoAlpha: 0, scale: 0.8 },
      { y: 0, autoAlpha: 1, scale: 1, duration: 0.6, ease: "back.out(0.2)" },
      1
    );
    // PUSH UP Line 1
    tl.to("#line1", { y: "-=180", duration: 0.6, ease: "power3.inOut" }, 1);

    // Line 2b: Enter (2.0s)
    tl.fromTo("#line2b",
      { y: 300, autoAlpha: 0, scale: 0.8 },
      { y: 0, autoAlpha: 1, scale: 1, duration: 0.6, ease: "back.out(0.2)" },
      2
    );
    // PUSH UP Line 1 and 2a
    tl.to(["#line1", "#line2a"], { y: "-=180", duration: 0.6, ease: "power3.inOut" }, 2);

    // Hard kill at the very end
    tl.set(["#line1", "#line2a", "#line2b"], { autoAlpha: 0 }, 5.0);

    window.__timelines["main"] = tl;
  </script>
</body>

</html>
