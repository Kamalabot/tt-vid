<!doctype html>
<html lang="ta">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../index.css">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <style>
      html, body {
        width: 1080px;
        height: 1920px;
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden;
      }
      .stack-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 1080px;
        height: 1920px;
        gap: 30px;
        background: transparent !important;
      }
      .stack-line {
        font-family: var(--font-tamil);
        font-size: 70px;
        font-weight: 700;
        text-align: center;
        padding: 15px 30px;
        background: rgba(0, 0, 0, 0.4); /* Darker background instead of white-ish */
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
        width: 80%;
        max-width: 900px;
        color: #ffffff;
      }
      .highlight {
        color: var(--accent-cyan);
        font-weight: 900;
      }
    </style>
  </head>
  <body class="sub-comp">
    <div
      id="automation-stack"
      data-composition-id="automation-stack"
      data-start="0"
      data-duration="5"
      data-width="1080"
      data-height="1920"
      class="stack-container"
    >
      <div id="line1" class="clip stack-line" data-start="0" data-duration="5" data-track-index="1">
        சாட் ஜிபிடி இல்லனா க்லாட் கோடு
      </div>
      <div id="line2a" class="clip stack-line" data-start="1" data-duration="4" data-track-index="2">
        வர்க்-அ சொன்னா
      </div>
      <div id="line2b" class="clip stack-line" data-start="2" data-duration="3" data-track-index="3">
        அது <span class="highlight">ஆட்டோமேட்</span> செய்யுது.
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Ensure clips are visible when their time comes (framework usually does this, but being explicit)
      tl.set(".clip", { visibility: "visible" }, 0);

      // Line 1: Enter (0.0s)
      tl.fromTo("#line1", 
        { y: 100, autoAlpha: 0, scale: 0.8 }, 
        { y: 0, autoAlpha: 1, scale: 1, duration: 0.6, ease: "back.out(1.7)" }, 
        0
      );

      // Line 2a: Enter (1.0s)
      tl.fromTo("#line2a", 
        { y: 100, autoAlpha: 0, scale: 0.8 }, 
        { y: 0, autoAlpha: 1, scale: 1, duration: 0.6, ease: "back.out(1.7)" }, 
        1
      );
      tl.to("#line1", { y: -20, duration: 0.4 }, 1);

      // Line 2b: Enter (2.0s)
      tl.fromTo("#line2b", 
        { y: 100, autoAlpha: 0, scale: 0.8 }, 
        { y: 0, autoAlpha: 1, scale: 1, duration: 0.6, ease: "back.out(1.7)" }, 
        2
      );
      tl.to(["#line1", "#line2a"], { y: "-=30", duration: 0.4 }, 2);

      // Hard kills
      tl.set(["#line1", "#line2a", "#line2b"], { autoAlpha: 0 }, 5.0);

      window.__timelines["automation-stack"] = tl;
    </script>
  </body>
</html>
