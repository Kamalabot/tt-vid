<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="24"
      data-width="1080"
      data-height="1920"
    >
      <div data-composition-src="compositions/intro.html" data-composition-id="intro" 
           class="clip" data-start="0" data-duration="4" data-track-index="1"></div>
      
      <div data-composition-src="compositions/summary.html" data-composition-id="summary" 
           class="clip" data-start="4" data-duration="4" data-track-index="1"></div>
      
      <div data-composition-src="compositions/skills.html" data-composition-id="skills" 
           class="clip" data-start="8" data-duration="4" data-track-index="1"></div>
      
      <div data-composition-src="compositions/experience.html" data-composition-id="experience" 
           class="clip" data-start="12" data-duration="4" data-track-index="1"></div>
      
      <div data-composition-src="compositions/achievements.html" data-composition-id="achievements" 
           class="clip" data-start="16" data-duration="4" data-track-index="1"></div>
      
      <div data-composition-src="compositions/outro.html" data-composition-id="outro" 
           class="clip" data-start="20" data-duration="4" data-track-index="1"></div>
    </div>

    <script>
      // Master timeline to manage slide visibility (the "leaving" logic)
      const masterTl = gsap.timeline({ paused: true });
      
      // Explicitly show/hide each host based on the 4s sequence
      const slides = ["intro", "summary", "skills", "experience", "achievements", "outro"];
      
      slides.forEach((id, index) => {
        const start = index * 4;
        // Show
        masterTl.set(`[data-composition-id="${id}"]`, { visibility: 'visible', opacity: 1 }, start);
        // Hide
        masterTl.set(`[data-composition-id="${id}"]`, { visibility: 'hidden', opacity: 0 }, start + 4);
      });

      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = masterTl;
    </script>
  </body>
</html>
