<template id="skills-template">
  <div id="skills-comp" 
       data-composition-id="skills"
       data-start="0" data-duration="4"
       data-width="1080" data-height="1920">
    
    <div class="slide-container">
      <h2>Tech Arsenal</h2>
      
      <div class="skills-stack">
        <div class="skill-category sk-cat" style="border-left-color: var(--accent-primary);">
          <h3>GenAI & LLMs</h3>
          <div class="skill-list">
            <span class="skill-tag sk-tag">Llama 3</span>
            <span class="skill-tag sk-tag">DSPy</span>
            <span class="skill-tag sk-tag">LangChain</span>
            <span class="skill-tag sk-tag">PyTorch</span>
            <span class="skill-tag sk-tag">RAG</span>
          </div>
        </div>

        <div class="skill-category sk-cat" style="border-left-color: var(--accent-secondary);">
          <h3>Backend & Ops</h3>
          <div class="skill-list">
            <span class="skill-tag sk-tag">Django</span>
            <span class="skill-tag sk-tag">FastAPI</span>
            <span class="skill-tag sk-tag">AWS SageMaker</span>
            <span class="skill-tag sk-tag">GCP VertexAI</span>
          </div>
        </div>

        <div class="skill-category sk-cat" style="border-left-color: var(--accent-tertiary);">
          <h3>Data Science</h3>
          <div class="skill-list">
            <span class="skill-tag sk-tag">Pandas</span>
            <span class="skill-tag sk-tag">NLP</span>
            <span class="skill-tag sk-tag">Seaborn</span>
            <span class="skill-tag sk-tag">Faiss</span>
          </div>
        </div>

        <div class="skill-category sk-cat" style="border-left-color: #fff;">
          <h3>Observability</h3>
          <div class="skill-list">
            <span class="skill-tag sk-tag">Phoenix AI</span>
            <span class="skill-tag sk-tag">Haystack</span>
            <span class="skill-tag sk-tag">Pytest</span>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const scope = '[data-composition-id="skills"]';
      
      tl.from(`${scope} .slide-container`, { opacity: 0, y: 50, duration: 0.6, ease: "power2.out" }, 0.2)
        .from(`${scope} h2`, { opacity: 0, scale: 0.8, duration: 0.5 }, 0.4)
        .from(`${scope} .sk-cat`, { 
          opacity: 0, 
          x: -50, 
          stagger: 0.15, 
          duration: 0.5, 
          ease: "back.out(1.4)" 
        }, 0.6)
        .from(`${scope} .sk-tag`, {
          opacity: 0,
          scale: 0,
          stagger: 0.05,
          duration: 0.4,
          ease: "back.out(2)"
        }, 1)
        .to({}, { duration: 4 });
      
      window.__timelines["skills"] = tl;
    </script>
  </div>
</template>
