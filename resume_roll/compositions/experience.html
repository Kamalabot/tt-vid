<template id="experience-template">
  <div id="experience-comp" 
       data-composition-id="experience"
       data-start="0" data-duration="4"
       data-width="1080" data-height="1920">
    
    <div class="slide-container">
      <h2>Professional Journey</h2>
      <div class="v-timeline">
        <div class="v-item exp-i">
          <div class="date">2022 - PRESENT</div>
          <h3>AI Engineer & Consultant</h3>
          <p class="role">Building RAG & GenAI Pipelines</p>
        </div>
        <div class="v-item exp-i">
          <div class="date">2014 - 2022</div>
          <h3>Manager @ Nidec India</h3>
          <p class="role">Market Intelligence & Data Automation</p>
        </div>
        <div class="v-item exp-i">
          <div class="date">2010 - 2014</div>
          <h3>Sales @ Delta Electronics</h3>
          <p class="role">Industrial cooling solutions ($2.5M Wins)</p>
        </div>
        <div class="v-item exp-i">
          <div class="date">2008 - 2010</div>
          <h3>Thermal Engineer @ Wipro</h3>
          <p class="role">HPC & Network Thermal Analysis</p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const scope = '[data-composition-id="experience"]';
      
      tl.from(`${scope} .slide-container`, { opacity: 0, scale: 0.9, duration: 0.6, ease: "back.out" }, 0.2)
        .from(`${scope} .v-timeline::before`, { scaleY: 0, transformOrigin: "top", duration: 1, ease: "power2.inOut" }, 0.5)
        .from(`${scope} .exp-i`, { 
          opacity: 0, 
          x: 40, 
          stagger: 0.15, 
          duration: 0.5,
          ease: "back.out(1.2)"
        }, 0.8)
        .from(`${scope} .exp-i::before`, {
          scale: 0,
          stagger: 0.15,
          duration: 0.4,
          ease: "back.out(3)"
        }, 0.8)
        .to({}, { duration: 4 });
      
      window.__timelines["experience"] = tl;
    </script>
  </div>
</template>
