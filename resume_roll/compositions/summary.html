<template id="summary-template">
  <div id="summary-comp" 
       data-composition-id="summary"
       data-start="0" data-duration="4"
       data-width="1080" data-height="1920">
    
    <div class="shape circle" style="width: 700px; height: 700px; background: var(--accent-tertiary); top: 10%; right: -300px; opacity: 0.3;"></div>
    
    <div class="slide-container">
      <h2 id="summary-title">Executive Summary</h2>
      <div id="summary-line" style="width: 300px; height: 8px; background: linear-gradient(90deg, var(--accent-primary), transparent); margin-bottom: 20px;"></div>
      
      <p class="summary-p" style="color: var(--text-primary); font-size: 42px; font-weight: 800; margin-bottom: 20px; line-height: 1.1;">
        Senior Python Consultant & <span style="color: var(--accent-secondary)">AI Transformation Leader</span>
      </p>
      
      <p class="summary-p" style="font-size: 32px; line-height: 1.4; color: var(--text-secondary);">
        Bridge the gap between <strong>Mechanical Engineering</strong> and <strong>Modern AI</strong>. 
        Expert in building <strong>Production RAG Pipelines</strong> and <strong>LLM Frameworks</strong>.
      </p>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px;">
        <div class="mini-card s-card">
          <div class="c-label">15+ YEARS</div>
          <div class="c-txt">Hybrid Exp</div>
        </div>
        <div class="mini-card s-card">
          <div class="c-label">OSS SME</div>
          <div class="c-txt">Mentorship</div>
        </div>
      </div>

      <div class="badge s-badge" style="background: rgba(255,255,255,0.05); border: 1px solid var(--accent-tertiary); width: 100%; text-align: center; margin-top: auto;">
        YouTube: @InsightBuilder
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const scope = '[data-composition-id="summary"]';
      
      tl.from(`${scope} .slide-container`, { opacity: 0, x: 100, duration: 0.7, ease: "power2.out" }, 0.2)
        .from(`${scope} #summary-title`, { opacity: 0, x: -50, duration: 0.6 }, 0.4)
        .from(`${scope} .summary-p`, { opacity: 0, y: 40, stagger: 0.2, duration: 0.6, ease: "back.out" }, 0.6)
        .from(`${scope} .s-card`, { opacity: 0, scale: 0.8, stagger: 0.1, duration: 0.5, ease: "back.out(2)" }, 1)
        .from(`${scope} .s-badge`, { opacity: 0, y: 20, duration: 0.5 }, 1.4)
        .to({}, { duration: 4 });
      
      window.__timelines["summary"] = tl;
    </script>
  </div>
</template>
