<template id="achievements-template">
  <div id="achievements-comp" 
       data-composition-id="achievements"
       data-start="0" data-duration="4"
       data-width="1080" data-height="1920">
    
    <div class="slide-container">
      <h2>Proven Impact</h2>
      
      <div class="ach-grid">
        <div class="achievement-card ach-card">
          <div class="val ach-val">$2.5M+</div>
          <h4>New Business Revenue</h4>
        </div>

        <div class="achievement-card ach-card">
          <div class="val ach-val">200/hr</div>
          <h4>AI Automation Rate</h4>
        </div>

        <div class="achievement-card ach-card">
          <div class="val ach-val">35 Hours</div>
          <h4>Monthly Time Savings</h4>
        </div>

        <div class="achievement-card ach-card">
          <div class="val ach-val">6 Months</div>
          <h4>Dev Cycle Reduction</h4>
        </div>
      </div>
      
      <div style="margin-top: auto; font-size: 28px; opacity: 0.7; font-style: italic; text-align: center;">
        Successfully transitioned 3 developers to GenAI roles.
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const scope = '[data-composition-id="achievements"]';
      
      tl.from(`${scope} .slide-container`, { opacity: 0, rotation: -2, duration: 0.6 }, 0.2)
        .from(`${scope} h2`, { opacity: 0, scale: 0.5, duration: 0.5, ease: "back.out" }, 0.4)
        .from(`${scope} .ach-card`, { 
          opacity: 0, 
          y: 30, 
          stagger: 0.1, 
          duration: 0.5,
          ease: "power2.out"
        }, 0.6)
        .from(`${scope} .ach-val`, {
          opacity: 0,
          scale: 1.5,
          stagger: 0.1,
          duration: 0.7,
          ease: "back.out(2)"
        }, 0.8)
        .to({}, { duration: 4 });
      
      window.__timelines["achievements"] = tl;
    </script>
  </div>
</template>
