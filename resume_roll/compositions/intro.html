<template id="intro-template">
  <!-- Root div is just a wrapper for the loader -->
  <div id="intro-comp" 
       data-composition-id="intro"
       data-start="0" data-duration="4"
       data-width="1080" data-height="1920">
    
    <!-- Shapes and content are direct children of the host (which is the clip) -->
    <div class="shape circle" style="width: 800px; height: 800px; background: var(--accent-primary); top: -200px; left: -200px;"></div>
    <div class="shape circle" style="width: 600px; height: 600px; background: var(--accent-secondary); bottom: 100px; right: -200px;"></div>
    
    <div class="slide-container" style="justify-content: center; align-items: center; text-align: center;">
      <div class="badge" style="margin-bottom: 40px;">TOP RATED DEVELOPER</div>
      <h1 id="intro-name">M M Kamalraj</h1>
      <div id="intro-line" style="width: 150px; height: 12px; background: var(--accent-tertiary); margin: 40px 0; border-radius: 6px;"></div>
      <p id="intro-headline" style="color: var(--text-primary); font-weight: 800; font-size: 54px; letter-spacing: -1px;">AI & AUTOMATION SPECIALIST</p>
      <p id="intro-sub" style="font-size: 36px; margin-top: 20px; opacity: 0.8;">Senior Python Developer | OSS SME</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const scope = '[data-composition-id="intro"]';
      
      tl.from(`${scope} .slide-container`, { opacity: 0, scale: 0.8, duration: 0.8, ease: "back.out(1.2)" }, 0.2)
        .from(`${scope} #intro-name`, { opacity: 0, y: 50, duration: 0.6, ease: "power4.out" }, 0.4)
        .from(`${scope} .badge`, { scale: 0, rotation: -20, duration: 0.7, ease: "back.out(2)" }, 0.6)
        .from(`${scope} #intro-line`, { width: 0, duration: 0.8, ease: "expo.out" }, 0.8)
        .from(`${scope} #intro-headline`, { opacity: 0, x: -30, duration: 0.6 }, 1)
        .from(`${scope} #intro-sub`, { opacity: 0, y: 20, duration: 0.6 }, 1.2)
        .to({}, { duration: 4 });
      
      window.__timelines["intro"] = tl;
    </script>
  </div>
</template>
