<template id="outro-template">
  <div id="outro-comp" 
       data-composition-id="outro"
       data-start="0" data-duration="4"
       data-width="1080" data-height="1920">
    
    <div class="shape circle" style="width: 1000px; height: 1000px; background: radial-gradient(circle, var(--accent-primary), transparent); top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.3; filter: blur(150px);"></div>
    
    <div class="slide-container" style="justify-content: center; align-items: center;">
      <h1 style="font-size: 110px; text-align: center; line-height: 0.9;">Work With Me</h1>
      <p style="text-align: center; font-size: 40px; font-weight: 700; margin-top: 10px;">M M Kamalraj</p>
      
      <div class="contact-v">
        <div class="c-item out-c">
          <div class="c-label">Email</div>
          <div class="c-val">kamaljp@gmail.com</div>
        </div>
        <div class="c-item out-c">
          <div class="c-label">YouTube</div>
          <div class="c-val">@insightbuilder</div>
        </div>
        <div class="c-item out-c">
          <div class="c-label">LinkedIn</div>
          <div class="c-val">in/kamalrajmm</div>
        </div>
      </div>

      <div class="badge" id="hire-badge" style="margin-top: 50px; font-size: 32px; padding: 25px 50px;">AVAILABLE NOW</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const scope = '[data-composition-id="outro"]';
      
      tl.from(`${scope} h1`, { opacity: 0, scale: 1.5, duration: 0.8, ease: "back.out(1.5)" }, 0.2)
        .from(`${scope} p`, { opacity: 0, y: 20, duration: 0.6 }, 0.6)
        .from(`${scope} .out-c`, { 
          opacity: 0, 
          y: 40, 
          stagger: 0.15, 
          duration: 0.6,
          ease: "power2.out"
        }, 0.8)
        .from(`${scope} #hire-badge`, { 
          opacity: 0, 
          scale: 0.5, 
          duration: 0.7,
          ease: "back.out(2.5)"
        }, 1.5)
        .to({}, { duration: 4 });
      
      window.__timelines["outro"] = tl;
    </script>
  </div>
</template>
