<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <title>AI & Domain Mastery</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/TextPlugin.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent: #00f2ff;
            --secondary: #bc13fe;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1920px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans Tamil', 'Outfit', sans-serif;
            overflow: hidden;
        }

        #root { width: 1080px; height: 1920px; position: relative; overflow: hidden; }

        .background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('assets/bg.png') center/cover no-repeat;
            filter: brightness(0.4) saturate(1.2);
            z-index: -1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            text-align: center;
        }

        .main-text {
            font-size: 84px;
            font-weight: 900;
            line-height: 1.2;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(50px);
        }

        .highlight {
            color: var(--accent);
            display: block;
            font-size: 110px;
            margin-top: 20px;
        }

        .sub-points {
            margin-top: 100px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
        }

        .point-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            font-size: 48px;
            font-weight: 700;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 30px;
            opacity: 0;
            transform: translateX(-100px);
        }

        .point-card i {
            width: 80px; height: 80px;
            background: var(--accent);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-style: normal; font-size: 40px;
        }

        .software-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-top: 60px;
            opacity: 0;
        }

        .sw-item {
            background: rgba(188, 19, 254, 0.1);
            border: 1px solid var(--secondary);
            padding: 30px;
            border-radius: 20px;
            font-size: 36px;
            font-weight: 700;
        }

        .code-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.95);
            padding: 80px;
            border-radius: 40px;
            border-left: 20px solid var(--accent);
            text-align: left;
            font-size: 54px; /* Considerably big */
            opacity: 0;
            width: 1000px;
            box-shadow: 0 50px 120px rgba(0,0,0,0.9);
            backdrop-filter: blur(30px);
        }

        .code-title {
            font-family: 'Noto Sans Tamil', sans-serif;
            color: var(--accent);
            font-size: 72px;
            font-weight: 900;
            margin-bottom: 60px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 30px;
        }

        .code-content {
            line-height: 1.4;
        }

        .final-message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            font-size: 96px;
            font-weight: 900;
            color: var(--accent);
            opacity: 0;
            z-index: 20;
        }

        /* Essential Framework Class */
        .clip { }
    </style>
</head>
<body>
    <div id="root" data-start="0" data-duration="30" data-width="1080" data-height="1920">
        <div class="background clip" data-start="0" data-duration="30" data-track-index="0"></div>
        <div class="overlay clip" data-start="0" data-duration="30" data-track-index="1"></div>

        <div class="container">
            <!-- Part 1: Intro -->
            <div id="intro-text" class="main-text clip" data-start="0" data-duration="6" data-track-index="5">
                ஏன் இத <span class="highlight">ஷார் பண்றேன்?</span>
            </div>

            <!-- Part 2: AI Entry -->
            <div id="ai-entry" class="main-text clip" data-start="5" data-duration="7" data-track-index="6">
                ஏஐ எதிர்பார்க்காத<br>
                <span class="highlight">டொமைன்ல வருது!</span>
            </div>

            <!-- Part 3: Design = Coding -->
            <div id="coding-shift" class="main-text clip" data-start="12" data-duration="8" data-track-index="7">
                டிசைன், 3டி, எடிட்டிங்<br>
                <span class="highlight">எல்லாமே கோடிங் தான்!</span>
            </div>

            <div id="software-list" class="software-grid clip" data-start="14" data-duration="8" data-track-index="8">
                <div class="sw-item">BLENDER</div>
                <div class="sw-item">EXCEL</div>
                <div class="sw-item">DAVINCI</div>
                <div class="sw-item">INKSCAPE</div>
            </div>

            <!-- Part 4: Automation -->
            <div id="code-snippet" class="code-overlay clip" data-start="22" data-duration="5" data-track-index="9">
                <div class="code-title">கோடிங் மட்டும் போதாது</div>
                <div class="code-content">
                    <span style="color: #bc13fe;">import</span> ai_tool<br>
                    <span style="color: #00f2ff;">ai_tool</span>.automate(<span style="color: #f1fa8c;">"video_edit"</span>)<br>
                    <span style="color: #50fa7b;"># AI handles the domain logic</span>
                </div>
            </div>

            <!-- Part 5: Final Call -->
            <div id="final-cta" class="final-message clip" data-start="26" data-duration="4" data-track-index="10">
                டொமைன் அறிவும்<br>
                முக்கியம்!
            </div>
        </div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Intro (0-5s)
        tl.to("#intro-text", { opacity: 1, y: 0, duration: 1, ease: "power4.out" }, 0.5);
        tl.to("#intro-text", { opacity: 0, scale: 0.8, duration: 0.8, ease: "power2.in" }, 4.5);

        // AI Entry (5-12s)
        tl.to("#ai-entry", { opacity: 1, y: 0, duration: 1, ease: "power4.out" }, 5.5);
        tl.to(".background", { scale: 1.1, duration: 7, ease: "none" }, 5);
        tl.to("#ai-entry", { opacity: 0, y: -50, duration: 0.8 }, 11);

        // Coding Shift (12-20s)
        tl.to("#coding-shift", { opacity: 1, y: 0, duration: 1, ease: "back.out(1.7)" }, 12.5);
        tl.to("#software-list", { opacity: 1, y: -20, duration: 1 }, 14);
        
        // Software items punch in
        gsap.utils.toArray(".sw-item").forEach((item, i) => {
            tl.from(item, { scale: 0, opacity: 0, duration: 0.5, ease: "back.out(2)" }, 14.5 + (i * 0.2));
        });

        tl.to(["#coding-shift", "#software-list"], { opacity: 0, duration: 0.5 }, 19.5);

        // Automation Snippet (20-25s)
        tl.to("#code-snippet", { opacity: 1, scale: 1, duration: 0.8, ease: "power2.out" }, 21.5);
        tl.to("#code-snippet", { opacity: 0, scale: 0.9, duration: 0.5 }, 25.5);
        tl.set("#code-snippet", { opacity: 0 }, 26);

        // Final CTA (25-30s)
        tl.to("#final-cta", { opacity: 1, scale: 1.1, duration: 1, ease: "elastic.out(1, 0.3)" }, 26);
        tl.to(".background", { filter: "brightness(0.2) blur(10px)", duration: 2 }, 25);
        tl.to(".overlay", { backgroundColor: "rgba(188, 19, 254, 0.2)", duration: 2 }, 25);

        window.__timelines["ai_mastery"] = tl;
    </script>
</body>
</html>
