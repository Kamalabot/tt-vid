<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XGBoost: The Data Carver</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f8f9fa;
            font-family: 'Outfit', sans-serif;
        }

        #root {
            position: relative;
            width: 1080px;
            height: 1920px;
            /* Premium Wholesome Gradient */
            background: linear-gradient(180deg, #FAD1A0 0%, #FFB7B2 50%, #B2E2F2 100%);
        }

        .clip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            visibility: hidden;
        }

        .scene {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="root" data-composition-id="root" data-width="1080" data-height="1920" data-duration="24" data-start="0">
        <!-- Scene 1: Chaos -->
        <div id="scene1" class="clip" 
             data-start="0" data-duration="8" data-track-index="1"
             data-composition-id="scene1_chaos"
             data-composition-src="compositions/scene1_chaos.html">
        </div>

        <!-- Scene 2: Cuts -->
        <div id="scene2" class="clip" 
             data-start="8" data-duration="8" data-track-index="2"
             data-composition-id="scene2_cuts"
             data-composition-src="compositions/scene2_cuts.html">
        </div>

        <!-- Scene 3: Rules -->
        <div id="scene3" class="clip" 
             data-start="16" data-duration="8" data-track-index="3"
             data-composition-id="scene3_rules"
             data-composition-src="compositions/scene3_rules.html">
        </div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        window.__timelines["root"] = tl;

        // Orchestration: Handle visibility of sub-compositions
        const scenes = [
            { id: '#scene1', start: 0, duration: 8 },
            { id: '#scene2', start: 8, duration: 8 },
            { id: '#scene3', start: 16, duration: 8 }
        ];

        scenes.forEach(scene => {
            tl.set(scene.id, { visibility: 'visible' }, scene.start);
            tl.set(scene.id, { visibility: 'hidden' }, scene.start + scene.duration);
        });
    </script>
</body>
</html>
