<template id="scene1-template">
    <div id="scene1-root" data-composition-id="scene1_chaos" data-width="1080" data-height="1920" data-duration="8" data-start="0">
        <style>
            [data-composition-id="scene1_chaos"] {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                color: #2D3436;
                text-align: center;
            }

            [data-composition-id="scene1_chaos"] .data-container {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
            }

            [data-composition-id="scene1_chaos"] .dot {
                position: absolute;
                border-radius: 50%;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }

            [data-composition-id="scene1_chaos"] .dot.small { width: 15px; height: 15px; background: #FAB1A0; opacity: 0.8; }
            [data-composition-id="scene1_chaos"] .dot.medium { width: 45px; height: 45px; background: #FF7675; opacity: 0.9; }
            [data-composition-id="scene1_chaos"] .dot.large { width: 120px; height: 120px; background: #74B9FF; opacity: 0.7; filter: blur(4px); }

            [data-composition-id="scene1_chaos"] .text-container {
                position: relative;
                z-index: 10;
                padding: 0 60px;
            }

            [data-composition-id="scene1_chaos"] h1 {
                font-size: 84px;
                font-weight: 800;
                line-height: 1.1;
                margin-bottom: 20px;
                opacity: 0;
            }
        </style>

        <div class="data-container" id="dots-container"></div>
        
        <div class="text-container">
            <h1 class="headline">In the chaos of data...</h1>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
        <script>
            (function() {
                const compId = '[data-composition-id="scene1_chaos"]';
                const container = document.querySelector('[data-composition-id="scene1_chaos"] #dots-container');
                
                // Seeded random for determinism
                function seededRandom(seed) {
                    let m = 0x80000000, a = 1103515245, c = 12345;
                    seed = (a * seed + c) % m;
                    return seed / (m - 1);
                }

                let seed = 123;
                // Create dots - reduced count to 120 because they are much larger now
                for (let i = 0; i < 120; i++) {
                    const dot = document.createElement('div');
                    seed = (1103515245 * seed + 12345) % 0x80000000;
                    const typeRoll = seed / 0x7FFFFFFF;
                    
                    if (typeRoll < 0.7) dot.className = 'dot small';
                    else if (typeRoll < 0.92) dot.className = 'dot medium';
                    else dot.className = 'dot large';

                    seed = (1103515245 * seed + 12345) % 0x80000000;
                    dot.style.left = (seed / 0x7FFFFFFF) * 100 + '%';
                    seed = (1103515245 * seed + 12345) % 0x80000000;
                    dot.style.top = (seed / 0x7FFFFFFF) * 100 + '%';
                    container.appendChild(dot);
                }

                window.__timelines = window.__timelines || {};
                const tl = gsap.timeline({ paused: true });
                window.__timelines["scene1_chaos"] = tl;

                tl.to('[data-composition-id="scene1_chaos"] .headline', { opacity: 1, y: -20, duration: 1.5, ease: "power3.out" }, 1);
                
                tl.from('[data-composition-id="scene1_chaos"] .dot', {
                    scale: 0,
                    opacity: 0,
                    duration: 1,
                    stagger: {
                        amount: 3,
                        from: "center"
                    },
                    ease: "back.out(1.7)"
                }, 0);

                tl.to('[data-composition-id="scene1_chaos"] .dot', {
                    x: () => (seededRandom(456) - 0.5) * 200,
                    y: () => (seededRandom(789) - 0.5) * 200,
                    duration: 8,
                    ease: "none"
                }, 0);

                tl.to('[data-composition-id="scene1_chaos"] .text-container', { opacity: 0, duration: 1, ease: "power2.inOut" }, 7);
            })();
        </script>
    </div>
</template>
