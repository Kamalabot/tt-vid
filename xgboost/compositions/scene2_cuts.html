<template id="scene2-template">
    <div id="scene2-root" data-composition-id="scene2_cuts" data-width="1080" data-height="1920" data-duration="8" data-start="0">
        <style>
            [data-composition-id="scene2_cuts"] {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                color: #2D3436;
            }

            [data-composition-id="scene2_cuts"] .carve-box {
                position: absolute;
                border: 4px solid #FF7675;
                background: rgba(255, 118, 117, 0.1);
                border-radius: 12px;
                opacity: 0;
                transform: scale(0.9);
                z-index: 5;
            }

            [data-composition-id="scene2_cuts"] .headline-2 {
                position: absolute;
                top: 100px;
                z-index: 10;
                font-size: 72px;
                font-weight: 800;
                text-align: center;
                padding: 0 80px;
                opacity: 0;
            }

            [data-composition-id="scene2_cuts"] .dot-v2 {
                position: absolute;
                border-radius: 50%;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }

            [data-composition-id="scene2_cuts"] .dot-v2.small { width: 15px; height: 15px; background: #FAB1A0; opacity: 0.8; }
            [data-composition-id="scene2_cuts"] .dot-v2.medium { width: 45px; height: 45px; background: #FF7675; opacity: 0.9; }
            [data-composition-id="scene2_cuts"] .dot-v2.large { width: 120px; height: 120px; background: #74B9FF; opacity: 0.7; filter: blur(4px); }
        </style>

        <div id="dots-v2-container"></div>
        <!-- Targeted carving boxes -->
        <div class="carve-box" id="box1" style="top: 5%; left: 10%; width: 80%; height: 25%;"></div> <!-- Top Cluster -->
        <div class="carve-box" id="box2" style="top: 65%; left: 15%; width: 70%; height: 20%;"></div> <!-- Bottom Cluster -->
        <div class="carve-box" id="box3" style="top: 35%; left: 5%; width: 30%; height: 15%;"></div> <!-- Side niche -->
        
        <h1 class="headline-2">XGBoost doesn't think... <br><span style="color: #FF7675;">it carves.</span></h1>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
        <script>
            (function() {
                const compId = '[data-composition-id="scene2_cuts"]';
                const container = document.querySelector('[data-composition-id="scene2_cuts"] #dots-v2-container');
                
                let seed = 123; // Matching Scene 1 seed
                for (let i = 0; i < 120; i++) {
                    const dot = document.createElement('div');
                    seed = (1103515245 * seed + 12345) % 0x80000000;
                    const typeRoll = seed / 0x7FFFFFFF;
                    
                    if (typeRoll < 0.7) dot.className = 'dot-v2 small';
                    else if (typeRoll < 0.92) dot.className = 'dot-v2 medium';
                    else dot.className = 'dot-v2 large';

                    seed = (1103515245 * seed + 12345) % 0x80000000;
                    dot.style.left = (seed / 0x7FFFFFFF) * 100 + '%';
                    seed = (1103515245 * seed + 12345) % 0x80000000;
                    dot.style.top = (seed / 0x7FFFFFFF) * 100 + '%';
                    container.appendChild(dot);
                }

                window.__timelines = window.__timelines || {};
                const tl = gsap.timeline({ paused: true });
                window.__timelines["scene2_cuts"] = tl;

                // Animate text
                tl.to('[data-composition-id="scene2_cuts"] .headline-2', { opacity: 1, y: 30, duration: 1.2, ease: "back.out(1.7)" }, 0.5);

                // Animate rectangular boxes appearing
                tl.to('[data-composition-id="scene2_cuts"] #box1', { opacity: 1, scale: 1, duration: 0.8, ease: "elastic.out(1, 0.5)" }, 1.5);
                tl.to('[data-composition-id="scene2_cuts"] #box2', { opacity: 1, scale: 1, duration: 0.8, ease: "elastic.out(1, 0.5)" }, 2.5);
                tl.to('[data-composition-id="scene2_cuts"] #box3', { opacity: 1, scale: 1, duration: 0.8, ease: "elastic.out(1, 0.5)" }, 3.5);

                // Dots pulse when boxed
                tl.to('[data-composition-id="scene2_cuts"] .dot-v2', {
                    scale: 1.2,
                    duration: 0.3,
                    repeat: 1,
                    yoyo: true,
                    stagger: {
                        amount: 2,
                        from: "random"
                    }
                }, 2);

                tl.to('[data-composition-id="scene2_cuts"]', { opacity: 0, duration: 1 }, 7);
            })();
        </script>
    </div>
</template>
