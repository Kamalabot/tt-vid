<template id="scene3-template">
    <div id="scene3-root" data-composition-id="scene3_rules" data-width="1080" data-height="1920" data-duration="7" data-start="0">
        <style>
            [data-composition-id="scene3_rules"] {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background: transparent; /* Show index.html background */
                font-family: 'Outfit', sans-serif;
            }

            [data-composition-id="scene3_rules"] .code-block {
                background: #2D3436;
                padding: 40px;
                border-radius: 20px;
                color: #A29BFE;
                font-family: 'Courier New', Courier, monospace;
                font-size: 42px;
                box-shadow: 0 20px 50px rgba(0,0,0,0.3);
                opacity: 0;
                transform: scale(0.8);
            }

            [data-composition-id="scene3_rules"] .keyword { color: #FF7675; }
            [data-composition-id="scene3_rules"] .variable { color: #55E6C1; }
            [data-composition-id="scene3_rules"] .value { color: #F7D794; }

            [data-composition-id="scene3_rules"] .label-3 {
                position: absolute;
                top: 20px; /* Pushed up */
                font-size: 110px; /* Bigger */
                font-weight: 900; /* Weightier */
                color: #2D3436;
                opacity: 0;
                letter-spacing: -2px;
            }

            [data-composition-id="scene3_rules"] .data-stream {
                position: absolute;
                width: 100%;
                height: 100%;
                overflow: hidden;
                pointer-events: none;
                z-index: 0;
            }

            [data-composition-id="scene3_rules"] .code-block {
                background: #2D3436;
                padding: 60px;
                border-radius: 20px;
                color: #A29BFE;
                font-family: 'Courier New', Courier, monospace;
                font-size: 36px;
                line-height: 1.4;
                box-shadow: 0 20px 50px rgba(0,0,0,0.3);
                opacity: 0;
                transform: scale(1);
                width: 900px;
                min-height: 500px;
            }

            [data-composition-id="scene3_rules"] .stream-dot {
                position: absolute;
                width: 48px; /* Even bigger for maximum clarity */
                height: 48px;
                background: #FAB1A0;
                border-radius: 50%;
                opacity: 0;
                scale: 0.5;
                box-shadow: 0 0 20px rgba(250, 177, 160, 0.6);
                z-index: 15;
            }

            [data-composition-id="scene3_rules"] .ladder-rung {
                position: absolute;
                height: 4px;
                width: 100%;
                background: rgba(45, 52, 54, 0.1);
                z-index: 0;
            }
        </style>

        <div class="data-stream" id="stream-container">
            <div class="ladder-rung" style="top: 20%;"></div>
            <div class="ladder-rung" style="top: 40%;"></div>
            <div class="ladder-rung" style="top: 60%;"></div>
            <div class="ladder-rung" style="top: 80%;"></div>
        </div>
        
        <h2 class="label-3">Ladders of logic.</h2>

        <div class="code-block" id="code-content">
            <span class="keyword">if</span> (<span class="variable">petal_length</span> &lt; <span class="value">2.45</span>) {<br>
            &nbsp;&nbsp;<span class="variable">class</span> = <span class="value">'Setosa'</span>;<br>
            } <span class="keyword">else</span> <span class="keyword">if</span> (<span class="variable">petal_width</span> &lt; <span class="value">1.75</span>) {<br>
            &nbsp;&nbsp;<span class="variable">class</span> = <span class="value">'Versicolor'</span>;<br>
            &nbsp;&nbsp;<span class="keyword">if</span> (<span class="variable">sepal_width</span> &gt; <span class="value">3.0</span>) {<br>
            &nbsp;&nbsp;&nbsp;&nbsp;<span class="variable">confidence</span> = <span class="value">0.99</span>;<br>
            &nbsp;&nbsp;}<br>
            } <span class="keyword">else</span> {<br>
            &nbsp;&nbsp;<span class="variable">class</span> = <span class="value">'Virginica'</span>;<br>
            }
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
        <script>
            (function() {
                const compId = '[data-composition-id="scene3_rules"]';
                const container = document.querySelector('[data-composition-id="scene3_rules"] #stream-container');
                
                // Create stream dots
                for (let i = 0; i < 30; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'stream-dot';
                    container.appendChild(dot);
                }

                window.__timelines = window.__timelines || {};
                const tl = gsap.timeline({ paused: true });
                window.__timelines["scene3_rules"] = tl;

                tl.to('[data-composition-id="scene3_rules"] .label-3', { opacity: 1, y: 20, duration: 1, ease: "power2.out" }, 0.5);
                tl.to('[data-composition-id="scene3_rules"] .code-block', { opacity: 1, duration: 1 }, 1);
                
                // Typewriter effect simulation for the code block
                const codeEl = document.querySelector('[data-composition-id="scene3_rules"] #code-content');
                const fullText = codeEl.innerHTML;
                codeEl.innerHTML = '';
                
                tl.to('[data-composition-id="scene3_rules"] #code-content', {
                    duration: 3,
                    onUpdate: function() {
                        const progress = this.progress();
                        const currentLength = Math.floor(progress * fullText.length);
                        codeEl.innerHTML = fullText.substring(0, currentLength);
                    },
                    ease: "none"
                }, 1.2);

                // Sequential "Popping" and "Accumulating" flow
                tl.fromTo('[data-composition-id="scene3_rules"] .stream-dot', 
                    { 
                        y: -150, 
                        x: 540,
                        opacity: 0,
                        scale: 0
                    },
                    { 
                        y: 150, 
                        opacity: 1,
                        scale: 1,
                        duration: 0.6,
                        ease: "back.out(2.5)", // Aggressive pop
                        stagger: {
                            each: 0.8,
                        }
                    }, 1);

                // Drop through the ladder
                tl.to('[data-composition-id="scene3_rules"] .stream-dot', {
                    y: 1300,
                    duration: 1,
                    ease: "power4.in",
                    stagger: { each: 0.8 }
                }, 2.4);

                // Classification Accumulation: Stay at the bottom sides
                tl.to('[data-composition-id="scene3_rules"] .stream-dot', {
                    x: (i) => {
                        const choice = i % 2; // Two piles: Left and Right
                        const offset = (Math.floor(i / 2) % 3) * 40; // Slight jitter/stacking
                        return choice === 0 ? (50 + offset) : (900 - offset); 
                    },
                    y: (i) => 1700 + (Math.floor(i / 6) * 40), // Stack upwards
                    duration: 0.8,
                    ease: "bounce.out",
                    stagger: {
                        each: 0.8,
                    }
                }, 3.2);

                tl.to('[data-composition-id="scene3_rules"]', { opacity: 0, duration: 1 }, 6);
            })();
        </script>
    </div>
</template>
