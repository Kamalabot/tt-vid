<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Video Edited with Code</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color-1: #0f172a;
        --bg-color-2: #1e1b4b;
        --accent-1: #8b5cf6;
        --accent-2: #ec4899;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: var(--bg-color-1);
        font-family: 'Outfit', sans-serif;
      }

      #root {
        width: 1080px;
        height: 1920px;
        position: relative;
        background: radial-gradient(circle at center, var(--bg-color-2) 0%, var(--bg-color-1) 100%);
      }

      /* Activity Background */
      .bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.4;
      }

      /* Video Container (Fixed position, 75% of frame) */
      .video-container {
        position: absolute;
        top: 100px;
        left: 135px; /* (1080 - 810) / 2 */
        width: 810px;
        height: 1440px;
        mask-image: radial-gradient(circle, black 40%, transparent 70%);
        -webkit-mask-image: radial-gradient(circle, black 40%, transparent 70%);
        mask-size: 600px 600px;
        -webkit-mask-size: 600px 600px;
        mask-repeat: no-repeat;
        -webkit-mask-repeat: no-repeat;
        mask-position: 0px 0px;
        -webkit-mask-position: 0px 0px;
      }

      #a-roll {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Animated Text */
      #message {
        position: absolute;
        width: 100%;
        text-align: center;
        color: white;
        font-size: 80px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 10px 20px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-width="1080"
      data-height="1920"
    >
      <!-- Background Activity -->
      <div id="orb1" class="clip" data-start="0" data-duration="5" data-track-index="10"
           style="position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; width: 600px; height: 600px; background: var(--accent-1); top: 10%; left: -10%;"></div>
      <div id="orb2" class="clip" data-start="0" data-duration="5" data-track-index="11"
           style="position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; width: 500px; height: 500px; background: var(--accent-2); bottom: 10%; right: -10%;"></div>
      <div id="orb3" class="clip" data-start="0" data-duration="5" data-track-index="12"
           style="position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; width: 400px; height: 400px; background: #3b82f6; top: 40%; right: 10%;"></div>

      <!-- Video Section -->
      <div class="video-container">
        <video
          id="a-roll"
          class="clip"
          src="simple.mp4"
          muted
          playsinline
          loop
          data-start="0"
          data-duration="5"
          data-track-index="0"
        ></video>
      </div>

      <!-- Audio Track -->
      <audio
        id="a-roll-audio"
        src="simple.mp4"
        data-start="0"
        data-duration="5"
        data-track-index="4"
        data-volume="1"
      ></audio>

      <!-- Text Message -->
      <div id="message" class="clip" data-start="0" data-duration="5" data-track-index="5">
        Video edited<br>with code
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Background activity animation
      tl.to("#orb1", { x: 200, y: 100, duration: 5, ease: "none" }, 0);
      tl.to("#orb2", { x: -200, y: -100, duration: 5, ease: "none" }, 0);
      tl.to("#orb3", { scale: 1.5, opacity: 0.6, duration: 2.5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 0);

      // Zig-zag movement for the mask to reveal different parts of the stable video
      // Container: 810x1440. Mask: 600x600. Max X: 210. Max Y: 840.
      tl.to(".video-container", {
        keyframes: [
          { maskPosition: "0px 0px", webkitMaskPosition: "0px 0px", duration: 0 },
          { maskPosition: "210px 210px", webkitMaskPosition: "210px 210px", duration: 1.25, ease: "power1.inOut" },
          { maskPosition: "0px 420px", webkitMaskPosition: "0px 420px", duration: 1.25, ease: "power1.inOut" },
          { maskPosition: "210px 630px", webkitMaskPosition: "210px 630px", duration: 1.25, ease: "power1.inOut" },
          { maskPosition: "210px 840px", webkitMaskPosition: "210px 840px", duration: 1.25, ease: "power1.inOut" }
        ],
      }, 0);

      // Text animation: at the bottom
      tl.fromTo("#message", 
        { y: 1750, opacity: 0, scale: 0.8 }, 
        { y: 1650, opacity: 1, scale: 1, duration: 1.5, ease: "back.out(1.7)" }, 
        1
      );

      // Subtle pulse on the text
      tl.to("#message", { scale: 1.1, duration: 1, repeat: 2, yoyo: true, ease: "sine.inOut" }, 2.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
