<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Motion Graphics Composition</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Inter", sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="20"
      data-width="1920"
      data-height="1080"
    >
      <!-- Scene 1: Motion -->
      <div
        id="scene-1"
        class="scene"
        data-composition-id="scene1"
        data-composition-src="compositions/scene1.html"
        data-start="0"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 2: Graphics -->
      <div
        id="scene-2"
        class="scene"
        data-composition-id="scene2"
        data-composition-src="compositions/scene2.html"
        data-start="5"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 3: Composition -->
      <div
        id="scene-3"
        class="scene"
        data-composition-id="scene3"
        data-composition-src="compositions/scene3.html"
        data-start="10"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 4: Premium -->
      <div
        id="scene-4"
        class="scene"
        data-composition-id="scene4"
        data-composition-src="compositions/scene4.html"
        data-start="15"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
