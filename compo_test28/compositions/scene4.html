<template id="scene4-template">
  <div
    data-composition-id="scene4"
    data-width="1920"
    data-height="1080"
    data-duration="5"
  >
    <div class="canvas">
      <!-- Background Shapes -->
      <div class="line-container">
        <div class="line line-v" style="left: 20%;"></div>
        <div class="line line-v" style="left: 40%;"></div>
        <div class="line line-v" style="left: 60%;"></div>
        <div class="line line-v" style="left: 80%;"></div>
      </div>

      <!-- Letters -->
      <div class="clip letter-container">
          <span class="letter">P</span>
          <span class="letter">R</span>
          <span class="letter">E</span>
          <span class="letter">M</span>
          <span class="letter">I</span>
          <span class="letter">U</span>
          <span class="letter">M</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene4"] .canvas {
          width: 1920px;
          height: 1080px;
          background: #111;
          position: relative;
          overflow: hidden;
      }

      [data-composition-id="scene4"] .line-container {
          position: absolute;
          width: 100%;
          height: 100%;
      }

      [data-composition-id="scene4"] .line {
          position: absolute;
          background: linear-gradient(to bottom, transparent, rgba(255, 207, 77, 0.3), transparent);
          width: 2px;
          height: 100%;
      }

      [data-composition-id="scene4"] .letter-container {
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 250px;
          font-weight: 800;
          color: #ffcf4d;
          text-transform: uppercase;
      }

      [data-composition-id="scene4"] .letter {
          display: inline-block;
          transform-origin: center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene4"]';

        tl.from(`${scope} .line`, { scaleY: 0, stagger: 0.1, duration: 1.5, ease: "expo.out" }, 0);
        tl.from(`${scope} .letter`, { z: -1000, opacity: 0, stagger: 0.1, duration: 1.2, ease: "power4.out" }, 0.5);
        tl.to(`${scope} .letter`, { skewX: 10, stagger: { each: 0.2, repeat: 6, yoyo: true }, duration: 0.8, ease: "sine.inOut" }, 1.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene4"] = tl;
      })();
    </script>
  </div>
</template>
