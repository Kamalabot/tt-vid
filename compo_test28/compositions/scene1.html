<template id="scene1-template">
  <div
    data-composition-id="scene1"
    data-width="1920"
    data-height="1080"
    data-duration="5"
  >
    <div class="canvas">
      <div class="glow-overlay"></div>

      <!-- Shapes -->
      <div id="shape1" class="clip shape circle"></div>
      <div id="shape2" class="clip shape rect"></div>
      
      <!-- Letters -->
      <div class="clip letter-container">
          <span class="letter" data-letter="M">M</span>
          <span class="letter" data-letter="O">O</span>
          <span class="letter" data-letter="T">T</span>
          <span class="letter" data-letter="I">I</span>
          <span class="letter" data-letter="O">O</span>
          <span class="letter" data-letter="N">N</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene1"] .canvas {
          width: 1920px;
          height: 1080px;
          background: #0a0a0c;
          position: relative;
          overflow: hidden;
      }

      [data-composition-id="scene1"] .glow-overlay {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: radial-gradient(circle at center, rgba(112, 0, 255, 0.1) 0%, transparent 70%);
          pointer-events: none;
      }

      [data-composition-id="scene1"] .shape {
          position: absolute;
          border: 2px solid #00f2ff;
          opacity: 0.5;
      }

      [data-composition-id="scene1"] .circle { 
          border-radius: 50%; 
          width: 200px; 
          height: 200px; 
          left: 200px; 
          top: 200px;
      }
      
      [data-composition-id="scene1"] .rect { 
          border-radius: 8px; 
          width: 150px; 
          height: 150px; 
          right: 200px; 
          bottom: 200px; 
          transform: rotate(45deg);
      }

      [data-composition-id="scene1"] .letter-container {
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 300px;
          font-weight: 900;
          letter-spacing: -10px;
          text-transform: uppercase;
      }

      [data-composition-id="scene1"] .letter {
          display: inline-block;
          background: linear-gradient(135deg, #00f2ff, #7000ff);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3));
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene1"]';
        
        tl.from(`${scope} #shape1`, { scale: 0, opacity: 0, duration: 1, ease: "back.out(1.7)" }, 0);
        tl.to(`${scope} #shape1`, { x: 1500, y: 600, duration: 5, ease: "none" }, 0);
        tl.from(`${scope} #shape2`, { scale: 0, opacity: 0, duration: 1, ease: "back.out(1.7)" }, 0.5);
        tl.to(`${scope} #shape2`, { rotation: 405, x: -1200, duration: 5, ease: "none" }, 0.5);
        tl.from(`${scope} .letter`, { y: 200, opacity: 0, rotateX: -90, stagger: 0.1, duration: 0.8, ease: "power3.out" }, 0.2);
        tl.to(`${scope} .letter`, { letterSpacing: "40px", duration: 4, ease: "sine.inOut" }, 1);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1"] = tl;
      })();
    </script>
  </div>
</template>
