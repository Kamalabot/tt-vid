<template id="scene2-template">
  <div
    data-composition-id="scene2"
    data-width="1920"
    data-height="1080"
    data-duration="5"
  >
    <div class="canvas">
      <div class="grid-background"></div>

      <!-- Geometric Shapes -->
      <div id="tri1" class="clip triangle"></div>
      <div id="tri2" class="clip triangle"></div>
      
      <div id="box1" class="clip geometric-shape"></div>

      <!-- Letters -->
      <div class="clip letter-container">
          <span class="letter">G</span>
          <span class="letter">R</span>
          <span class="letter">A</span>
          <span class="letter">P</span>
          <span class="letter">H</span>
          <span class="letter">I</span>
          <span class="letter">C</span>
          <span class="letter">S</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene2"] .canvas {
          width: 1920px;
          height: 1080px;
          background: #050a15;
          position: relative;
          overflow: hidden;
      }

      [data-composition-id="scene2"] .grid-background {
          position: absolute;
          width: 100%;
          height: 100%;
          background-image: 
              linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
          background-size: 100px 100px;
          opacity: 0.3;
      }

      [data-composition-id="scene2"] .letter-container {
          position: absolute;
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 250px;
          font-weight: 800;
          gap: 10px;
      }

      [data-composition-id="scene2"] .letter {
          position: relative;
          color: #ffffff;
          text-shadow: 0 0 30px rgba(255, 207, 77, 0.5);
      }

      [data-composition-id="scene2"] .geometric-shape {
          position: absolute;
          border: 1px solid #ffcf4d;
          background: rgba(255, 207, 77, 0.1);
          backdrop-filter: blur(5px);
          width: 300px; 
          height: 300px; 
          left: 100px; 
          bottom: 100px;
      }

      [data-composition-id="scene2"] .triangle {
          position: absolute;
          width: 0;
          height: 0;
          border-left: 50px solid transparent;
          border-right: 50px solid transparent;
          border-bottom: 86px solid #ffcf4d;
      }

      [data-composition-id="scene2"] #tri1 {
          left: 400px; 
          top: 300px;
      }

      [data-composition-id="scene2"] #tri2 {
          right: 400px; 
          bottom: 300px; 
          transform: rotate(180deg);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene2"]';

        tl.to(`${scope} .grid-background`, { backgroundPosition: "100px 100px", duration: 5, ease: "none" }, 0);
        tl.from(`${scope} .triangle`, { y: 1000, opacity: 0, stagger: 0.2, duration: 1.5, ease: "elastic.out(1, 0.75)" }, 0.2);
        tl.from(`${scope} #box1`, { scale: 0, rotation: -45, duration: 1, ease: "back.out(2)" }, 0.6);
        tl.from(`${scope} .letter`, { scale: 2, opacity: 0, filter: "blur(20px)", stagger: { each: 0.1, from: "center" }, duration: 1, ease: "power4.out" }, 0.5);
        tl.to(`${scope} .letter`, { y: -20, stagger: { each: 0.2, repeat: 6, yoyo: true }, duration: 0.5, ease: "sine.inOut" }, 1.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene2"] = tl;
      })();
    </script>
  </div>
</template>
