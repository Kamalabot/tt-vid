<template id="scene3-template">
  <div
    data-composition-id="scene3"
    data-width="1920"
    data-height="1080"
    data-duration="5"
  >
    <div class="canvas">
      <div class="orb-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>

      <!-- Letters -->
      <div class="clip letter-container">
          <span class="letter">C</span>
          <span class="letter">O</span>
          <span class="letter">M</span>
          <span class="letter">P</span>
          <span class="letter">O</span>
          <span class="letter">S</span>
          <span class="letter">I</span>
          <span class="letter">T</span>
          <span class="letter">I</span>
          <span class="letter">O</span>
          <span class="letter">N</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene3"] .canvas {
          width: 1920px;
          height: 1080px;
          background: #000;
          position: relative;
          overflow: hidden;
      }

      [data-composition-id="scene3"] .orb-container {
          position: absolute;
          width: 100%;
          height: 100%;
          filter: blur(80px);
          opacity: 0.6;
      }

      [data-composition-id="scene3"] .orb {
          position: absolute;
          border-radius: 50%;
      }

      [data-composition-id="scene3"] .orb-1 { width: 600px; height: 600px; background: #ff0055; left: 10%; top: 10%; }
      [data-composition-id="scene3"] .orb-2 { width: 500px; height: 500px; background: #00ffcc; right: 10%; bottom: 10%; }
      [data-composition-id="scene3"] .orb-3 { width: 400px; height: 400px; background: #7000ff; left: 40%; top: 30%; }

      [data-composition-id="scene3"] .letter-container {
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 180px;
          font-weight: 900;
          gap: 5px;
      }

      [data-composition-id="scene3"] .letter {
          color: #fff;
          text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene3"]';

        tl.to(`${scope} .orb-1`, { x: 200, y: 100, duration: 5, ease: "sine.inOut" }, 0);
        tl.to(`${scope} .orb-2`, { x: -200, y: -100, duration: 5, ease: "sine.inOut" }, 0);
        tl.to(`${scope} .orb-3`, { scale: 1.5, duration: 5, ease: "sine.inOut" }, 0);
        tl.from(`${scope} .letter`, { opacity: 0, scale: 0, rotation: 180, stagger: 0.05, duration: 1, ease: "back.out(1.7)" }, 0.5);
        tl.to(`${scope} .letter`, { color: "#ff0055", stagger: { each: 0.1, repeat: 6, yoyo: true }, duration: 0.5, ease: "power1.inOut" }, 1.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene3"] = tl;
      })();
    </script>
  </div>
</template>
