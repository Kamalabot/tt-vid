<div id="scene4-root" data-composition-id="scene4" data-start="0" data-width="1080" data-height="1920">
    
    <!-- Pillars Container -->
    <div id="pillars" class="clip" data-start="0" data-duration="12" data-track-index="1"
         style="top: 10%; width: 100%; padding: 60px; display: flex; flex-direction: column; gap: 40px;">
        
        <div class="title" style="text-align: center; margin-bottom: 20px;">THREE NEW PILLARS</div>

        <!-- Pillar 1: ICs -->
        <div id="p1" class="glass-card pillar-card">
            <div class="title gradient-text-cyan" style="font-size: 64px;">1. ICs (BUILDERS)</div>
            <div class="subtitle" style="margin-top: 10px;">Armed with AI. Output of 10x.</div>
        </div>

        <!-- Pillar 2: DRIs -->
        <div id="p2" class="glass-card pillar-card">
            <div class="title gradient-text-cyan" style="font-size: 64px;">2. DRIs (OWNERS)</div>
            <div class="subtitle" style="margin-top: 10px;">Strategic vision. Total accountability.</div>
        </div>

        <!-- Pillar 3: PLAYER-COACHES -->
        <div id="p3" class="glass-card pillar-card">
            <div class="title gradient-text-cyan" style="font-size: 64px;">3. MASTER ENGINEERS</div>
            <div class="subtitle" style="margin-top: 10px;">Lead by doing. Mastery over title.</div>
        </div>
    </div>

    <!-- Closing Statement -->
    <div id="closing" class="clip" data-start="12" data-duration="3" data-track-index="2"
         style="top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px;">
        <div class="subtitle" style="margin-bottom: 20px; letter-spacing: 10px;">THE NEW MANDATE</div>
        <div class="title" style="text-align: center; font-size: 100px; line-height: 1.2;">OWNERSHIP OF A PROBLEM.</div>
        <div class="title gradient-text-cyan" style="text-align: center; font-size: 100px; margin-top: 20px;">NOT A TITLE.</div>
    </div>

</div>

<script>
    window.__timelines = window.__timelines || {};
    var tl4 = gsap.timeline({ paused: true });

    // Pillar animations
    tl4.from(".pillar-card", {
        x: 100,
        opacity: 0,
        duration: 1,
        stagger: 2,
        ease: "power3.out"
    }, 0.5);

    // Hover effect loop
    tl4.to(".pillar-card", {
        y: -10,
        duration: 2,
        repeat: 5,
        yoyo: true,
        ease: "sine.inOut",
        stagger: {
            each: 0.5,
            repeat: 5,
            yoyo: true
        }
    }, 0);

    // Closing Reveal
    tl4.from("#closing", {
        opacity: 0,
        duration: 1,
        ease: "power2.inOut"
    }, 12);

    tl4.from("#closing .title", {
        y: 50,
        opacity: 0,
        stagger: 0.3,
        duration: 1,
        ease: "expo.out"
    }, 12.5);

    window.__timelines["scene4"] = tl4;
</script>
