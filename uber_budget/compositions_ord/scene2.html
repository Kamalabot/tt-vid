<div id="scene2-root" data-composition-id="scene2" data-start="0" data-width="1080" data-height="1920">
    <!-- Background Image - Path corrected to be relative to index.html -->
    <img src="./uber_budget_crossroads.png" class="clip" data-start="0" data-duration="15" data-track-index="1"
         style="width: 100%; height: 100%; object-fit: cover; opacity: 0.4; filter: blur(5px);">

    <!-- Comparison Overlay -->
    <div class="clip" data-start="0.5" data-duration="14.5" data-track-index="2"
         style="top: 15%; width: 100%; padding: 60px;">
        <div class="title" style="font-size: 72px; margin-bottom: 40px; text-align: center;">FLATTENING THE HIERARCHY</div>
        
        <!-- Uber Section -->
        <div class="glass-card" style="margin-bottom: 40px;">
            <div class="subtitle">UBER (1:50 Ratio)</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <div>
                    <div class="subtitle">LEGACY</div>
                    <div id="uber-legacy" class="title mono gradient-text-red" style="font-size: 80px;">3,400</div>
                </div>
                <div class="title" style="font-size: 100px;">→</div>
                <div>
                    <div class="subtitle">AI LEAN</div>
                    <div id="uber-lean" class="title mono gradient-text-cyan" style="font-size: 80px;">680</div>
                </div>
            </div>
        </div>

        <!-- Microsoft Section -->
        <div class="glass-card">
            <div class="subtitle">MICROSOFT (1:50 Ratio)</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <div>
                    <div class="subtitle">LEGACY</div>
                    <div id="ms-legacy" class="title mono gradient-text-red" style="font-size: 80px;">22,800</div>
                </div>
                <div class="title" style="font-size: 100px;">→</div>
                <div>
                    <div class="subtitle">AI LEAN</div>
                    <div id="ms-lean" class="title mono gradient-text-cyan" style="font-size: 80px;">4,560</div>
                </div>
            </div>
        </div>
    </div>

    <!-- IC Foundation -->
    <div class="clip" data-start="0" data-duration="15" data-track-index="3"
         style="bottom: 5%; width: 100%; text-align: center;">
        <div class="subtitle" style="letter-spacing: 4px;">BUILDERS REMAIN INTACT</div>
        <div style="height: 10px; background: var(--accent-cyan); width: 80%; margin: 20px auto; border-radius: 5px; box-shadow: 0 0 20px var(--accent-cyan);"></div>
    </div>
</div>

<script>
    window.__timelines = window.__timelines || {};
    var tl2 = gsap.timeline({ paused: true });

    tl2.from(".glass-card", {
        x: -100,
        opacity: 0,
        stagger: 0.5,
        duration: 1,
        ease: "power3.out"
    }, 0.5);

    // Counter animations
    tl2.from("#uber-legacy, #ms-legacy", {
        scale: 1.2,
        duration: 2,
        ease: "bounce.out"
    }, 1);

    tl2.from("#uber-lean, #ms-lean", {
        opacity: 0,
        y: 20,
        duration: 1,
        delay: 1,
        ease: "power2.out"
    }, 2);

    window.__timelines["scene2"] = tl2;
</script>
