<div id="scene3-root" data-composition-id="scene3" data-start="0" data-width="1080" data-height="1920">
    
    <!-- Traditional Hierarchy (to be shattered) -->
    <div id="legacy-tree" class="clip" data-start="0" data-duration="5" data-track-index="1"
         style="width: 100%; height: 60%; top: 10%; display: flex; flex-direction: column; align-items: center; gap: 40px;">
        <div class="glass-card" style="width: 300px; height: 100px; background: rgba(255,0,0,0.1); border-color: var(--accent-red);"></div>
        <div style="display: flex; gap: 80px;">
            <div class="glass-card" style="width: 200px; height: 80px; background: rgba(255,0,0,0.1); border-color: var(--accent-red);"></div>
            <div class="glass-card" style="width: 200px; height: 80px; background: rgba(255,0,0,0.1); border-color: var(--accent-red);"></div>
        </div>
        <div style="display: flex; gap: 40px;">
            <div class="glass-card" style="width: 150px; height: 60px; background: rgba(255,0,0,0.1); border-color: var(--accent-red);"></div>
            <div class="glass-card" style="width: 150px; height: 60px; background: rgba(255,0,0,0.1); border-color: var(--accent-red);"></div>
            <div class="glass-card" style="width: 150px; height: 60px; background: rgba(255,0,0,0.1); border-color: var(--accent-red);"></div>
            <div class="glass-card" style="width: 150px; height: 60px; background: rgba(255,0,0,0.1); border-color: var(--accent-red);"></div>
        </div>
        <div class="title" style="margin-top: 40px; color: var(--accent-red);">TRADITIONAL HIERARCHY</div>
    </div>

    <!-- AI Nervous System -->
    <div id="ai-system" class="clip" data-start="4" data-duration="11" data-track-index="2"
         style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <img src="./ai_nervous_system.png" style="width: 900px; height: 900px; object-fit: contain; filter: drop-shadow(0 0 30px var(--accent-cyan));">
        <div class="glass-card" style="margin-top: -100px; width: 800px; text-align: center; border-color: var(--accent-cyan);">
            <div class="title gradient-text-cyan" style="font-size: 72px;">AI NERVOUS SYSTEM</div>
            <div class="subtitle" style="margin-top: 10px;">The New Company Backbone</div>
        </div>
    </div>

</div>

<script>
    window.__timelines = window.__timelines || {};
    var tl3 = gsap.timeline({ paused: true });

    // Shatter effect (Deterministic)
    var cards3 = document.querySelectorAll("#legacy-tree .glass-card");
    cards3.forEach(function(card, i) {
        var xDir = i % 2 === 0 ? 1 : -1;
        var yDir = i % 3 === 0 ? 1 : -1;
        tl3.to(card, {
            x: xDir * (500 + (i * 100)),
            y: yDir * (500 + (i * 100)),
            rotation: i * 45,
            opacity: 0,
            scale: 0,
            duration: 1.5,
            ease: "expo.in"
        }, 3 + (i * 0.1));
    });

    tl3.to("#legacy-tree .title", {
        opacity: 0,
        duration: 0.5
    }, 3.5);
    
    tl3.set("#legacy-tree .title", { opacity: 0 }, 4.0);

    // AI System Arrival
    tl3.from("#ai-system img", {
        scale: 0,
        opacity: 0,
        rotation: 45,
        duration: 2,
        ease: "back.out(1.7)"
    }, 4);

    tl3.from("#ai-system .glass-card", {
        y: 100,
        opacity: 0,
        duration: 1,
        ease: "power3.out"
    }, 5);

    // Pulsing AI Core
    tl3.to("#ai-system img", {
        scale: 1.05,
        duration: 2,
        repeat: 5,
        yoyo: true,
        ease: "sine.inOut"
    }, 6);

    window.__timelines["scene3"] = tl3;
</script>
