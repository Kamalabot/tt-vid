<div id="scene1-root" data-composition-id="scene1" data-start="0" data-width="1080" data-height="1920">
    <!-- Dark Background Overlay for Scene 1 -->
    <div class="clip" data-start="0" data-duration="10" data-track-index="0" style="background: #000;"></div>

    <!-- Employee Grid Container -->
    <div id="grid-container" class="clip" data-start="0" data-duration="10" data-track-index="1" 
         style="display: grid; grid-template-columns: repeat(30, 1fr); gap: 10px; padding: 120px; opacity: 0.6; align-content: start;">
        <!-- Dots will be injected via JS -->
    </div>

    <!-- Counter Overlay -->
    <div id="counter-group" class="clip" data-start="0.5" data-duration="9.5" data-track-index="2"
         style="top: 35%; width: 100%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px;">
        <div class="subtitle" style="letter-spacing: 5px; opacity: 0.8;">UBER CORPORATE HEADCOUNT</div>
        <div id="employee-count" class="title mono gradient-text-cyan" style="font-size: 200px; text-shadow: 0 0 50px rgba(74, 144, 226, 0.3);">0</div>
    </div>

    <!-- Cost Card -->
    <div id="cost-card" class="clip glass-card" data-start="4" data-duration="6" data-track-index="3"
         style="bottom: 15%; left: 50%; width: 900px; border: 2px solid var(--accent-red); background: rgba(226, 74, 104, 0.1);">
        <div class="subtitle" style="text-align: center; margin-bottom: 20px; color: var(--accent-red); font-weight: bold;">TOTAL ANNUAL HUMAN COST</div>
        <div class="title gradient-text-red mono" style="text-align: center; font-size: 110px; text-shadow: 0 0 30px rgba(226, 74, 104, 0.4);">$5B - $7B</div>
    </div>
</div>

<script>
    (function() {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });

        // Inject 900 dots (30x30) to represent the 34,000 scale visually
        var grid = document.querySelector('#grid-container');
        if (grid) {
            for (var i = 0; i < 900; i++) {
                var dot = document.createElement('div');
                dot.style.width = '8px';
                dot.style.height = '8px';
                dot.style.background = 'var(--accent-cyan)';
                dot.style.borderRadius = '50%';
                dot.style.opacity = '0';
                dot.style.boxShadow = '0 0 8px var(--accent-cyan)';
                dot.classList.add('dot');
                grid.appendChild(dot);
            }
        }

        // Staggered dots entry
        tl.to(".dot", {
            opacity: 0.4,
            scale: 1,
            stagger: {
                each: 0.001,
                from: "random",
                grid: [30, 30]
            },
            duration: 1,
            ease: "power2.out"
        }, 0);

        // Twinkle effect loop (Deterministic)
        // Repeat 5 times within 10s duration
        tl.to(".dot", {
            opacity: 0.8,
            duration: 1,
            repeat: 4,
            yoyo: true,
            stagger: {
                each: 0.01,
                from: "start"
            },
            ease: "sine.inOut"
        }, 1);

        // Counter animation
        tl.to({ val: 0 }, {
            val: 34000,
            duration: 4,
            ease: "expo.out",
            onUpdate: function() {
                var el = document.getElementById('employee-count');
                if (el) el.innerText = Math.floor(this.targets()[0].val).toLocaleString();
            }
        }, 0.5);

        // Cost Card Slide In
        tl.fromTo("#cost-card", 
            { y: 300, opacity: 0, xPercent: -50 },
            { y: 0, opacity: 1, xPercent: -50, duration: 1.5, ease: "elastic.out(1, 0.8)" }, 
            4
        );

        // Sub-grid dimming when card appears
        tl.to("#grid-container", {
            opacity: 0.2,
            duration: 2
        }, 4);

        window.__timelines["scene1"] = tl;
    })();
</script>
