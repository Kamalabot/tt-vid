<template id="scene2-template">
  <div data-composition-id="scene2" data-start="0" data-duration="15" data-width="1920" data-height="1080">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      [data-composition-id="scene2"] {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background: transparent;
      }

      [data-composition-id="scene2"] .entrepreneur {
        width: 150px;
        height: 150px;
        background: #3498db;
        border-radius: 50%;
        box-shadow: 0 0 30px rgba(52, 152, 219, 0.4);
        z-index: 10;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      [data-composition-id="scene2"] .product-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        margin-top: -150px;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 11;
      }

      [data-composition-id="scene2"] .product {
        width: 80px;
        height: 80px;
        background: #f1c40f;
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        box-shadow: 0 0 40px rgba(241, 196, 15, 0.6);
      }

      [data-composition-id="scene2"] .label {
        font-family: 'Inter', sans-serif;
        font-size: 20px;
        font-weight: bold;
        color: white;
        margin-top: 10px;
        text-shadow: 0 0 5px rgba(0,0,0,0.5);
      }

      [data-composition-id="scene2"] .team-wrapper {
        position: absolute;
        opacity: 0;
        scale: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translate(-50%, -50%);
      }

      [data-composition-id="scene2"] .team-member {
        width: 160px;
        height: 160px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255,255,255,0.2);
      }

      [data-composition-id="scene2"] .tm-1-wrap { top: 300px; left: 600px; }
      [data-composition-id="scene2"] .tm-2-wrap { top: 300px; left: 1320px; }
      [data-composition-id="scene2"] .tm-3-wrap { top: 780px; left: 600px; }
      [data-composition-id="scene2"] .tm-4-wrap { top: 780px; left: 1320px; }

      [data-composition-id="scene2"] .tm-1 .team-member { background: #e67e22; }
      [data-composition-id="scene2"] .tm-2 .team-member { background: #9b59b6; }
      [data-composition-id="scene2"] .tm-3 .team-member { background: #1abc9c; }
      [data-composition-id="scene2"] .tm-4 .team-member { background: #e91e63; }

      [data-composition-id="scene2"] .product-clone {
        width: 40px;
        height: 40px;
        background: #f1c40f;
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        position: absolute;
        opacity: 0;
        transform: translate(-50%, -50%);
      }

      [data-composition-id="scene2"] .narrative {
        position: absolute;
        bottom: 100px;
        font-size: 36px;
        font-weight: 400;
        color: #aaa;
        letter-spacing: 2px;
        text-align: center;
        width: 100%;
        font-family: 'Inter', sans-serif;
      }
    </style>

    <div id="entrepreneur" class="entrepreneur clip" data-start="0" data-duration="15" data-track-index="2"></div>
    <div id="product-wrap" class="product-wrapper clip" data-start="0" data-duration="15" data-track-index="3">
      <div class="product"></div><div class="label" style="color: #f1c40f;">Solution</div>
    </div>
    
    <div id="tm-1" class="team-wrapper tm-1-wrap tm-1 clip" data-start="5" data-duration="10" data-track-index="10">
      <div class="team-member"></div><div class="label">Marketing</div>
    </div>
    <div id="tm-2" class="team-wrapper tm-2-wrap tm-2 clip" data-start="5.5" data-duration="9.5" data-track-index="11">
      <div class="team-member"></div><div class="label">Sales</div>
    </div>
    <div id="tm-3" class="team-wrapper tm-3-wrap tm-3 clip" data-start="6" data-duration="9" data-track-index="12">
      <div class="team-member"></div><div class="label">Admin</div>
    </div>
    <div id="tm-4" class="team-wrapper tm-4-wrap tm-4 clip" data-start="6.5" data-duration="8.5" data-track-index="13">
      <div class="team-member"></div><div class="label">Production</div>
    </div>

    <div id="pc-1" class="product-clone pc-1 clip" data-start="10" data-duration="5" data-track-index="20"></div>
    <div id="pc-2" class="product-clone pc-2 clip" data-start="10.5" data-duration="4.5" data-track-index="21"></div>

    <div id="narrative-text" class="narrative clip" data-start="0" data-duration="15" data-track-index="30"></div>

    <script>
      (function() {
        const scope = '[data-composition-id="scene2"]';
        const tl = gsap.timeline({ paused: true });

        // Helper for typewriting
        function typewrite(text, target, startTime) {
          const obj = { val: "" };
          tl.to(obj, {
            duration: text.length * 0.05,
            val: text,
            onUpdate: () => {
              const el = document.querySelector(scope + " " + target);
              if (el) el.innerText = obj.val;
            },
            ease: "none"
          }, startTime);
        }

        typewrite("Entrepreneur is building a team and brainstorming ideas...", "#narrative-text", 0.5);

        tl.from(scope + " .entrepreneur", { scale: 0.8, duration: 2, ease: "sine.inOut" }, 0);
        tl.from(scope + " .product-wrapper", { y: -50, duration: 2, ease: "sine.inOut" }, 0);

        // Team pops in
        [1, 2, 3, 4].forEach(i => {
          tl.to(scope + " #tm-" + i, {
            opacity: 1,
            scale: 1,
            duration: 1,
            ease: "back.out(1.7)"
          }, 5 + (i-1)*0.3);
        });

        // Process (Clones flying) - slowed down
        tl.to(scope + " .product-clone", { opacity: 1, duration: 0.2 }, 10);
        
        tl.to(scope + " #pc-1", {
          keyframes: [
            { left: 600, top: 300, duration: 1.5 },
            { left: 1320, top: 300, duration: 1.5 },
            { left: 1320, top: 780, duration: 1.5 },
            { left: 600, top: 780, duration: 1.5 }
          ],
          repeat: -1,
          ease: "none"
        }, 10);

        tl.to(scope + " #pc-2", {
          keyframes: [
            { left: 1320, top: 780, duration: 1.5 },
            { left: 600, top: 780, duration: 1.5 },
            { left: 600, top: 300, duration: 1.5 },
            { left: 1320, top: 300, duration: 1.5 }
          ],
          repeat: -1,
          ease: "none"
        }, 10.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene2"] = tl;
      })();
    </script>
  </div>
</template>
