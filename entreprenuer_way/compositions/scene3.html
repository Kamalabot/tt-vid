<template id="scene3-template">
  <div data-composition-id="scene3" data-start="0" data-duration="15" data-width="1920" data-height="1080">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      [data-composition-id="scene3"] {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        overflow: hidden;
        background: transparent;
      }

      [data-composition-id="scene3"] .label {
        font-family: 'Inter', sans-serif;
        font-size: 20px;
        font-weight: bold;
        color: white;
        margin-top: 10px;
        text-shadow: 0 0 5px rgba(0,0,0,0.5);
      }

      [data-composition-id="scene3"] .entrepreneur {
        width: 150px;
        height: 150px;
        background: #3498db;
        border-radius: 50%;
        box-shadow: 0 0 30px rgba(52, 152, 219, 0.4);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
      }

      [data-composition-id="scene3"] .product-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        margin-top: -150px;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 11;
      }

      [data-composition-id="scene3"] .product {
        width: 80px;
        height: 80px;
        background: #f1c40f;
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        box-shadow: 0 0 40px rgba(241, 196, 15, 0.6);
      }

      [data-composition-id="scene3"] .team-wrapper {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translate(-50%, -50%);
        z-index: 9;
      }

      [data-composition-id="scene3"] .team-member {
        width: 160px;
        height: 160px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255,255,255,0.2);
      }

      [data-composition-id="scene3"] .tm-1-wrap { top: 300px; left: 600px; }
      [data-composition-id="scene3"] .tm-2-wrap { top: 300px; left: 1320px; }
      [data-composition-id="scene3"] .tm-3-wrap { top: 780px; left: 600px; }
      [data-composition-id="scene3"] .tm-4-wrap { top: 780px; left: 1320px; }

      [data-composition-id="scene3"] .tm-1 .team-member { background: #e67e22; }
      [data-composition-id="scene3"] .tm-2 .team-member { background: #9b59b6; }
      [data-composition-id="scene3"] .tm-3 .team-member { background: #1abc9c; }
      [data-composition-id="scene3"] .tm-4 .team-member { background: #e91e63; }

      [data-composition-id="scene3"] .customer-wrapper {
        position: absolute;
        left: -100px;
        top: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 15;
      }

      [data-composition-id="scene3"] .customer {
        width: 80px;
        height: 80px;
        background: #7f8c8d;
        border-radius: 50%;
      }

      [data-composition-id="scene3"] .coin {
        width: 30px;
        height: 30px;
        background: #f1c40f;
        border-radius: 50%;
        position: absolute;
        bottom: -50px;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0;
        box-shadow: 0 0 15px rgba(241, 196, 15, 0.8);
      }

      [data-composition-id="scene3"] .graph-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1120px;
        height: 600px;
        z-index: 0;
        opacity: 0.2;
      }

      [data-composition-id="scene3"] .graph-line {
        fill: none;
        stroke: #3498db;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      [data-composition-id="scene3"] .profit-counter {
        position: absolute;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Inter', sans-serif;
        font-size: 64px;
        font-weight: bold;
        color: #2ecc71;
        opacity: 0;
        z-index: 20;
        text-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
      }
    </style>

    <div id="graph-bg" class="graph-container clip" data-start="10" data-duration="5" data-track-index="1">
      <svg viewBox="0 0 1120 600">
        <path id="path-line" class="graph-line" d="M 0 550 L 200 500 L 400 520 L 600 400 L 800 350 L 1120 50" />
      </svg>
    </div>

    <div id="entrepreneur" class="entrepreneur clip" data-start="0" data-duration="15" data-track-index="2"></div>
    
    <div id="product-wrap" class="product-wrapper clip" data-start="0" data-duration="15" data-track-index="7">
      <div class="product"></div><div class="label" style="color: #f1c40f;">Solution</div>
    </div>

    <div id="tm-1" class="team-wrapper tm-1-wrap tm-1 clip" data-start="0" data-duration="15" data-track-index="3">
      <div class="team-member"></div><div class="label">Marketing</div>
    </div>
    <div id="tm-2" class="team-wrapper tm-2-wrap tm-2 clip" data-start="0" data-duration="15" data-track-index="4">
      <div class="team-member"></div><div class="label">Sales</div>
    </div>
    <div id="tm-3" class="team-wrapper tm-3-wrap tm-3 clip" data-start="0" data-duration="15" data-track-index="5">
      <div class="team-member"></div><div class="label">Admin</div>
    </div>
    <div id="tm-4" class="team-wrapper tm-4-wrap tm-4 clip" data-start="0" data-duration="15" data-track-index="6">
      <div class="team-member"></div><div class="label">Production</div>
    </div>

    <div id="customer-1" class="customer-wrapper clip" data-start="0" data-duration="12" data-track-index="10">
      <div class="customer"></div><div class="label">Customer</div>
    </div>
    <div id="customer-2" class="customer-wrapper clip" data-start="1" data-duration="12" data-track-index="11">
      <div class="customer"></div><div class="label">Customer</div>
    </div>
    <div id="customer-3" class="customer-wrapper clip" data-start="2" data-duration="12" data-track-index="12">
      <div class="customer"></div><div class="label">Customer</div>
    </div>
    <div id="customer-4" class="customer-wrapper clip" data-start="3" data-duration="12" data-track-index="13">
      <div class="customer"></div><div class="label">Customer</div>
    </div>
    <div id="customer-5" class="customer-wrapper clip" data-start="4" data-duration="11" data-track-index="14">
      <div class="customer"></div><div class="label">Customer</div>
    </div>

    <div id="coin-1" class="coin clip" data-start="11" data-duration="4" data-track-index="20"></div>
    <div id="coin-2" class="coin clip" data-start="11.2" data-duration="3.8" data-track-index="21"></div>
    <div id="coin-3" class="coin clip" data-start="11.4" data-duration="3.6" data-track-index="22"></div>
    <div id="coin-4" class="coin clip" data-start="11.6" data-duration="3.4" data-track-index="23"></div>
    <div id="coin-5" class="coin clip" data-start="11.8" data-duration="3.2" data-track-index="24"></div>

    <div id="profit-counter" class="profit-counter clip" data-start="0" data-duration="15" data-track-index="30">Profit: $0</div>

    <script>
      (function() {
        const scope = '[data-composition-id="scene3"]';
        const tl = gsap.timeline({ paused: true });

        // Customer Stream (Real-world flow: touch all departments)
        [1, 2, 3, 4, 5].forEach(i => {
          const startTime = (i - 1) * 1.5; // Stagger start times
          const wrapId = "#customer-" + i;
          
          const cTl = gsap.timeline();
          
          cTl.to(scope + " " + wrapId, { x: 700, y: -240, duration: 0.5, ease: "power1.inOut" }) // To Marketing
             .to(scope + " " + wrapId, { duration: 0.2 }) // Pause
             .to(scope + " " + wrapId, { x: 1420, y: -240, duration: 0.5, ease: "power1.inOut" }) // To Sales
             .to(scope + " " + wrapId, { duration: 0.2 }) // Pause
             .to(scope + " " + wrapId, { x: 700, y: 240, duration: 0.5, ease: "power1.inOut" }) // To Admin
             .to(scope + " " + wrapId, { duration: 0.2 }) // Pause
             .to(scope + " " + wrapId, { x: 1420, y: 240, duration: 0.5, ease: "power1.inOut" }) // To Production
             .to(scope + " " + wrapId, { duration: 0.2 }) // Pause
             .to(scope + " " + wrapId, { x: 2220, y: 0, duration: 0.8, ease: "power1.in" }); // Exit

          tl.add(cTl, startTime);
          
          // Process (turn green at Production)
          tl.to(scope + " " + wrapId + " .customer", {
            backgroundColor: "#2ecc71",
            boxShadow: "0 0 30px rgba(46, 204, 113, 0.6)",
            duration: 0.3
          }, startTime + 2.8);
        });

        // Graph
        tl.from(scope + " #path-line", {
          strokeDasharray: 2000,
          strokeDashoffset: 2000,
          duration: 3,
          ease: "power2.out"
        }, 10);

        // Coin Fountain
        [1, 2, 3, 4, 5].forEach(i => {
          const startTime = 11 + (i - 1) * 0.2;
          const id = "#coin-" + i;
          
          tl.to(scope + " " + id, {
            opacity: 1,
            y: -800,
            x: (i % 2 === 0 ? "+=100" : "-=100"),
            rotation: 360,
            duration: 2,
            ease: "power1.out"
          }, startTime);
          
          tl.to(scope + " " + id, {
            opacity: 0,
            duration: 0.5
          }, startTime + 1.5);
        });

        // Profit Counter
        tl.to(scope + " #profit-counter", { opacity: 1, duration: 1 }, 0);
        const profitObj = { val: 25000 };
        tl.to(profitObj, {
          val: 1250000,
          duration: 14,
          ease: "power2.in", // Exponential growth
          onUpdate: () => {
            const el = document.querySelector(scope + " #profit-counter");
            if (el) el.innerText = "Profit: $" + Math.floor(profitObj.val).toLocaleString();
          }
        }, 1);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene3"] = tl;
      })();
    </script>
  </div>
</template>
