<template id="scene1-template">
  <div data-composition-id="scene1" data-start="0" data-duration="15" data-width="1920" data-height="1080">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      [data-composition-id="scene1"] {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background: transparent;
        font-family: 'Inter', sans-serif;
      }

      [data-composition-id="scene1"] .problem-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      [data-composition-id="scene1"] .problem {
        width: 300px;
        height: 300px;
        background: #e74c3c;
        clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        box-shadow: 0 0 50px rgba(231, 76, 60, 0.5);
      }

      [data-composition-id="scene1"] .entrepreneur-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) translateX(-1000px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      [data-composition-id="scene1"] .entrepreneur {
        width: 150px;
        height: 150px;
        background: #3498db;
        border-radius: 50%;
        box-shadow: 0 0 30px rgba(52, 152, 219, 0.4);
      }

      [data-composition-id="scene1"] .product {
        width: 80px;
        height: 80px;
        background: #f1c40f;
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        position: absolute;
        top: 50%;
        left: 50%;
        margin-top: -150px;
        transform: translate(-50%, -50%);
        opacity: 0;
        scale: 0;
        box-shadow: 0 0 40px rgba(241, 196, 15, 0.6);
      }

      [data-composition-id="scene1"] .label {
        font-size: 24px;
        font-weight: 700;
        text-transform: uppercase;
        margin-top: 15px;
        color: white;
        text-shadow: 0 0 10px rgba(0,0,0,0.5);
        opacity: 0;
      }

      [data-composition-id="scene1"] .narrative {
        position: absolute;
        bottom: 100px;
        font-size: 36px;
        font-weight: 400;
        color: #aaa;
        letter-spacing: 2px;
        text-align: center;
        width: 100%;
      }
    </style>

    <div id="problem-wrap" class="problem-wrapper clip" data-start="0" data-duration="12.5" data-track-index="1">
      <div class="problem"></div>
      <div id="problem-label" class="label">Problem</div>
    </div>

    <div id="entrepreneur-wrap" class="entrepreneur-wrapper clip" data-start="5" data-duration="10" data-track-index="2">
      <div class="entrepreneur"></div>
      <div id="entrepreneur-label" class="label">Entrepreneur</div>
    </div>

    <div id="product" class="product clip" data-start="12" data-duration="3" data-track-index="3"></div>
    
    <div id="narrative-text" class="narrative clip" data-start="0" data-duration="15" data-track-index="10"></div>

    <script>
      (function() {
        const scope = '[data-composition-id="scene1"]';
        const tl = gsap.timeline({ paused: true });

        // Helper for typewriting
        function typewrite(text, target, startTime) {
          const obj = { val: "" };
          tl.to(obj, {
            duration: text.length * 0.05,
            val: text,
            onUpdate: () => {
              const el = document.querySelector(scope + " " + target);
              if (el) el.innerText = obj.val;
            },
            ease: "none"
          }, startTime);
        }

        // 1. A massive problem appears
        tl.to(scope + " #problem-label", { opacity: 1, duration: 1 }, 0.5);
        typewrite("A massive challenge stands in the way...", "#narrative-text", 0);

        // Problem Vibration
        for (let i = 0; i < 120; i++) {
          const t = i * 0.1;
          tl.to(scope + " .problem", {
            x: (i % 2 === 0 ? 5 : -5),
            y: (i % 3 === 0 ? 3 : -3),
            duration: 0.1,
            ease: "none"
          }, t);
        }

        // 2. Entrepreneur arrives and centers
        tl.to(scope + " #entrepreneur-wrap", {
          x: -400, // Positioned left of center for the "encounter"
          duration: 3,
          ease: "power3.out"
        }, 5);
        
        tl.to(scope + " #entrepreneur-label", { opacity: 1, duration: 1 }, 6);
        typewrite("An entrepreneur arrives with a vision.", "#narrative-text", 5.5);

        // 3. Transformation
        tl.to(scope + " #problem-wrap", {
          scale: 0,
          opacity: 0,
          duration: 1,
          ease: "back.in(1.7)"
        }, 12);

        tl.to(scope + " #entrepreneur-wrap", {
          x: 0, // Move to absolute center
          duration: 1,
          ease: "power2.inOut"
        }, 12);

        typewrite("A solution is born.", "#narrative-text", 12);

        tl.to(scope + " #product", {
          opacity: 1,
          scale: 1,
          duration: 1.5,
          ease: "elastic.out(1, 0.3)"
        }, 12.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1"] = tl;
      })();
    </script>
  </div>
</template>
