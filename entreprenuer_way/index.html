<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Entrepreneur's Way</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg-color: #050505;
        --text-color: #ffffff;
        --accent-color: #3498db;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg-color);
        font-family: 'Inter', sans-serif;
        color: var(--text-color);
      }
      /* Standard HyperFrames .clip class for containers and timed elements */
      .clip {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      /* Shapes should NOT inherit 100% width/height if they are nested clips */
      .clip .clip {
        width: auto;
        height: auto;
      }
      
      .intro-text {
        font-size: 120px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -2px;
        background: linear-gradient(135deg, #fff 0%, #aaa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
      }
      .intro-subtitle {
        font-size: 32px;
        font-weight: 400;
        opacity: 0.7;
        margin-top: 20px;
        letter-spacing: 10px;
        text-transform: uppercase;
      }
      .content-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="48"
      data-width="1920"
      data-height="1080"
    >
      <!-- Intro Scene (Highest track to be on top) -->
      <div id="intro" class="clip" data-start="0" data-duration="3" data-track-index="10">
        <div class="content-wrapper">
          <div id="intro-title" class="intro-text">Entrepreneur's Way</div>
          <div id="intro-subtitle" class="intro-subtitle">A Journey of Creation</div>
        </div>
      </div>

      <!-- Sub-composition Containers -->
      <div 
        id="scene1-container" 
        class="clip" 
        data-composition-src="compositions/scene1.html" 
        data-composition-id="scene1" 
        data-start="3" 
        data-duration="15" 
        data-track-index="1"
      ></div>

      <div 
        id="scene2-container" 
        class="clip" 
        data-composition-src="compositions/scene2.html" 
        data-composition-id="scene2" 
        data-start="18" 
        data-duration="15" 
        data-track-index="1"
      ></div>

      <div 
        id="scene3-container" 
        class="clip" 
        data-composition-src="compositions/scene3.html" 
        data-composition-id="scene3" 
        data-start="33" 
        data-duration="15" 
        data-track-index="1"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Intro Animation logic only (Visibility handled by framework tracks)
      tl.from("#intro-title", { 
        y: 100, 
        opacity: 0, 
        duration: 1.5, 
        ease: "expo.out" 
      }, 0);
      
      tl.from("#intro-subtitle", { 
        y: 20, 
        opacity: 0, 
        duration: 1, 
        ease: "power2.out" 
      }, 0.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
