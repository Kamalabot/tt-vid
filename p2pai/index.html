<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>P2P Local Inference - HyperFrames</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/MotionPathPlugin.min.js"></script>
</head>
<body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="20" data-width="1080" data-height="1920">
        
        <!-- Active Background -->
        <div class="grid-overlay clip" data-start="0" data-duration="20" data-track-index="0"></div>
        <div id="scanner" class="scanner-line clip" data-start="0" data-duration="20" data-track-index="1"></div>

        <!-- SCENE 1: Intro -->
        <div id="intro-group" class="clip" data-start="0" data-duration="4" data-track-index="2">
            <div class="inner">
                <h1 class="title-large">USER SENDS REQUESTS</h1>
                <h1 class="title-large">TO CONNECTED PEERS</h1>
                <p class="subtitle">DECENTRALIZED GRID</p>
            </div>
        </div>

        <!-- MAIN SCENE: The Network -->
        <div id="main-scene" class="clip" data-start="3" data-duration="15" data-track-index="3">
            <div class="inner">
                
                <div class="header-container" id="top-header-wrap">
                    <div class="popping-header">
                        <span class="header-text">PEER TO PEER NETWORK IN ACTION</span>
                    </div>
                </div>

                <svg id="mesh-svg" style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;">
                    <g id="connector-lines"></g>
                </svg>

                <!-- Top Mesh -->
                <div id="mesh-top" class="mesh-layer">
                    <!-- 9 GPUs -->
                </div>

                <!-- Request Origin - 58% Down -->
                <div id="ai-core-wrap" style="position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%) translateZ(600px); z-index: 1000;">
                    <div id="ai-core" style="width: 550px; height: 550px; position: relative;">
                        <div style="position: absolute; inset: -150px; background: radial-gradient(circle, var(--primary) 0%, transparent 80%); opacity: 0.6; border-radius: 50%; filter: blur(60px);"></div>
                        <img src="ai_model_core_node_1777378146939.png" alt="Core" style="width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 300px var(--primary); border: 12px solid #fff;">
                        <div class="glass-card" style="position: absolute; bottom: -160px; left: 50%; transform: translateX(-50%); width: 500px; text-align: center; border: 5px solid var(--primary); background: rgba(0,0,0,1); box-shadow: 0 0 200px rgba(34, 211, 238, 0.6);">
                            <div style="font-size: 44px; color: #fff; font-weight: 950; letter-spacing: 6px;">REQUEST ORIGIN</div>
                            <div style="font-size: 22px; font-family: var(--font-mono); color: var(--primary); margin-top: 15px; font-weight: 800;">DECENTRALIZED GRID v10.0</div>
                        </div>
                    </div>
                </div>

                <!-- Bottom Mesh -->
                <div id="mesh-bottom" class="mesh-layer">
                    <!-- 9 GPUs -->
                </div>

            </div>
        </div>

        <!-- DATA FLOWS -->
        <div id="data-flow-layer" class="clip" data-start="6" data-duration="12" data-track-index="4" style="pointer-events: none;">
            <div class="inner" id="particle-container" style="perspective: 3000px;"></div>
        </div>

        <!-- OUTRO -->
        <div id="outro-group" class="clip" data-start="18" data-duration="2" data-track-index="5" style="background: var(--bg-dark); z-index: 2000;">
            <div class="inner">
                <h1 class="title-large">ULTIMATE</h1>
                <h1 class="title-large">COMMODITY GRID</h1>
                <p class="subtitle">LOCAL • SCALABLE • SECURE</p>
            </div>
        </div>

    </div>

    <script>
        gsap.registerPlugin(MotionPathPlugin);

        function mulberry32(a) {
            return function() {
                let t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        const random = mulberry32(54321);

        window.__timelines = window.__timelines || {};
        const mainTl = gsap.timeline({ paused: true });

        const CX = 1080/2;
        const ORIGIN_Y = 1920 * 0.58;

        // Background Scanner Animation
        mainTl.fromTo("#scanner", { y: -600 }, { y: 2520, repeat: 10, duration: 2.5, ease: "none" }, 0);

        function createGPU(id, label) {
            const node = document.createElement('div');
            node.className = 'gpu-node';
            node.id = id;
            node.innerHTML = `
                <div class="gpu-header">GPU</div>
                <div class="gpu-led"></div>
                <div class="gpu-heatsink">
                    <div class="heatsink-line"></div>
                    <div class="heatsink-line"></div>
                    <div class="heatsink-line"></div>
                    <div class="heatsink-line"></div>
                </div>
                <div class="gpu-fan"></div>
                <div class="gpu-label">${label}</div>
            `;
            return node;
        }

        const topMesh = document.getElementById('mesh-top');
        const bottomMesh = document.getElementById('mesh-bottom');
        const gpuNodes = [];

        // 3x3 Grid
        for(let i=0; i<9; i++) {
            const gpu = createGPU(`gpu-t-${i}`, `NODE-X${i+1}`);
            const row = Math.floor(i / 3);
            const scale = 1.3 - (row * 0.2); 
            gpu.style.transform = `scale(${scale})`;
            topMesh.appendChild(gpu);
            gpuNodes.push(gpu);
        }
        for(let i=0; i<9; i++) {
            const gpu = createGPU(`gpu-b-${i}`, `NODE-Y${i+1}`);
            const row = 2 - Math.floor(i / 3);
            const scale = 1.3 - (row * 0.2);
            gpu.style.transform = `scale(${scale})`;
            bottomMesh.appendChild(gpu);
            gpuNodes.push(gpu);
        }

        // --- Animations ---

        mainTl.fromTo("#intro-group .inner h1", { scale: 0.1, opacity: 0, z: 1000 }, { scale: 1, opacity: 1, z: 0, stagger: 0.2, duration: 1.5, ease: "power4.out" }, 0.5);
        mainTl.to("#intro-group .inner", { opacity: 0, scale: 5, duration: 1.2 }, 3.2);

        // Main Scene Appearance
        mainTl.fromTo("#ai-core-wrap", { scale: 0, opacity: 0, z: -1000 }, { scale: 1, opacity: 1, z: 600, duration: 2, ease: "expo.out" }, 3.2);
        mainTl.fromTo("#top-header-wrap", { scale: 0.3, opacity: 0, y: -150 }, { scale: 1, opacity: 1, y: 0, duration: 1.5, ease: "elastic.out(1, 0.7)" }, 3.5);
        
        gpuNodes.forEach((node, i) => {
            mainTl.fromTo(node, 
                { opacity: 0, scale: 0, z: -1000 }, 
                { opacity: 1, scale: node.style.transform.match(/scale\((.*?)\)/)[1], z: 0, duration: 1.5, delay: i * 0.05, ease: "power2.out" }, 
                4 + (i * 0.05)
            );
            mainTl.to(node.querySelector('.gpu-fan'), { rotation: 360, repeat: 35, duration: 0.3, ease: "none" }, 4.5);
        });

        // Connector Lines
        mainTl.add(() => {
            const svgGroup = document.getElementById("connector-lines");
            if (!svgGroup || svgGroup.children.length > 0) return;
            gpuNodes.forEach((node, i) => {
                const rect = node.getBoundingClientRect();
                const px = rect.left + rect.width/2;
                const py = rect.top + rect.height/2;

                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("d", `M ${CX} ${ORIGIN_Y} L ${px} ${py}`);
                line.setAttribute("class", "connector");
                svgGroup.appendChild(line);
                gsap.fromTo(line, { strokeDashoffset: 2500, strokeDasharray: 2500 }, { strokeDashoffset: 0, duration: 2, opacity: 0.1 }, 6 + (i * 0.1));
            });
        }, 6);

        // Data Packets
        const createParticle = () => {
            const gpu = gpuNodes[Math.floor(random() * gpuNodes.length)];
            const gRect = gpu.getBoundingClientRect();
            const gx = gRect.left + gRect.width/2;
            const gy = gRect.top + gRect.height/2;

            const particle = document.createElement("div");
            particle.className = "particle";
            particle.style.position = "absolute";
            particle.style.left = CX + "px";
            particle.style.top = ORIGIN_Y + "px";
            document.getElementById("particle-container").appendChild(particle);

            const angle = Math.atan2(gy - ORIGIN_Y, gx - CX) * (180 / Math.PI);
            gsap.set(particle, { rotation: angle });

            gsap.to(particle, {
                duration: 1.2,
                x: gx - CX,
                y: gy - ORIGIN_Y,
                opacity: 0,
                scaleX: 2.5,
                scaleY: 0.4,
                ease: "power2.inOut",
                onComplete: () => particle.remove()
            });
        };

        for(let i=0; i<150; i++) {
            mainTl.add(() => createParticle(), 7 + (i * 0.08));
        }

        // Outro
        mainTl.set("#main-scene .inner", { opacity: 0, visibility: "hidden" }, 18);
        mainTl.fromTo("#outro-group .inner", { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 1.2, ease: "back.out" }, 18);

        window.__timelines["main"] = mainTl;
    </script>
</body>
</html>
