<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>B2B SaaS Platform Story</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #0f172a;
        --accent-1: #38bdf8;
        --accent-2: #818cf8;
        --accent-3: #c084fc;
        --text-color: #f8fafc;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: var(--bg-color);
        font-family: 'Outfit', sans-serif;
        color: var(--text-color);
      }

      #main-root {
        width: 1080px;
        height: 1920px;
        position: relative;
      }

      .clip {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        opacity: 0;
        pointer-events: none;
      }

      .bg-gradient {
        background: radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.15), transparent),
                    radial-gradient(circle at 80% 70%, rgba(192, 132, 252, 0.15), transparent);
        z-index: 0;
      }

      .animated-blob {
        position: absolute;
        filter: blur(80px);
        border-radius: 50%;
        opacity: 0.6;
      }

      .title-container {
        flex-direction: column;
        z-index: 10;
      }

      .main-title {
        font-size: 140px;
        font-weight: 900;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: -4px;
        line-height: 0.9;
        color: #fff;
        text-shadow: 0 0 20px rgba(56, 189, 248, 0.8), 0 0 40px rgba(56, 189, 248, 0.4);
      }

      .feature-list {
        margin-top: 60px;
        display: flex;
        flex-direction: column;
        gap: 30px;
        font-size: 56px;
        font-weight: 900;
        color: #00f2ff;
        text-align: center;
        letter-spacing: 2px;
      }

      .feature-item {
        color: #00f2ff;
        text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div
      id="main-root"
      data-composition-id="main"
      data-start="0"
      data-duration="27"
      data-width="1080"
      data-height="1920"
    >
      <!-- Background Elements (Track 0) -->
      <div class="clip bg-gradient" data-start="0" data-duration="27" data-track-index="0" style="opacity: 1">
        <div class="animated-blob blob-1" style="width: 800px; height: 800px; background: var(--accent-1); top: 10%; left: -10%;"></div>
        <div class="animated-blob blob-2" style="width: 1000px; height: 1000px; background: var(--accent-3); bottom: 10%; right: -20%;"></div>
      </div>

      <!-- Intro Section (Track 1) -->
      <div id="intro" class="clip title-container" data-start="0" data-duration="5" data-track-index="1">
        <div class="main-title">B2B SaaS<br>EVOLUTION</div>
        <div class="feature-list">
          <div class="feature-item">Registration</div>
          <div class="feature-item">Project Management</div>
          <div class="feature-item">Global Collaboration</div>
          <div class="feature-item">Advanced Reporting</div>
        </div>
      </div>

      <!-- Registration Scenario (Track 2) -->
      <div 
        id="registration-container" 
        class="clip" 
        data-composition-id="registration"
        data-start="5" 
        data-duration="12" 
        data-track-index="2"
        data-composition-src="compositions/registration.html"
      ></div>

      <!-- Login Scenario (Track 3) -->
      <div 
        id="login-container" 
        class="clip" 
        data-composition-id="login"
        data-start="17" 
        data-duration="10" 
        data-track-index="3"
        data-composition-src="compositions/login.html"
      ></div>

      <!-- Footer Logo (Track 4) -->
      <div id="footer-logo" class="clip" data-start="25" data-duration="2" data-track-index="4" style="align-items: flex-end; padding-bottom: 100px;">
        <div style="font-size: 32px; font-weight: 700; letter-spacing: 4px; color: var(--accent-1);">SaaS OS v1.0</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const scope = '[data-composition-id="main"]';

      // 1. Background Animation
      tl.to(`${scope} .blob-1`, {
        x: 200,
        y: 100,
        scale: 1.2,
        duration: 27,
        ease: "none"
      }, 0);
      tl.to(`${scope} .blob-2`, {
        x: -200,
        y: -100,
        scale: 1.3,
        duration: 27,
        ease: "none"
      }, 0);

      // 2. Intro Animation (0s - 5s)
      tl.set(`${scope} #intro`, { opacity: 1 }, 0);
      tl.from(`${scope} .main-title`, {
        y: 100,
        opacity: 0,
        duration: 1.5,
        ease: "power4.out"
      }, 0.5);
      tl.from(`${scope} .feature-item`, {
        x: -50,
        opacity: 0,
        stagger: 0.2,
        duration: 1,
        ease: "power3.out"
      }, 1.5);
      tl.to(`${scope} #intro`, {
        opacity: 0,
        y: -100,
        duration: 1,
        ease: "power3.in"
      }, 4);

      // 3. Registration Scenario (5s - 17s)
      tl.set(`${scope} #registration-container`, { opacity: 1 }, 5);
      // Exit is handled inside the sub-composition but we can ensure clean handover

      // 4. Login Scenario (17s - 27s)
      tl.set(`${scope} #login-container`, { opacity: 1 }, 17);

      // Footer Logo
      tl.set(`${scope} #footer-logo`, { opacity: 1 }, 25);
      tl.from(`${scope} #footer-logo div`, {
        y: 20,
        opacity: 0,
        duration: 1
      }, 25);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
