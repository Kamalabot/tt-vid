<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono&display=swap');

      [data-composition-id="registration"] {
        width: 1080px;
        height: 1920px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Outfit', sans-serif;
        color: #f8fafc;
      }

      [data-composition-id="registration"] .clip {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }

      [data-composition-id="registration"] .scenario-card {
        width: 900px;
        height: 1200px;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 60px;
        padding: 80px;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        overflow: hidden;
        box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      }

      [data-composition-id="registration"] .scenario-tag {
        background: #38bdf8;
        color: #0f172a;
        padding: 10px 30px;
        border-radius: 100px;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 40px;
      }

      [data-composition-id="registration"] .scenario-title {
        font-size: 80px;
        font-weight: 900;
        margin-bottom: 60px;
        line-height: 1.1;
      }

      [data-composition-id="registration"] .form-mockup {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      [data-composition-id="registration"] .input-field {
        height: 110px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        display: flex;
        align-items: center;
        padding: 0 40px;
        font-size: 40px;
        font-family: 'JetBrains Mono', monospace;
        color: rgba(255, 255, 255, 0.9);
        position: relative;
        opacity: 0; /* Start hidden */
      }

      [data-composition-id="registration"] .cursor {
        display: inline-block;
        width: 4px;
        height: 50px;
        background: #38bdf8;
        margin-left: 10px;
        opacity: 0;
      }

      [data-composition-id="registration"] .active .cursor {
        animation: blink 0.8s infinite;
        opacity: 1;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      [data-composition-id="registration"] .btn-primary {
        height: 120px;
        background: #38bdf8;
        border-radius: 20px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        font-weight: 700;
        color: #0f172a;
        margin-top: 40px;
        box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
        opacity: 0;
      }

      [data-composition-id="registration"] .success-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 60px;
        opacity: 0;
        z-index: 100;
      }

      [data-composition-id="registration"] .success-check {
        width: 200px;
        height: 200px;
        color: #4ade80;
        margin-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <div
      id="registration-root"
      data-composition-id="registration"
      data-start="0"
      data-duration="12"
      data-width="1080"
      data-height="1920"
    >
      <div class="clip" style="opacity: 1">
        <div class="scenario-card">
          <div class="scenario-tag">SCENARIO 01</div>
          <div class="scenario-title">Join the<br>Platform</div>
          
          <div class="form-mockup">
            <div class="input-field field-1">
              <span class="text"></span><span class="cursor"></span>
            </div>
            <div class="input-field field-2">
              <span class="text"></span><span class="cursor"></span>
            </div>
            <div class="input-field field-3">
              <span class="text"></span><span class="cursor"></span>
            </div>
            <div class="btn-primary">Register Now</div>
          </div>

          <div class="success-overlay">
            <svg class="success-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <div id="status-text" style="font-size: 56px; font-weight: 900;">Registration<br>Successful!</div>
            <div id="redirect-text" style="font-size: 36px; color: rgba(255,255,255,0.6); margin-top: 30px; text-align: center;">Entering Workspace...</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const scope = '[data-composition-id="registration"]';

      // Intro
      tl.from(`${scope} .scenario-card`, {
        y: 200,
        opacity: 0,
        duration: 1,
        ease: "power4.out"
      }, 0);

      // Improved Typewriting simulation helper
      function simulateTyping(target, text, startTime) {
        const obj = { val: "" };
        const container = document.querySelector('[data-composition-id="registration"] ' + target);
        const textEl = container.querySelector('.text');
        
        // Reveal field first
        tl.to(container, { opacity: 1, y: 0, duration: 0.5 }, startTime);
        
        // Show cursor
        tl.set(container, { className: "input-field active" }, startTime + 0.3);
        
        tl.to(obj, {
          duration: text.length * 0.08,
          val: text,
          onUpdate: () => {
            textEl.innerText = obj.val;
          },
          ease: "none"
        }, startTime + 0.5);

        // Hide cursor
        tl.set(container, { className: "input-field" }, startTime + 0.5 + (text.length * 0.08) + 0.3);
      }

      // Typing sequence
      simulateTyping('.field-1', "John Smith", 1.0);
      simulateTyping('.field-2', "john.smith@example.com", 2.8);
      simulateTyping('.field-3', "••••••••••••", 4.8);

      // Reveal Button
      tl.to(`${scope} .btn-primary`, { opacity: 1, y: 0, duration: 0.5 }, 6.5);

      // Button Click
      tl.to(`${scope} .btn-primary`, {
        scale: 0.95,
        backgroundColor: "#22d3ee",
        duration: 0.2,
        yoyo: true,
        repeat: 1
      }, 7.2);

      // Success Overlay
      tl.to(`${scope} .success-overlay`, {
        opacity: 1,
        duration: 0.5,
        ease: "power2.out"
      }, 7.7);

      tl.from(`${scope} .success-check`, {
        scale: 0,
        rotation: -45,
        duration: 0.8,
        ease: "back.out(1.7)"
      }, 7.9);

      // Redirecting sequence
      tl.to(`${scope} #status-text`, {
        opacity: 0,
        y: -20,
        duration: 0.5,
        delay: 2
      }, 9.2);

      tl.from(`${scope} #redirect-text`, {
        opacity: 0,
        y: 20,
        duration: 0.5
      }, 10.2);

      // Exit transition
      tl.to(`${scope} .scenario-card`, {
        scale: 0.8,
        opacity: 0,
        filter: "blur(20px)",
        duration: 1,
        ease: "power3.in"
      }, 11);

      window.__timelines["registration"] = tl;
    </script>
  </body>
</html>
