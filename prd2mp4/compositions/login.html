<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono&display=swap');

      [data-composition-id="login"] {
        width: 1080px;
        height: 1920px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Outfit', sans-serif;
        color: #f8fafc;
      }

      [data-composition-id="login"] .clip {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }

      [data-composition-id="login"] .scenario-card {
        width: 900px;
        height: 1000px;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 60px;
        padding: 80px;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        overflow: hidden;
        box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      }

      [data-composition-id="login"] .scenario-tag {
        background: #818cf8;
        color: #0f172a;
        padding: 10px 30px;
        border-radius: 100px;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 40px;
      }

      [data-composition-id="login"] .scenario-title {
        font-size: 80px;
        font-weight: 900;
        margin-bottom: 60px;
        line-height: 1.1;
      }

      [data-composition-id="login"] .form-mockup {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      [data-composition-id="login"] .input-field {
        height: 110px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        display: flex;
        align-items: center;
        padding: 0 40px;
        font-size: 40px;
        font-family: 'JetBrains Mono', monospace;
        color: rgba(255, 255, 255, 0.9);
        position: relative;
        opacity: 0; /* Start hidden */
      }

      [data-composition-id="login"] .cursor {
        display: inline-block;
        width: 4px;
        height: 50px;
        background: #818cf8;
        margin-left: 10px;
        opacity: 0;
      }

      [data-composition-id="login"] .active .cursor {
        animation: blink 0.8s infinite;
        opacity: 1;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      [data-composition-id="login"] .btn-primary {
        height: 120px;
        background: #818cf8;
        border-radius: 20px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        font-weight: 700;
        color: #0f172a;
        margin-top: 40px;
        box-shadow: 0 10px 30px rgba(129, 140, 248, 0.3);
        opacity: 0;
      }

      [data-composition-id="login"] .welcome-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #4f46e5, #818cf8);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 60px;
        opacity: 0;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div
      id="login-root"
      data-composition-id="login"
      data-start="0"
      data-duration="10"
      data-width="1080"
      data-height="1920"
    >
      <div class="clip" style="opacity: 1">
        <div class="scenario-card">
          <div class="scenario-tag">SCENARIO 02</div>
          <div class="scenario-title">Access your<br>Dashboard</div>
          
          <div class="form-mockup">
            <div class="input-field field-1">
              <span class="text"></span><span class="cursor"></span>
            </div>
            <div class="input-field field-2">
              <span class="text"></span><span class="cursor"></span>
            </div>
            <div class="btn-primary">Sign In</div>
          </div>

          <div class="welcome-overlay">
            <div style="font-size: 72px; font-weight: 900; text-align: center;">Welcome to<br>SaaS OS</div>
            <div style="font-size: 32px; color: rgba(255,255,255,0.8); margin-top: 40px; font-weight: 700; letter-spacing: 2px;">SYNCING WORKSPACE...</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const scope = '[data-composition-id="login"]';

      // Intro
      tl.from(`${scope} .scenario-card`, {
        y: 200,
        opacity: 0,
        duration: 1,
        ease: "power4.out"
      }, 0);

      // Improved Typewriting simulation helper
      function simulateTyping(target, text, startTime) {
        const obj = { val: "" };
        const container = document.querySelector('[data-composition-id="login"] ' + target);
        const textEl = container.querySelector('.text');
        
        // Reveal field
        tl.to(container, { opacity: 1, y: 0, duration: 0.5 }, startTime);
        
        // Show cursor
        tl.set(container, { className: "input-field active" }, startTime + 0.3);
        
        tl.to(obj, {
          duration: text.length * 0.08,
          val: text,
          onUpdate: () => {
            textEl.innerText = obj.val;
          },
          ease: "none"
        }, startTime + 0.5);

        // Hide cursor
        tl.set(container, { className: "input-field" }, startTime + 0.5 + (text.length * 0.08) + 0.3);
      }

      simulateTyping('.field-1', "john.smith@example.com", 1.5);
      simulateTyping('.field-2', "••••••••••••", 3.5);

      // Reveal Button
      tl.to(`${scope} .btn-primary`, { opacity: 1, y: 0, duration: 0.5 }, 5.5);

      // Button Click
      tl.to(`${scope} .btn-primary`, {
        scale: 0.95,
        backgroundColor: "#6366f1",
        duration: 0.2,
        yoyo: true,
        repeat: 1
      }, 6.2);

      // Welcome Overlay
      tl.to(`${scope} .welcome-overlay`, {
        opacity: 1,
        duration: 0.8,
        ease: "power2.out"
      }, 6.7);

      tl.from(`${scope} .welcome-overlay div`, {
        scale: 0.8,
        opacity: 0,
        stagger: 0.3,
        duration: 1,
        ease: "back.out(1.7)"
      }, 6.9);

      // Exit transition
      tl.to(`${scope} .scenario-card`, {
        scale: 1.2,
        opacity: 0,
        duration: 1,
        ease: "power3.in"
      }, 9);

      window.__timelines["login"] = tl;
    </script>
  </body>
</html>
