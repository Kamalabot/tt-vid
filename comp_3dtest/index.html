<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #00f2ff;
        --secondary: #7000ff;
        --accent: #ff00c8;
        --bg: #030008;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 1920px;
        height: 1080px;
        background: var(--bg);
        color: #fff;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
      }
      #root {
        width: 1920px;
        height: 1080px;
        position: relative;
        perspective: 2000px;
        overflow: hidden;
      }
      .clip {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        transform-style: preserve-3d;
      }
      
      .vibrant-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 50%, #1a0033 0%, #030008 100%);
        z-index: -2;
      }

      .color-blob {
        position: absolute;
        width: 800px;
        height: 800px;
        border-radius: 50%;
        filter: blur(150px);
        opacity: 0.4;
        z-index: -1;
      }

      .blob-1 { background: var(--primary); top: -200px; left: -200px; }
      .blob-2 { background: var(--secondary); bottom: -200px; right: -200px; }
      .blob-3 { background: var(--accent); top: 50%; left: 50%; transform: translate(-50%, -50%); }

      .grid-3d {
        position: absolute;
        width: 4000px;
        height: 4000px;
        background-image: 
          linear-gradient(to right, rgba(0, 242, 255, 0.1) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 242, 255, 0.1) 1px, transparent 1px);
        background-size: 100px 100px;
        opacity: 0.5;
      }

      .title-wrap {
        text-align: center;
        transform-style: preserve-3d;
      }

      .main-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 180px;
        font-weight: 900;
        letter-spacing: 10px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.3));
        margin-bottom: 20px;
      }

      .subtitle {
        font-size: 32px;
        letter-spacing: 15px;
        opacity: 0.6;
        text-transform: uppercase;
        color: var(--primary);
      }

      .floating-cube {
        position: absolute;
        width: 100px;
        height: 100px;
        background: rgba(112, 0, 255, 0.2);
        border: 2px solid var(--secondary);
        transform-style: preserve-3d;
      }

      .cube-face {
        position: absolute;
        width: 100%;
        height: 100%;
        background: inherit;
        border: inherit;
      }

      /* 3D Cube Faces */
      .face-front  { transform: translateZ(50px); }
      .face-back   { transform: rotateY(180deg) translateZ(50px); }
      .face-right  { transform: rotateY(90deg) translateZ(50px); }
      .face-left   { transform: rotateY(-90deg) translateZ(50px); }
      .face-top    { transform: rotateX(90deg) translateZ(50px); }
      .face-bottom { transform: rotateX(-90deg) translateZ(50px); }

    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="18"
      data-width="1920"
      data-height="1080"
    >
      <!-- Vibrant Background -->
      <div id="bg-clip" class="clip" data-start="0" data-duration="10" data-track-index="0">
        <div class="vibrant-bg"></div>
        <div class="color-blob blob-1"></div>
        <div class="color-blob blob-2"></div>
        <div class="color-blob blob-3"></div>
      </div>

      <!-- Background Grid -->
      <div id="grid-clip" class="clip" data-start="0" data-duration="10" data-track-index="1">
        <div class="grid-3d"></div>
      </div>

      <!-- Floating Shapes -->
      <div id="shapes-clip" class="clip" data-start="0" data-duration="10" data-track-index="2">
        <div id="cube1" class="floating-cube">
          <div class="cube-face face-front"></div>
          <div class="cube-face face-back"></div>
          <div class="cube-face face-right"></div>
          <div class="cube-face face-left"></div>
          <div class="cube-face face-top"></div>
          <div class="cube-face face-bottom"></div>
        </div>
        <div id="cube2" class="floating-cube">
          <div class="cube-face face-front"></div>
          <div class="cube-face face-back"></div>
          <div class="cube-face face-right"></div>
          <div class="cube-face face-left"></div>
          <div class="cube-face face-top"></div>
          <div class="cube-face face-bottom"></div>
        </div>
      </div>

      <!-- Main Title -->
      <div id="title-clip" class="clip" data-start="0" data-duration="10" data-track-index="3">
        <div class="title-wrap">
          <h1 class="main-title">GSAP 3D</h1>
          <p class="subtitle">Enter the Dimension</p>
        </div>
      </div>

      <!-- Three.js Scene -->
      <div 
        id="scene1-container" 
        class="clip" 
        data-start="10" 
        data-duration="8" 
        data-track-index="4"
        data-composition-src="compositions/scene1_threejs.html"
        data-composition-id="scene1_threejs"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Vibrant Background Animation
      tl.to(".blob-1", { duration: 10, x: 200, y: 100, scale: 1.2, ease: "sine.inOut" }, 0);
      tl.to(".blob-2", { duration: 10, x: -300, y: -200, scale: 1.5, ease: "sine.inOut" }, 0);
      tl.to(".blob-3", { duration: 10, scale: 0.8, opacity: 0.2, ease: "sine.inOut" }, 0);

      // Grid Initial State
      tl.set(".grid-3d", { rotationX: 70, z: -500 });

      // Title Animation
      tl.from(".main-title", {
        duration: 2.5,
        z: -1500,
        rotationX: 90,
        rotationY: -45,
        opacity: 0,
        ease: "expo.out"
      }, 0);

      tl.from(".subtitle", {
        duration: 2,
        y: 100,
        opacity: 0,
        ease: "power3.out"
      }, 1);

      // Grid Animation
      tl.to(".grid-3d", {
        duration: 10,
        rotationZ: 45,
        y: 500,
        ease: "none"
      }, 0);

      // Floating Cubes
      tl.set("#cube1", { x: -600, y: -300, z: -200 });
      tl.set("#cube2", { x: 600, y: 300, z: -400 });

      tl.to("#cube1", {
        duration: 10,
        rotationX: 360,
        rotationY: 720,
        x: -400,
        y: -100,
        z: 200,
        ease: "none"
      }, 0);

      tl.to("#cube2", {
        duration: 10,
        rotationX: -720,
        rotationY: -360,
        x: 400,
        y: 100,
        z: 0,
        ease: "none"
      }, 0);

      // Glow pulse
      tl.to(".main-title", {
        duration: 2,
        filter: "drop-shadow(0 0 50px rgba(0, 242, 255, 0.6))",
        repeat: 4,
        yoyo: true,
        ease: "sine.inOut"
      }, 2);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
