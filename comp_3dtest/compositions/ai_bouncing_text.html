<template id="ai-bouncing-text-template">
  <div
    data-composition-id="ai_bouncing_text"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="4"
    style="position: relative; width: 1920px; height: 1080px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: transparent;"
  >
    <div id="typed-text-display"></div>
  </div>

  <style>
    [data-composition-id="ai_bouncing_text"] #typed-text-display {
      font-family: 'Orbitron', sans-serif;
      font-size: 120px;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
      white-space: nowrap;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <script>
    (function() {
      const compositionId = "ai_bouncing_text";
      window.__timelines = window.__timelines || {};
      
      const tl = gsap.timeline({ paused: true });
      const textDisplay = document.querySelector('[data-composition-id="ai_bouncing_text"] #typed-text-display');
      const fullText = "Artificial intelligence";
      
      // Initial state
      tl.set(textDisplay, { opacity: 0, y: 0, x: 0 });

      // 1. Deterministic Typewriter Effect (1s)
      const typeObj = { charCount: 0 };
      tl.to(typeObj, {
        charCount: fullText.length,
        duration: 1,
        ease: "none",
        onUpdate: () => {
          textDisplay.textContent = fullText.slice(0, Math.floor(typeObj.charCount));
        }
      }, 0);

      tl.to(textDisplay, { opacity: 1, duration: 0.3 }, 0);

      // 2. Bouncing Effect (1.5s)
      tl.to(textDisplay, {
        y: -100,
        duration: 0.4,
        ease: "power2.out"
      }, 1.2);

      tl.to(textDisplay, {
        y: 0,
        duration: 0.8,
        ease: "bounce.out"
      }, ">");

      // 3. Shake and Fade (1.3s)
      tl.to(textDisplay, {
        x: 20,
        duration: 0.1,
        repeat: 5,
        yoyo: true,
        ease: "sine.inOut"
      }, 2.7);

      tl.to(textDisplay, {
        opacity: 0,
        scale: 1.5,
        duration: 0.8,
        ease: "power2.in"
      }, 3.2);

      window.__timelines[compositionId] = tl;
    })();
  </script>
</template>
