<template id="scene1-threejs-template">
  <div
    data-composition-id="scene1_threejs"
    data-start="0"
    data-duration="8"
    data-width="1920"
    data-height="1080"
  >
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.152.2/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>

    <style>
      [data-composition-id="scene1_threejs"] {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }
      [data-composition-id="scene1_threejs"] canvas {
        width: 100%;
        height: 100%;
      }
      [data-composition-id="scene1_threejs"] .overlay-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'Orbitron', sans-serif;
        font-size: 80px;
        color: #fff;
        pointer-events: none;
        text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
      }
    </style>

    <div class="clip" data-start="0" data-duration="8" data-track-index="1">
      <div id="three-container"></div>
      <div class="overlay-text">THREE.JS DEPTH</div>
    </div>

    <script>
      (function() {
        const container = document.querySelector('[data-composition-id="scene1_threejs"] #three-container');
        
        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1920 / 1080, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(1920, 1080);
        container.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.PointLight(0x00f2ff, 2, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Geometry: Torus Knot
        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const material = new THREE.MeshPhongMaterial({ 
          color: 0x7000ff, 
          wireframe: true,
          emissive: 0x200040
        });
        const torusKnot = new THREE.Mesh(geometry, material);
        scene.add(torusKnot);

        camera.position.z = 30;

        // GSAP Timeline
        const tl = gsap.timeline({ 
          paused: true,
          onUpdate: () => {
            renderer.render(scene, camera);
          }
        });

        // Animations
        tl.from('[data-composition-id="scene1_threejs"] .overlay-text', {
          duration: 2,
          scale: 0.5,
          opacity: 0,
          ease: "expo.out"
        }, 0);

        tl.to(torusKnot.rotation, {
          duration: 8,
          x: Math.PI * 2,
          y: Math.PI * 4,
          ease: "none"
        }, 0);

        tl.to(camera.position, {
          duration: 4,
          z: 50,
          ease: "sine.inOut",
          yoyo: true,
          repeat: 1
        }, 0);

        // Initial Render
        renderer.render(scene, camera);

        // Register with HyperFrames
        window.__timelines = window.__timelines || {};
        window.__timelines["scene1_threejs"] = tl;
      })();
    </script>
  </div>
</template>
