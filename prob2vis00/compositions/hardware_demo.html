<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <title>Hardware to Software Interaction</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <style>
        :root {
            --bg: #020617;
            --accent: #38bdf8;
            --blade-dark: #0f172a;
        }

        body {
            width: 1080px;
            height: 1920px;
            background: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #root {
            width: 1080px;
            height: 1920px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clip { opacity: 0; }
        svg { overflow: visible; }

        /* Phone Styles */
        .phone-body { fill: #111827; stroke: #334155; stroke-width: 4; }
        .screen-glass { fill: #000; }
        
        /* Blade Styles */
        .blade-chassis { fill: #1e293b; stroke: #475569; }
        .led-panel { fill: #000; }
        
        /* Internal UI Elements (Hidden initially) */
        .ui-bar {
            fill: var(--accent);
            opacity: 0;
        }
        .ui-text {
            fill: white;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="root" data-composition-id="hardware-interaction" data-start="0" data-duration="10" data-width="1080" data-height="1920">
        
        <div class="composition-container" style="position: relative; width: 600px; height: 1000px;">
            
            <!-- 1. SMARTPHONE (CENTER) -->
            <div class="phone-unit clip" data-start="0.5" data-duration="9.5" style="position: absolute; left: 50%; top: 40%;">
                <svg width="400" height="700" viewBox="0 0 120 220">
                    <rect class="phone-body" x="5" y="5" width="110" height="210" rx="18" />
                    <rect class="screen-glass" x="10" y="10" width="100" height="200" rx="14" />
                    
                    <!-- Internal Digital UI (Appears after ingestion) -->
                    <g class="internal-ui">
                        <text x="25" y="50" class="ui-text">Syncing Core...</text>
                        <rect x="25" y="60" width="70" height="4" rx="2" fill="#1e293b" />
                        <rect x="25" y="60" width="0" height="4" rx="2" class="ui-bar" id="progress-bar" />
                        
                        <rect class="ui-bar data-block" x="25" y="80" width="20" height="30" rx="2" />
                        <rect class="ui-bar data-block" x="50" y="80" width="20" height="30" rx="2" />
                        <rect class="ui-bar data-block" x="75" y="80" width="20" height="30" rx="2" />
                    </g>

                    <rect fill="#000" x="40" y="18" width="40" height="8" rx="4" />
                </svg>
            </div>

            <!-- 2. SERVER STACK (FOREGROUND -> INGESTION) -->
            <div class="stack-unit" style="position: absolute; left: 50%; top: 75%; z-index: 20;">
                
                <div class="blade clip" data-start="1" data-duration="4" style="margin-bottom: -50px;">
                    <svg width="350" height="100" viewBox="0 0 200 60">
                        <path class="blade-chassis" d="M30 10 L170 10 L180 20 L180 50 L20 50 L20 20 Z" />
                        <circle cx="50" cy="32" r="3" fill="#38bdf8" class="led-blink" />
                    </svg>
                </div>
                <div class="blade clip" data-start="1.2" data-duration="3.8" style="margin-bottom: -50px;">
                    <svg width="350" height="100" viewBox="0 0 200 60">
                        <path class="blade-chassis" d="M30 10 L170 10 L180 20 L180 50 L20 50 L20 20 Z" />
                        <circle cx="50" cy="32" r="3" fill="#38bdf8" class="led-blink" />
                    </svg>
                </div>
                <div class="blade clip" data-start="1.4" data-duration="3.6">
                    <svg width="350" height="100" viewBox="0 0 200 60">
                        <path class="blade-chassis" d="M30 10 L170 10 L180 20 L180 50 L20 50 L20 20 Z" />
                        <circle cx="50" cy="32" r="3" fill="#38bdf8" class="led-blink" />
                    </svg>
                </div>

            </div>

        </div>

    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        window.__timelines["hardware-interaction"] = tl;

        // 1. Entrance
        gsap.set(".phone-unit, .stack-unit", { xPercent: -50, yPercent: -50 });
        tl.to(".phone-unit", { opacity: 1, duration: 1 }, 0.5);
        tl.to(".blade", { opacity: 1, y: 0, stagger: 0.2, duration: 0.8 }, 1.0);

        // 2. The Ingestion Transition
        tl.to(".stack-unit", {
            y: -350,       // Move up towards screen
            scale: 0.1,    // Shrink
            opacity: 0,    // Fade out as it "enters"
            duration: 1.2,
            ease: "power2.in"
        }, 3.0);

        // 3. Digital Interaction (Inside Screen)
        tl.to(".screen-glass", { fill: "#0f172a", duration: 0.5 }, 3.8);
        
        tl.to(".ui-text", { opacity: 1, duration: 0.5 }, 4.0);
        
        // Progress bar filling up
        tl.to("#progress-bar", { 
            opacity: 1, 
            width: 70, 
            duration: 2, 
            ease: "power1.inOut" 
        }, 4.2);

        // Data Blocks popping in
        tl.to(".data-block", {
            opacity: 1,
            scaleY: 1.5,
            stagger: 0.3,
            duration: 0.8,
            repeat: 3,
            yoyo: true,
            ease: "sine.inOut"
        }, 4.5);

        // Final UI Glow
        tl.to(".screen-glass", { 
            filter: "drop-shadow(0 0 30px #38bdf8)", 
            duration: 1.5 
        }, 7.0);

    </script>
</body>
</html>
