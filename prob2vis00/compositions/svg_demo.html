<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <title>SVG Animation Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00f2ff;
            --success: #00ff88;
        }

        body {
            width: 1080px;
            height: 1920px;
            background: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        #root {
            width: 1080px;
            height: 1920px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .clip { opacity: 0; }

        .svg-container {
            width: 600px;
            height: 600px;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3));
        }

        .shield-path {
            fill: none;
            stroke: var(--accent);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .check-path {
            fill: none;
            stroke: var(--success);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        .label {
            margin-top: 40px;
            color: white;
            font-size: 48px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-weight: 200;
        }
    </style>
</head>
<body>
    <div id="root" data-composition-id="svg-demo" data-start="0" data-duration="5" data-width="1080" data-height="1920">
        
        <div class="svg-container clip" data-start="0" data-duration="5" data-track-index="1">
            <svg viewBox="0 0 200 200">
                <!-- Shield Base -->
                <path class="shield-path" d="M100 20 L160 45 C160 120 130 160 100 180 C70 160 40 120 40 45 Z" />
                <!-- Checkmark (hidden initially by dashoffset) -->
                <path class="check-path" d="M70 100 L90 120 L130 80" />
            </svg>
        </div>

        <div class="label clip" data-start="1" data-duration="4" data-track-index="2">
            Secure
        </div>

    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        window.__timelines["svg-demo"] = tl;

        // 1. Reveal Container
        tl.to(".svg-container", { opacity: 1, duration: 0.5 }, 0);

        // 2. Animate Shield Path (Draw-in effect)
        tl.from(".shield-path", {
            drawSVG: "0%", // Note: requires DrawSVG plugin, but we can simulate with stroke-dasharray
            attr: { "stroke-dashoffset": 600, "stroke-dasharray": 600 },
            duration: 1.5,
            ease: "power2.out"
        }, 0.2);

        // 3. Pulse Shield
        tl.to(".shield-path", {
            strokeWidth: 12,
            filter: "drop-shadow(0 0 30px #00f2ff)",
            duration: 0.8,
            yoyo: true,
            repeat: 1
        }, 1.5);

        // 4. Reveal Label
        tl.to(".label", { 
            opacity: 1, 
            y: -20, 
            duration: 1, 
            ease: "back.out" 
        }, 1.2);

        // 5. Draw Checkmark
        tl.to(".check-path", {
            strokeDashoffset: 0,
            duration: 0.8,
            ease: "power2.inOut"
        }, 2.5);

        // 6. Color Shift on Completion
        tl.to(".shield-path", {
            stroke: "#00ff88",
            duration: 0.5
        }, 3);

    </script>
</body>
</html>
