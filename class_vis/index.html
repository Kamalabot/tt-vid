<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>

<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="40" data-width="1920" data-height="1080">

    <!-- Class Foundry Scene -->
    <div 
      id="scene-foundry" 
      class="clip" 
      data-composition-src="compositions/class_foundry.html" 
      data-composition-id="class_foundry"
      data-start="0" 
      data-duration="40" 
      data-track-index="1"
      style="width: 1920px; height: 1080px;"
    ></div>

  </div>

  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    
    // Main orchestration timeline
    // Individual scene timing is handled by the sub-compositions
    
    window.__timelines["main"] = tl;
  </script>
</body>

</html>
