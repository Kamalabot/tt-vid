<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template id="class_foundry-template">
      <!-- HyperFrames Sub-Composition Root -->
      <div id="composition-container" data-composition-id="class_foundry" data-start="0" data-duration="40" data-width="1920" data-height="1080">
        
        <style>
          [data-composition-id="class_foundry"] {
            --primary-glow: #00f2ff;
            --secondary-glow: #7000ff;
            --accent: #ffaa00;
            --bg: #050508;
            width: 1920px;
            height: 1080px;
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
          }

          /* Memory Grid refined */
          [data-composition-id="class_foundry"] .grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
              linear-gradient(to right, rgba(0, 242, 255, 0.03) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(circle at 50% 50%, black 40%, transparent 90%);
          }

          [data-composition-id="class_foundry"] .class-blueprint {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
          }

          [data-composition-id="class_foundry"] .screen {
            width: 100%;
            height: 460px;
            background: rgba(0, 242, 255, 0.01);
            border: 2px dashed var(--primary-glow);
            border-radius: 32px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 242, 255, 0.03) 3px, rgba(0, 242, 255, 0.03) 3px);
          }

          [data-composition-id="class_foundry"] .base {
            width: 110%;
            height: 6px;
            background: var(--primary-glow);
            opacity: 0.2;
            border-radius: 3px;
            margin-top: 10px;
          }

          [data-composition-id="class_foundry"] .concept-tag {
            position: absolute;
            bottom: -130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
            padding: 12px 40px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 6px;
            border: 2px solid #ff4444;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
          }

          [data-composition-id="class_foundry"] .class-keyword { color: var(--secondary-glow); font-weight: 800; font-size: 48px; font-style: italic; }
          [data-composition-id="class_foundry"] .class-name { color: var(--primary-glow); font-size: 64px; font-family: monospace; font-weight: bold; }

          [data-composition-id="class_foundry"] .methods-container { display: flex; gap: 80px; }
          [data-composition-id="class_foundry"] .method-box {
            width: 260px; height: 260px;
            border: 2px dashed rgba(255, 170, 0, 0.4);
            background: rgba(255, 170, 0, 0.03);
            border-radius: 32px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
          }

          [data-composition-id="class_foundry"] .method-box svg { width: 80px; height: 80px; color: var(--accent); margin-bottom: 20px; opacity: 0.7; }
          [data-composition-id="class_foundry"] .method-box span { font-size: 36px; font-family: monospace; color: var(--accent); font-weight: bold; }

          /* Memory Slot Styling */
          [data-composition-id="class_foundry"] .memory-slot {
            position: absolute;
            width: 300px;
            height: 250px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 20px;
          }

          [data-composition-id="class_foundry"] .memory-address {
            position: absolute;
            top: -30px;
            font-family: monospace;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
          }

          [data-composition-id="class_foundry"] .copy-label {
            margin-top: 15px;
            font-weight: 800;
            color: var(--secondary-glow);
            font-size: 20px;
            text-transform: uppercase;
          }

          /* Real Solid Replica Objects */
          [data-composition-id="class_foundry"] .object-instance {
            width: 240px; height: 160px;
            display: flex; flex-direction: column; align-items: center;
          }

          [data-composition-id="class_foundry"] .obj-screen {
            width: 100%; height: 140px;
            background: linear-gradient(135deg, #1a1a1c, #0a0a0c);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
          }

          [data-composition-id="class_foundry"] .obj-base {
            width: 110%; height: 6px;
            background: #222; border-radius: 2px; margin-top: 4px;
          }

          [data-composition-id="class_foundry"] .object-id { 
            font-family: monospace; 
            font-size: 18px; 
            color: var(--primary-glow);
            font-weight: bold;
          }

          [data-composition-id="class_foundry"] .links-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
          }

          [data-composition-id="class_foundry"] .pointer-line {
            fill: none; stroke: var(--primary-glow); stroke-width: 2; opacity: 0;
            stroke-dasharray: 2000; stroke-dashoffset: 2000;
          }

          [data-composition-id="class_foundry"] .pulse-line {
            fill: none; stroke: white; stroke-width: 3; stroke-linecap: round; opacity: 0;
            stroke-dasharray: 2000; stroke-dashoffset: 2000;
          }
        </style>

        <div id="grid-bg" class="grid clip" data-start="0" data-duration="40" data-track-index="1"></div>

        <div class="class-blueprint clip" id="mother" data-start="0" data-duration="40" data-track-index="10">
          <div class="label-container">
            <span class="class-keyword">class</span>
            <span class="class-name">SmartDevice:</span>
          </div>
          <div class="screen">
            <div class="methods-container">
              <div id="m1" class="method-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
                <span>boot()</span>
              </div>
              <div id="m2" class="method-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span>secure()</span>
              </div>
            </div>
          </div>
          <div class="base"></div>
          <div class="concept-tag">CLASS: JUST A CONCEPT</div>
        </div>

        <!-- Object 1 in its own memory slot -->
        <div class="memory-slot clip" id="slot1" data-start="8" data-duration="32" data-track-index="15" style="left: 450px; top: 720px;">
          <div class="memory-address">Memory Address: 0x7FFEE104</div>
          <div class="object-instance" id="obj1">
            <div class="obj-screen">
              <span class="object-id">obj_a</span>
            </div>
            <div class="obj-base"></div>
          </div>
          <div class="copy-label">I AM A COPY</div>
        </div>

        <!-- Object 2 in its own memory slot -->
        <div class="memory-slot clip" id="slot2" data-start="18" data-duration="22" data-track-index="16" style="left: 1170px; top: 720px;">
          <div class="memory-address">Memory Address: 0x7FFEE208</div>
          <div class="object-instance" id="obj2">
            <div class="obj-screen">
              <span class="object-id">obj_b</span>
            </div>
            <div class="obj-base"></div>
          </div>
          <div class="copy-label">I AM A COPY</div>
        </div>

        <svg class="links-layer">
          <path id="link1" class="pointer-line clip" data-start="10" data-duration="30" data-track-index="5" d="M 600 750 C 600 650, 960 650, 960 450" />
          <path id="link2" class="pointer-line clip" data-start="20" data-duration="20" data-track-index="6" d="M 1320 750 C 1320 650, 960 650, 960 450" />
          <path id="pulse1" class="pulse-line clip" data-start="25" data-duration="2" data-track-index="7" d="M 600 750 C 600 650, 960 650, 960 450" />
        </svg>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
        <script>
          (function() {
            window.__timelines = window.__timelines || {};
            const tl = gsap.timeline({ paused: true });

            // 1. Mother Assembly (0-5s)
            tl.from('[data-composition-id="class_foundry"] #mother', { 
              y: -100, 
              opacity: 0, 
              duration: 2, 
              ease: "expo.out" 
            }, 0);
            
            tl.to('[data-composition-id="class_foundry"] #mother', {
              opacity: 0.4,
              duration: 0.1,
              repeat: 5,
              yoyo: true,
              ease: "none"
            }, 0.5);

            tl.from('[data-composition-id="class_foundry"] .method-box', { 
              scale: 0.8, 
              opacity: 0, 
              stagger: 0.5, 
              duration: 2, 
              ease: "power2.out" 
            }, 1.5);

            // 2. Slot 1 Entry (8s)
            tl.from('[data-composition-id="class_foundry"] #slot1', { 
              y: 200, 
              opacity: 0, 
              duration: 1.5, 
              ease: "power4.out" 
            }, 8);
            
            // Object 1 Creation inside Slot (Heavy physical stamp)
            tl.from('[data-composition-id="class_foundry"] #obj1', { 
              scale: 2, 
              opacity: 0, 
              duration: 0.6, 
              ease: "power4.in" 
            }, 9.5);
            
            // Screen shake / flicker on stamp
            tl.to('[data-composition-id="class_foundry"] #mother', {
              y: "+=15",
              duration: 0.05,
              repeat: 5,
              yoyo: true
            }, 10);

            // Link 1 Reveal (12s) - Strictly hidden until now
            const l1 = document.querySelector('[data-composition-id="class_foundry"] #link1');
            const len1 = l1 ? l1.getTotalLength() : 1000;
            tl.set('[data-composition-id="class_foundry"] #link1', { strokeDasharray: len1, strokeDashoffset: len1, opacity: 0 }, 0);
            tl.to('[data-composition-id="class_foundry"] #link1', { opacity: 0.4, duration: 0.2 }, 12);
            tl.to('[data-composition-id="class_foundry"] #link1', { strokeDashoffset: 0, duration: 2, ease: "sine.inOut" }, 12);

            // 3. Slot 2 Entry (18s)
            tl.from('[data-composition-id="class_foundry"] #slot2', { 
              y: 200, 
              opacity: 0, 
              duration: 1.5, 
              ease: "power4.out" 
            }, 18);

            tl.from('[data-composition-id="class_foundry"] #obj2', { 
              scale: 2, 
              opacity: 0, 
              duration: 0.6, 
              ease: "power4.in" 
            }, 19.5);

            // Screen shake 2
            tl.to('[data-composition-id="class_foundry"] #mother', {
              y: "+=15",
              duration: 0.05,
              repeat: 5,
              yoyo: true
            }, 20);
            
            // Link 2 Reveal (22s)
            const l2 = document.querySelector('[data-composition-id="class_foundry"] #link2');
            const len2 = l2 ? l2.getTotalLength() : 1000;
            tl.set('[data-composition-id="class_foundry"] #link2', { strokeDasharray: len2, strokeDashoffset: len2, opacity: 0 }, 0);
            tl.to('[data-composition-id="class_foundry"] #link2', { opacity: 0.4, duration: 0.2 }, 22);
            tl.to('[data-composition-id="class_foundry"] #link2', { strokeDashoffset: 0, duration: 2, ease: "sine.inOut" }, 22);

            // 4. Method Execution Pulse (28s)
            const p1 = document.querySelector('[data-composition-id="class_foundry"] #pulse1');
            const plen1 = p1 ? p1.getTotalLength() : 1000;
            tl.set('[data-composition-id="class_foundry"] #pulse1', { strokeDasharray: `80 ${plen1}`, strokeDashoffset: plen1, opacity: 0 }, 0);
            tl.to('[data-composition-id="class_foundry"] #pulse1', { opacity: 1, duration: 0.1 }, 28);
            tl.to('[data-composition-id="class_foundry"] #pulse1', { strokeDashoffset: 0, duration: 2, ease: "power2.inOut" }, 28);
            
            tl.to('[data-composition-id="class_foundry"] #m1', { 
              scale: 1.1, 
              backgroundColor: "rgba(255, 170, 0, 0.2)", 
              boxShadow: "0 0 50px rgba(255, 170, 0, 0.4)",
              duration: 0.4, 
              yoyo: true, 
              repeat: 3 
            }, 30);

            // Floating movement for the holographic class (Continuous but deterministic)
            tl.to('[data-composition-id="class_foundry"] #mother', {
              y: "-=25",
              duration: 4,
              repeat: 8,
              yoyo: true,
              ease: "sine.inOut"
            }, 2);

            window.__timelines["class_foundry"] = tl;
          })();
        </script>
      </div>
    </template>
  </body>
</html>
