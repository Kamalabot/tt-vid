<template id="hacker-terminal-template">
  <div
    data-composition-id="hacker-terminal"
    data-width="1080"
    data-height="1920"
    data-duration="12"
    data-start="0"
  >
    <div class="main-container">
      <!-- Terminal Window -->
      <div id="terminal-window" class="clip" data-start="0.5" data-duration="11.5" data-track-index="1">
        <div class="terminal-header">
          <div class="dots">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <div class="terminal-title">system_terminal_v2.0</div>
        </div>
        <div class="terminal-body">
          <div id="boot-text" class="code-line">Initializing...</div>
          <div id="test-line" class="code-line" style="opacity: 0;">> RUNNING TESTS...</div>
          <div class="progress-container" id="progress-bar" style="opacity: 0;">
            <div class="progress-fill"></div>
          </div>
          <div id="status-text" class="code-line" style="opacity: 0; color: #2ecc71;">[SUCCESS] SYSTEM_STABLE</div>
        </div>
      </div>

      <!-- Python/JS Logos -->
      <div class="logo-group">
        <div id="logo-py" class="logo clip" data-start="4.5" data-duration="7.5" data-track-index="2">PY</div>
        <div id="logo-js" class="logo clip" data-start="5" data-duration="7" data-track-index="3">JS</div>
      </div>

      <!-- AI Brain/Mesh -->
      <div id="ai-container" class="clip" data-start="7.5" data-duration="4.5" data-track-index="4">
        <div class="ai-mesh">
          <div class="node n1"></div>
          <div class="node n2"></div>
          <div class="node n3"></div>
          <div class="beam b1"></div>
          <div class="beam b2"></div>
        </div>
        <div class="ai-label">AI ASSISTANT</div>
      </div>

      <!-- Tamil Content (Logs) -->
      <div class="tamil-logs">
        <div id="tamil-1" class="log-entry clip" data-start="1.5" data-duration="10.5" data-track-index="5">
          இந்த மாதிரி ஸாஃப்ட்வேர நீங்களே டெஸ்ட் செஞ்சி பாருங்க.
        </div>
        <div id="tamil-2" class="log-entry clip" data-start="4.5" data-duration="7.5" data-track-index="6">
          நிரைய ஸாஃப்ட்வேர் பைதான் இல்லைனா ஜாவா ஸ்கிரிப்ட் யூஸ் செஞ்சி உங்களுக்கு வேனும்ங்கற மாதிரி மாத்திகாலாம்.
        </div>
        <div id="tamil-3" class="log-entry highlight clip" data-start="8.5" data-duration="3.5" data-track-index="7">
          அதுக்கும் உங்களுக்கு ஏஐ ஐடியா கொடுக்கும்.
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="hacker-terminal"] {
        background: #0a0b10;
        font-family: 'Courier New', Courier, monospace;
        color: #00ff41; /* Classic Matrix Green */
        overflow: hidden;
      }

      .main-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 150px;
        gap: 100px;
        position: relative;
      }

      #terminal-window {
        width: 900px;
        height: 500px;
        background: #151821;
        border: 2px solid #2ecc71;
        border-radius: 12px;
        box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 40px rgba(46, 204, 113, 0.1);
        overflow: hidden;
        opacity: 0;
      }

      .terminal-header {
        background: #252a3a;
        padding: 15px 25px;
        display: flex;
        align-items: center;
        border-bottom: 2px solid #2ecc71;
      }

      .dots { display: flex; gap: 10px; }
      .dot { width: 15px; height: 15px; border-radius: 50%; }
      .dot.red { background: #ff5f56; }
      .dot.yellow { background: #ffbd2e; }
      .dot.green { background: #27c93f; }

      .terminal-title {
        margin-left: 30px;
        font-size: 24px;
        color: rgba(255,255,255,0.5);
      }

      .terminal-body {
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .code-line { font-size: 36px; }

      .progress-container {
        width: 100%;
        height: 40px;
        background: #0a0b10;
        border: 1px solid #2ecc71;
        border-radius: 20px;
        overflow: hidden;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #2ecc71, #27ae60);
        box-shadow: 0 0 20px #2ecc71;
      }

      .logo-group {
        display: flex;
        gap: 80px;
      }

      .logo {
        width: 180px;
        height: 180px;
        background: #2ecc71;
        border-radius: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 64px;
        font-weight: 900;
        color: #0a0b10;
        box-shadow: 0 20px 50px rgba(46, 204, 113, 0.4);
        opacity: 0;
      }

      #logo-js {
        background: #f7df1e;
        color: #323330;
        box-shadow: 0 20px 50px rgba(247, 223, 30, 0.3);
      }

      #ai-container {
        position: relative;
        width: 400px;
        height: 250px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }

      .ai-mesh {
        position: relative;
        width: 200px;
        height: 200px;
      }

      .node {
        position: absolute;
        width: 20px;
        height: 20px;
        background: #00e5ff;
        border-radius: 50%;
        box-shadow: 0 0 20px #00e5ff;
      }
      .n1 { top: 10%; left: 50%; }
      .n2 { bottom: 20%; left: 10%; }
      .n3 { bottom: 20%; right: 10%; }

      .beam {
        position: absolute;
        background: #00e5ff;
        height: 2px;
        transform-origin: left center;
        opacity: 0.5;
      }

      .ai-label {
        margin-top: 20px;
        font-size: 32px;
        font-weight: 900;
        color: #00e5ff;
        letter-spacing: 4px;
      }

      .tamil-logs {
        display: flex;
        flex-direction: column;
        gap: 40px;
        width: 950px;
        padding: 40px;
        font-family: 'Inter', sans-serif;
      }

      .log-entry {
        background: rgba(255,255,255,0.03);
        border-left: 6px solid #2ecc71;
        padding: 30px 40px;
        font-size: 44px;
        line-height: 1.4;
        color: #fff;
        border-radius: 0 20px 20px 0;
        opacity: 0;
      }

      .log-entry.highlight {
        border-color: #00e5ff;
        background: rgba(0, 229, 255, 0.05);
        color: #00e5ff;
        font-weight: 900;
        box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const tl = gsap.timeline({ paused: true });

      // Initial States
      gsap.set("#terminal-window", { scale: 0.9, y: 100 });
      gsap.set(".logo", { scale: 0, rotation: -45 });
      gsap.set(".log-entry", { x: -100 });
      gsap.set("#ai-container", { scale: 0.5 });

      // 1. Boot Sequence
      tl.to("#terminal-window", {
        opacity: 1,
        scale: 1,
        y: 0,
        duration: 1,
        ease: "power4.out"
      }, 0.5);

      // Glitch effect on boot
      tl.to("#terminal-window", {
        skewX: 10,
        duration: 0.1,
        repeat: 3,
        yoyo: true,
        ease: "none"
      }, 0.5);

      tl.to("#test-line", { opacity: 1, duration: 0.2 }, 1.2);
      tl.to("#progress-bar", { opacity: 1, duration: 0.2 }, 1.5);
      tl.to(".progress-fill", { width: "100%", duration: 2, ease: "power1.inOut" }, 1.5);
      tl.to("#status-text", { opacity: 1, duration: 0.3 }, 3.5);

      // 2. Tamil Entry 1
      tl.to("#tamil-1", {
        opacity: 1,
        x: 0,
        duration: 1,
        ease: "back.out(1.5)"
      }, 1.5);

      // 3. Customization phase (Logos & Theme change)
      tl.to(".logo", {
        opacity: 1,
        scale: 1,
        rotation: 0,
        stagger: 0.3,
        duration: 1.2,
        ease: "back.out(1.7)"
      }, 4.5);

      // Theme shift
      tl.to("#terminal-window", {
        borderColor: "#f7df1e",
        backgroundColor: "#1e1e1e",
        duration: 1
      }, 5.5);

      tl.to("#tamil-2", {
        opacity: 1,
        x: 0,
        duration: 1,
        ease: "back.out(1.5)"
      }, 5.5);

      // 4. AI Intervention
      tl.to("#ai-container", {
        opacity: 1,
        scale: 1,
        duration: 1,
        ease: "power3.out"
      }, 7.5);

      // AI Beams animation
      tl.from(".beam", {
        scaleX: 0,
        stagger: 0.2,
        duration: 0.8,
        ease: "power2.out"
      }, 8);

      tl.to("#tamil-3", {
        opacity: 1,
        x: 0,
        duration: 1,
        ease: "back.out(1.5)"
      }, 8.5);

      // Final floating/idle
      tl.to(["#terminal-window", ".logo-group", "#ai-container"], {
        y: "-=20",
        duration: 2,
        repeat: 2,
        yoyo: true,
        ease: "sine.inOut",
        stagger: 0.2
      }, 10);

      window.__timelines = window.__timelines || {};
      window.__timelines["hacker-terminal"] = tl;
    </script>
  </div>
</template>
