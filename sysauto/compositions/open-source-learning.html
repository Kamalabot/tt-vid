<template id="open-source-learning-template">
  <div
    data-composition-id="open-source-learning"
    data-width="1080"
    data-height="1920"
    data-duration="10"
    data-start="0"
  >
    <div class="main-container">
      <div class="text-stage">
        <!-- Phrase 1: Left -->
        <div id="phrase-1" class="text-box clip" data-start="0.5" data-duration="9.5" data-track-index="1">
          ஓபென் ஸோர்ஸ்
        </div>

        <!-- Phrase 2: Right -->
        <div id="phrase-2" class="text-box clip" data-start="1.5" data-duration="8.5" data-track-index="2">
          சாஃப்ட்வேர் ஸிஸ்டம்
        </div>

        <!-- Phrase 3: Left -->
        <div id="phrase-3" class="text-box clip" data-start="2.5" data-duration="7.5" data-track-index="3">
          டெவலப் செஞ்சி
        </div>

        <!-- Phrase 4: Right -->
        <div id="phrase-4" class="text-box clip" data-start="3.5" data-duration="6.5" data-track-index="4">
          அத ப்ரோக்ராம எழுதிருப்பாங்க
        </div>

        <!-- Phrase 5: Left -->
        <div id="phrase-5" class="text-box highlight clip" data-start="5" data-duration="5" data-track-index="5">
          நீங்க அந்த ஸாஃப்ட்வேர
        </div>

        <!-- Phrase 6: Right (Final Result) -->
        <div id="phrase-6" class="text-box ai-box clip" data-start="6" data-duration="4" data-track-index="6">
          ஏஐ யூஸ் செஞ்சி கத்துகலாம்
        </div>
      </div>

      <!-- Tech decoration -->
      <div id="bg-decoration" class="clip" data-start="0" data-duration="10" data-track-index="7">
        <div class="grid-line"></div>
        <div class="code-flow">
          <span>01010101</span>
          <span>SYSTEM_INIT</span>
          <span>AI_READY</span>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="open-source-learning"] {
        background: radial-gradient(circle at 50% 50%, #3e2723 0%, #1b0d0a 100%);
        font-family: 'Inter', sans-serif;
        color: #efebe9;
        overflow: hidden;
      }

      .main-container {
        width: 1080px;
        height: 1920px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .text-stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 70px; /* Increased Y spacing */
        z-index: 10;
        width: 1000px;
      }

      .text-box {
        width: 100%;
        padding: 50px 80px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(215, 204, 200, 0.2);
        border-radius: 24px;
        font-size: 64px; /* Bigger text */
        font-weight: 900;
        text-align: center;
        backdrop-filter: blur(15px);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        opacity: 0;
      }

      .text-box.highlight {
        border-color: #d7ccc8;
        background: rgba(215, 204, 200, 0.1);
        color: #d7ccc8;
      }

      .text-box.ai-box {
        border-color: #ffccbc;
        background: rgba(255, 204, 188, 0.15);
        color: #ffccbc;
        font-size: 72px; /* Even bigger for AI result */
        box-shadow: 0 0 100px rgba(255, 204, 188, 0.2);
      }

      #bg-decoration {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
      }

      .grid-line {
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, transparent, rgba(215, 204, 200, 0.15), transparent);
      }

      .code-flow {
        position: absolute;
        right: 60px;
        bottom: 60px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        font-family: monospace;
        font-size: 28px;
        color: rgba(215, 204, 200, 0.1);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const tl = gsap.timeline({ paused: true });

      // Initial States
      gsap.set("#phrase-1, #phrase-3, #phrase-5", { x: -300 });
      gsap.set("#phrase-2, #phrase-4, #phrase-6", { x: 300 });

      // Phrase Animations
      const phrases = ["#phrase-1", "#phrase-2", "#phrase-3", "#phrase-4", "#phrase-5", "#phrase-6"];
      
      phrases.forEach((id, index) => {
        const start = 0.5 + (index * 1); // Sequence every 1s
        tl.to(id, {
          opacity: 1,
          x: 0,
          duration: 1.2,
          ease: "back.out(1.4)"
        }, start);
      });

      // Subtle float for the whole group (Extended to cover 10s)
      tl.to(".text-stage", {
        y: "-=30",
        duration: 2,
        repeat: 3, // 2s * 4 cycles = 8s. Starts at 2s. Total 10s.
        yoyo: true,
        ease: "sine.inOut"
      }, 2);

      // Background decoration
      tl.from(".grid-line", {
        scaleX: 0,
        opacity: 0,
        duration: 2,
        ease: "power2.inOut"
      }, 0);

      // Explicitly set timeline duration to 10s
      tl.set({}, {}, 10);

      window.__timelines = window.__timelines || {};
      window.__timelines["open-source-learning"] = tl;
    </script>
  </div>
</template>
