<template id="main-graphics-template">
  <div
    data-composition-id="main-graphics"
    data-width="1080"
    data-height="1920"
    data-duration="15"
    data-start="0"
  >
    <div class="system-container">
      <!-- Left Column: Illustration -->
      <div class="illustration-col">
        <!-- Input Section -->
        <div id="input-node" class="node clip" data-start="0.5" data-duration="14" data-track-index="1">
          <div class="label">INPUT</div>
          <div class="emoji">📥</div>
        </div>

        <!-- Arrow 1 -->
        <div id="arrow-1" class="arrow clip" data-start="2" data-duration="12.5" data-track-index="2">⬇️</div>

        <!-- System Section -->
        <div id="system-node" class="node clip" data-start="3" data-duration="11.5" data-track-index="3">
          <div class="label">SYSTEM</div>
          <div class="emoji spinning">⚙️</div>
        </div>

        <!-- Arrow 2 -->
        <div id="arrow-2" class="arrow clip" data-start="5" data-duration="9.5" data-track-index="4">⬇️</div>

        <!-- Output Section -->
        <div id="output-node" class="node clip" data-start="6" data-duration="8.5" data-track-index="5">
          <div class="label">OUTPUT</div>
          <div class="emoji">📤</div>
        </div>
      </div>

      <!-- Right Column: Text Content -->
      <div class="text-col">
        <div id="main-text" class="clip" data-start="1" data-duration="14" data-track-index="6">
          <span class="highlight">A SYSTEM</span>
          <span class="normal">IS ITS</span>
          <span class="highlight">INPUT</span>
          <span class="normal">AND ITS</span>
          <span class="highlight">OUTPUT</span>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="main-graphics"] {
        background: radial-gradient(circle at 20% 50%, #1a1a2e 0%, #0a0a0f 100%);
        font-family: 'Inter', sans-serif;
        color: white;
        overflow: hidden;
      }

      .system-container {
        display: flex;
        width: 1080px;
        height: 1920px;
        padding: 60px;
        gap: 40px;
      }

      .illustration-col {
        flex: 1.2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
      }

      .text-col {
        flex: 0.8;
        display: flex;
        align-items: center;
        justify-content: center;
        border-left: 2px solid rgba(0, 229, 255, 0.2);
        padding-left: 40px;
      }

      #main-text {
        display: flex;
        flex-direction: column;
        gap: 20px;
        opacity: 0;
      }

      #main-text span {
        display: block;
        line-height: 1;
      }

      .highlight {
        font-size: 80px;
        font-weight: 900;
        color: #00e5ff;
        text-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
      }

      .normal {
        font-size: 40px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.6);
        font-style: italic;
      }

      .node {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        padding: 30px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        backdrop-filter: blur(10px);
        width: 100%;
        max-width: 450px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .label {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 4px;
        color: rgba(255, 255, 255, 0.8);
      }

      .emoji {
        font-size: 140px;
        filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.15));
      }

      .arrow {
        font-size: 60px;
        color: rgba(255, 255, 255, 0.2);
      }

      .spinning {
        display: inline-block;
      }

      /* Base state for GSAP */
      .node, .arrow {
        opacity: 0;
        transform: scale(0.9) translateX(-50px);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const tl = gsap.timeline({ paused: true });

      // Animate Text
      tl.to("#main-text", {
        opacity: 1,
        duration: 1.2,
        ease: "power3.out"
      }, 0.5);

      // Animate Input
      tl.to("#input-node", {
        opacity: 1,
        scale: 1,
        x: 0,
        duration: 1,
        ease: "back.out(1.5)"
      }, 1);

      // Animate Arrow 1
      tl.to("#arrow-1", {
        opacity: 1,
        x: 0,
        duration: 0.8,
        ease: "power2.out"
      }, 2);

      // Animate System
      tl.to("#system-node", {
        opacity: 1,
        scale: 1,
        x: 0,
        duration: 1,
        ease: "back.out(1.5)"
      }, 2.5);

      // Gear rotation effect
      tl.to(".spinning", {
        rotation: 360,
        duration: 4,
        repeat: 3,
        ease: "none"
      }, 2.5);

      // Animate Arrow 2
      tl.to("#arrow-2", {
        opacity: 1,
        x: 0,
        duration: 0.8,
        ease: "power2.out"
      }, 4);

      // Animate Output
      tl.to("#output-node", {
        opacity: 1,
        scale: 1,
        x: 0,
        duration: 1,
        ease: "back.out(1.5)"
      }, 4.5);

      // Float animation
      tl.to(".node", {
        y: "-=20",
        duration: 3,
        repeat: 2,
        yoyo: true,
        ease: "sine.inOut",
        stagger: 0.4
      }, 6);

      window.__timelines = window.__timelines || {};
      window.__timelines["main-graphics"] = tl;
    </script>
  </div>
</template>
