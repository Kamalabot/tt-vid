<template id="excel-analyzer-template">
  <div
    data-composition-id="excel-analyzer"
    data-width="1080"
    data-height="1920"
    data-duration="8"
    data-start="0"
  >
    <div class="main-container">
      <!-- Tamil Text Title -->
      <div id="title-text" class="clip" data-start="0.5" data-duration="7.5" data-track-index="1">
        எந்த மாதிரி எக்ஸேல் ஃபைல் இருந்தாலும் அத அனலைஸ் செய்ய கோடு கொடுன்னு கேளுங்க
      </div>

      <!-- Animation Area -->
      <div class="animation-stage">
        <!-- Input Files -->
        <div class="file-group">
          <div id="file-csv" class="file-icon clip" data-start="1" data-duration="7" data-track-index="2">
            <div class="icon">CSV</div>
          </div>
          <div id="file-xlsx" class="file-icon clip" data-start="1.2" data-duration="6.8" data-track-index="3">
            <div class="icon">XLSX</div>
          </div>
          <div id="file-json" class="file-icon clip" data-start="1.4" data-duration="6.6" data-track-index="4">
            <div class="icon">JSON</div>
          </div>
        </div>

        <!-- Processor -->
        <div id="processor" class="clip" data-start="1.5" data-duration="6.5" data-track-index="5">
          <div class="processor-ring"></div>
          <div class="processor-core">
            <div class="ai-brain">AI</div>
          </div>
        </div>

        <!-- Python Blob -->
        <div id="python-blob" class="clip" data-start="3.5" data-duration="4.5" data-track-index="7">
          <div class="py-icon">PY</div>
          <div class="py-glow"></div>
        </div>

        <!-- Output Report -->
        <div id="report-output" class="clip" data-start="5.5" data-duration="2.5" data-track-index="6">
          <div class="report-header">REPORT GENERATED</div>
          <div class="report-body">
            <div class="line"></div>
            <div class="line short"></div>
            <div class="line"></div>
            <div class="line medium"></div>
            <div class="chart-mock">
              <div class="bar" style="height: 40%"></div>
              <div class="bar" style="height: 70%"></div>
              <div class="bar" style="height: 55%"></div>
              <div class="bar" style="height: 90%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="excel-analyzer"] {
        background: radial-gradient(circle at 50% 50%, #0d1a11 0%, #050a06 100%);
        font-family: 'Inter', sans-serif;
        color: white;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .main-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 100px 60px;
        gap: 80px;
      }

      #title-text {
        font-size: 56px;
        font-weight: 900;
        text-align: center;
        line-height: 1.4;
        background: linear-gradient(135deg, #2ecc71, #27ae60);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 10px 40px rgba(46, 204, 113, 0.2);
        opacity: 0;
      }

      .animation-stage {
        position: relative;
        width: 100%;
        height: 1100px; /* Increased to accommodate downward shift */
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .file-group {
        position: absolute;
        left: 5%;
        top: 20%; /* Fixed position instead of just center */
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .file-icon {
        width: 140px;
        height: 180px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(46, 204, 113, 0.3);
        border-radius: 12px 40px 12px 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 28px;
        color: #2ecc71;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        opacity: 0;
        z-index: 1;
      }

      #processor {
        width: 320px;
        height: 320px;
        position: absolute;
        top: 25%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        z-index: 2;
      }

      .processor-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 4px dashed #2ecc71;
        border-radius: 50%;
        opacity: 0.5;
      }

      .processor-core {
        width: 200px;
        height: 200px;
        background: #2ecc71;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 80px rgba(46, 204, 113, 0.6);
      }

      .ai-brain {
        font-size: 56px;
        font-weight: 900;
        color: #050a06;
      }

      #python-blob {
        position: absolute;
        top: 30%;
        width: 160px;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        z-index: 3;
      }

      .py-icon {
        font-size: 48px;
        font-weight: 900;
        color: #ffd43b; /* Python Yellow */
        background: #306998; /* Python Blue */
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(48, 105, 152, 0.5);
      }

      .py-glow {
        position: absolute;
        width: 140px;
        height: 140px;
        background: radial-gradient(circle, rgba(255, 212, 59, 0.4) 0%, transparent 70%);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.2); opacity: 0.7; }
      }

      #report-output {
        position: absolute;
        right: 5%;
        bottom: 0; /* Align to bottom of stage */
        width: 420px;
        height: 550px;
        background: white;
        border-radius: 24px;
        color: #333;
        padding: 30px;
        box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        display: flex;
        flex-direction: column;
        gap: 20px;
        opacity: 0;
        z-index: 4;
      }

      .report-header {
        font-size: 26px;
        font-weight: 900;
        color: #27ae60;
        border-bottom: 2px solid #eee;
        padding-bottom: 15px;
      }

      .line {
        height: 8px;
        background: #eee;
        border-radius: 4px;
        width: 100%;
      }
      .line.short { width: 40%; }
      .line.medium { width: 70%; }

      .chart-mock {
        margin-top: 20px;
        height: 220px;
        display: flex;
        align-items: flex-end;
        justify-content: space-around;
        background: #f9f9f9;
        border-radius: 12px;
        padding: 20px;
      }

      .bar {
        width: 45px;
        background: #2ecc71;
        border-radius: 6px 6px 0 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const tl = gsap.timeline({ paused: true });

      // Set initial states
      gsap.set("#title-text", { y: -50 });
      gsap.set(".file-icon", { x: -200, rotation: -15 });
      gsap.set("#processor", { scale: 0.5 });
      gsap.set("#python-blob", { scale: 0, rotation: -45 });
      gsap.set("#report-output", { x: 200, y: 0, scale: 0.8 });

      // Intro
      tl.to("#title-text", {
        opacity: 1,
        y: 0,
        duration: 1,
        ease: "power4.out"
      }, 0.5);

      tl.to("#processor", {
        opacity: 1,
        scale: 1,
        duration: 1,
        ease: "back.out(1.7)"
      }, 1);

      // Spin the ring
      tl.to(".processor-ring", {
        rotation: 360,
        duration: 8,
        repeat: 0,
        ease: "none"
      }, 0);

      // Files flying in - SLOWER
      tl.to(".file-icon", {
        opacity: 1,
        x: 380, // Move to edge of processor
        rotation: 0,
        stagger: 0.3,
        duration: 1.5,
        ease: "power2.out"
      }, 1.5);

      // Files stay visible, maybe slight jitter
      tl.to(".file-icon", {
        x: "+=10",
        duration: 2,
        repeat: 1,
        yoyo: true,
        ease: "sine.inOut",
        stagger: 0.2
      }, 3);

      // Python Blob appears
      tl.to("#python-blob", {
        opacity: 1,
        scale: 1,
        rotation: 0,
        duration: 1,
        ease: "back.out(1.5)"
      }, 3.5);

      // Processor and Python interaction
      tl.to(".processor-core", {
        scale: 1.2,
        backgroundColor: "#306998",
        duration: 0.5,
        repeat: 3,
        yoyo: true,
        ease: "sine.inOut"
      }, 4);

      // Report comes out
      tl.to("#report-output", {
        opacity: 1,
        x: 0,
        y: 0,
        scale: 1,
        duration: 1.2,
        ease: "back.out(1.2)"
      }, 5.5);

      // Final float for everything
      tl.to(["#report-output", "#processor", "#python-blob"], {
        y: "-=30",
        duration: 1.2,
        repeat: 1,
        yoyo: true,
        ease: "sine.inOut",
        stagger: 0.2
      }, 6.5);

      window.__timelines = window.__timelines || {};
      window.__timelines["excel-analyzer"] = tl;
    </script>
  </div>
</template>
