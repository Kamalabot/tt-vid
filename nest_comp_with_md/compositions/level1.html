<template id="level1-template">
  <div
    data-composition-id="level1"
    data-width="1920"
    data-height="1080"
    data-duration="15"
    data-start="0"
    class="clip"
  >
    <style>
      [data-composition-id="level1"] {
        background: transparent;
        overflow: hidden;
      }

      [data-composition-id="level1"] .clip {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      [data-composition-id="level1"] .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
      }

      [data-composition-id="level1"] .loader-bar {
        width: 400px;
        height: 4px;
        background: rgba(255,255,255,0.1);
        position: relative;
        overflow: hidden;
        margin-bottom: 20px;
      }

      [data-composition-id="level1"] .loader-progress {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0%;
        background: white;
      }

      [data-composition-id="level1"] .loader-text {
        color: white;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
    </style>

    <!-- Content moved to index.html -->

    <!-- Intro Boot Sequence -->
    <div class="loading-overlay clip" data-start="0" data-duration="1.5" data-track-index="10">
      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
      <div class="loader-text">Initializing Systems...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
      (function() {
        const scope = '[data-composition-id="level1"]';
        const tl = gsap.timeline({ paused: true });

        // Intro animation
        tl.to(`${scope} .loader-progress`, {
          width: '100%',
          duration: 1,
          ease: "power2.inOut"
        }, 0);

        tl.to(`${scope} .loading-overlay`, {
          opacity: 0,
          scale: 1.5,
          duration: 0.5,
          ease: "power2.in"
        }, 1);

        window.__timelines = window.__timelines || {};
        window.__timelines["level1"] = tl;
      })();
    </script>
  </div>
</template>
