<template id="level3-template">
  <div
    data-composition-id="level3"
    data-width="1920"
    data-height="1080"
    data-duration="15"
    data-start="0"
    class="clip"
  >
    <style>
      [data-composition-id="level3"] {
        background: #0a0a0c;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
        color: white;
      }

      [data-composition-id="level3"] .clip {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      [data-composition-id="level3"] .container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      [data-composition-id="level3"] .image-clip {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      [data-composition-id="level3"] img {
        max-width: 80%;
        max-height: 70%;
        border-radius: 20px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.1);
      }

      [data-composition-id="level3"] .text-overlay {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        opacity: 0;
      }

      [data-composition-id="level3"] h1 {
        font-size: 80px;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(135deg, #fff 0%, #aaa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        letter-spacing: 4px;
      }

      [data-composition-id="level3"] .bg-grid {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
          linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 100px 100px;
        z-index: -1;
      }
    </style>

    <div class="bg-grid"></div>

    <div class="container">
      <!-- C++ Scene -->
      <div class="clip image-clip cpp" data-start="0" data-duration="3.75" data-track-index="1">
        <img src="assets/cpp_memory.png" alt="C++ Memory">
        <div class="text-overlay cpp-text">
          <h1>C++ Memory Model</h1>
        </div>
      </div>

      <!-- Python Language Scene -->
      <div class="clip image-clip py" data-start="3.75" data-duration="3.75" data-track-index="1">
        <img src="assets/python.png" alt="Python">
        <div class="text-overlay py-text">
          <h1>Python Language</h1>
        </div>
      </div>

      <!-- Python Memory Scene -->
      <div class="clip image-clip py-mem" data-start="7.5" data-duration="3.75" data-track-index="1">
        <img src="assets/python_memory.png" alt="Python Memory">
        <div class="text-overlay py-mem-text">
          <h1>Python Runtime Memory</h1>
        </div>
      </div>

      <!-- Rust Scene -->
      <div class="clip image-clip rust" data-start="11.25" data-duration="3.75" data-track-index="1">
        <img src="assets/rust_memory.png" alt="Rust Memory">
        <div class="text-overlay rust-text">
          <h1>Rust Ownership & Memory</h1>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
      (function() {
        const scope = '[data-composition-id="level3"]';
        const tl = gsap.timeline({ paused: true });

        const scenes = [
          { img: '.cpp', text: '.cpp-text' },
          { img: '.py', text: '.py-text' },
          { img: '.py-mem', text: '.py-mem-text' },
          { img: '.rust', text: '.rust-text' }
        ];

        scenes.forEach((scene, i) => {
          const startTime = i * 3.75;
          
          // Image fade in/out
          tl.to(`${scope} ${scene.img}`, { opacity: 1, duration: 0.5 }, startTime);
          tl.from(`${scope} ${scene.img} img`, { scale: 0.8, filter: 'blur(20px)', duration: 1, ease: "power2.out" }, startTime);
          tl.to(`${scope} ${scene.img}`, { opacity: 0, duration: 0.5 }, startTime + 3.25);

          // Text animation
          tl.to(`${scope} ${scene.text}`, { opacity: 1, y: -20, duration: 0.8, ease: "back.out(1.7)" }, startTime + 0.5);
          tl.to(`${scope} ${scene.text}`, { opacity: 0, y: 0, duration: 0.5 }, startTime + 3.25);
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["level3"] = tl;
      })();
    </script>
  </div>
</template>
