<template id="level2-template">
  <div
    data-composition-id="level2"
    data-width="1920"
    data-height="1080"
    data-duration="15"
    data-start="0"
    class="clip"
  >
    <style>
      [data-composition-id="level2"] {
        background: transparent;
        overflow: hidden;
      }

      [data-composition-id="level2"] .clip {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      [data-composition-id="level2"] .overlay-vignette {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
        pointer-events: none;
        z-index: 10;
      }

      [data-composition-id="level2"] .scanlines {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.1),
          rgba(0, 0, 0, 0.1) 1px,
          transparent 1px,
          transparent 2px
        );
        pointer-events: none;
        z-index: 11;
        opacity: 0.3;
      }

      [data-composition-id="level2"] .corner-brackets {
        position: absolute;
        top: 50px;
        left: 50px;
        right: 50px;
        bottom: 50px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        pointer-events: none;
        z-index: 12;
        clip-path: polygon(
          0 0, 10% 0, 10% 2px, 2px 2px, 2px 10%, 0 10%,
          0 90%, 2px 90%, 2px 99%, 10% 99%, 10% 100%, 0 100%,
          90% 100%, 90% 99%, 99% 99%, 99% 90%, 100% 90%, 100% 100%,
          100% 10%, 99% 10%, 99% 2px, 90% 2px, 90% 0, 100% 0
        );
      }
    </style>

    <!-- Content moved to index.html -->

    <!-- Overlays -->
    <div class="overlay-vignette"></div>
    <div class="scanlines"></div>
    <div class="corner-brackets clip" data-start="0" data-duration="15" data-track-index="2"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
      (function() {
        const scope = '[data-composition-id="level2"]';
        const tl = gsap.timeline({ paused: true });

        // Pulsing brackets
        tl.to(`${scope} .corner-brackets`, {
          opacity: 0.5,
          scale: 1.02,
          duration: 1,
          repeat: 14, // 15s total
          yoyo: true,
          ease: "sine.inOut"
        }, 0);

        // Flicker scanlines
        tl.to(`${scope} .scanlines`, {
          opacity: 0.1,
          duration: 0.1,
          repeat: 149, // 15s / 0.1s
          yoyo: true,
          ease: "steps(1)"
        }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines["level2"] = tl;
      })();
    </script>
  </div>
</template>
