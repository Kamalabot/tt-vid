<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Management Comparison</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: #000;
        }

        #root {
            width: 1920px;
            height: 1080px;
            position: relative;
        }

        .clip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div 
        id="root" 
        data-composition-id="main" 
        data-width="1920" 
        data-height="1080" 
        data-duration="15"
        data-start="0"
    >
        <!-- Level 3: Content (Bottom) -->
        <div 
            class="clip" 
            data-composition-id="level3" 
            data-composition-src="compositions/level3.html"
            data-start="0" 
            data-duration="15" 
            data-track-index="1"
        ></div>

        <!-- Level 2: Overlays (Middle) -->
        <div 
            class="clip" 
            data-composition-id="level2" 
            data-composition-src="compositions/level2.html"
            data-start="0" 
            data-duration="15" 
            data-track-index="2"
        ></div>

        <!-- Level 1: Boot Sequence (Top) -->
        <div 
            class="clip" 
            data-composition-id="level1" 
            data-composition-src="compositions/level1.html"
            data-start="0" 
            data-duration="15" 
            data-track-index="3"
        ></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        (function() {
            // Main root timeline
            const tl = gsap.timeline({ paused: true });
            
            // The root timeline just coordinates the nested compositions
            // In HyperFrames, the engine handles the playback of nested src,
            // but we register the root to satisfy the framework requirements.
            
            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = tl;
        })();
    </script>
</body>
</html>
